name: Sync All YouTube Playlists

on:
  # 매주 월요일 KST 오전 9시 (UTC 00:00)
  schedule:
    - cron: '0 0 * * 1'

  # 수동 즉시 실행 (GitHub Actions → Run workflow)
  workflow_dispatch:
    inputs:
      force_update:
        description: '변경 없어도 강제 커밋'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-playlists:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Sync all playlists
        id: sync
        env:
          YOUTUBE_API_KEY: ${{ secrets.MJ_YOUTUBE_API_KEY }}
          # ── 각 프로젝트의 플레이리스트 ID ──────────────────────
          # playlist_config.py의 playlist_id_env와 이름이 일치해야 합니다.
          # Secret이 없으면 playlist_config.py의 기본값(hardcoded)을 사용합니다.
          THE_ROOT_PLAYLIST_ID:            ${{ secrets.THE_ROOT_PLAYLIST_ID }}
          TASTING_NOTE_PLAYLIST_ID:        ${{ secrets.TASTING_NOTE_PLAYLIST_ID }}
          NEUTRAL_INTERVIEW_PLAYLIST_ID:   ${{ secrets.NEUTRAL_INTERVIEW_PLAYLIST_ID }}
          # 향후 프로젝트 추가 시 아래에 줄 추가:
          # NEW_PROJECT_PLAYLIST_ID: ${{ secrets.NEW_PROJECT_PLAYLIST_ID }}
        run: python scripts/update_playlists.py

      - name: Commit & push updated files
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.sync.outputs.changed_files || 'the-root/index.html tasting-note/index.html neutral-interview/index.html' }}
          git diff --cached --quiet || git commit -m "chore: auto-sync YouTube playlists [skip ci]"
          git push
