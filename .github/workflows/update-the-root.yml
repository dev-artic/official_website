name: Update "The Root" Playlist

on:
  # 매주 월요일 KST 오전 9시 (UTC 월요일 00:00)
  schedule:
    - cron: '0 0 * * 1'
  # 수동 즉시 실행 버튼 (GitHub Actions 탭에서 "Run workflow" 클릭)
  workflow_dispatch:
    inputs:
      force_update:
        description: '강제 업데이트 (변경 없어도 커밋)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch playlist & update HTML
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PLAYLIST_ID: PLz166z7qN-0yOh9VmQndP_dG4iHzLm9g1
        run: python scripts/update_the_root.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet the-root/index.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push if updated
        if: steps.check_changes.outputs.changed == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add the-root/index.html
          git commit -m "chore(the-root): auto-update playlist from YouTube [skip ci]"
          git push
