<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. — Contact">
  <meta name="author" content="artic.">
  <title>Contact — artic.</title>

  <link rel="icon" type="image/png" href="../images/favicon.png">
  <link rel="stylesheet" href="../css/design-system.css">

  <script>
    (function(){
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();
  </script>

  <style>
    body { overflow-x: hidden; }

    .contact-wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--gutter);
      padding-top: 40vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .contact-email {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .contact-email:hover {
      color: var(--text-primary);
    }

    .contact-footer {
      margin-top: auto;
      padding: var(--space-lg) 0;
      border-top: 1px solid var(--border-color);
      text-align: right;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="/" class="nav-home animate-on-load" id="nav-home">artic.</a>
    <a href="/about/" class="nav-link">About</a>
    <a href="/projects/" class="nav-link">Projects</a>
    <a href="/contact/" class="nav-link active">Contact</a>
  </nav>

  <div class="contact-wrap animate-fade-in">
    <a href="mailto:admin@artic.live" class="contact-email">admin@artic.live</a>

    <footer class="contact-footer">
      © 2026 artic. All Rights Reserved
    </footer>
  </div>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <script src="../js/shared.js"></script>
</body>
</html>
