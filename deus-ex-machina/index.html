  <!-- Firebase Web SDK Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // === Firebase Configuration (Reused from root index.html) ===
    const firebaseConfig = {
      apiKey: "AIzaSyAlW7fE3c8mTL4EHdU08wjnVA4U_nKl1Fo",
      authDomain: "artic-official-home.firebaseapp.com",
      projectId: "artic-official-home",
      storageBucket: "artic-official-home.firebasestorage.app",
      messagingSenderId: "259485663128",
      appId: "1:259485663128:web:9b01f04205edf4125e75ed",
      measurementId: "G-KJDZPGXQSX"
    };

    const isFirebaseConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";

    let db = null;
    if (isFirebaseConfigured) {
      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
      } catch (err) {
        console.error("Error initializing Firebase:", err);
      }
    }

    // Handle Pre-save Form Submission
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('pre-save-form');
      const successMessage = document.getElementById('success-message');
      const emailField = document.getElementById('email-field');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailField.value.trim();
        if (email) {
          // 1. Local Storage Backup (Client-side Cache)
          let localSubscribers = [];
          try {
            localSubscribers = JSON.parse(localStorage.getItem('artic_subscribers_deus')) || [];
          } catch(err) {
            localSubscribers = [];
          }
          if (!localSubscribers.includes(email)) {
            localSubscribers.push(email);
            localStorage.setItem('artic_subscribers_deus', JSON.stringify(localSubscribers));
          }

          // 2. Save directly to Firebase Firestore with Campaign ID
          if (db) {
            try {
              await addDoc(collection(db, "subscribers"), {
                email: email,
                timestamp: serverTimestamp(),
                campaign: "deus_ex_machina"
              });
              console.log("Pre-save successfully registered in Firebase Firestore!");
            } catch (err) {
              console.error("Failed to save pre-save info to Firestore:", err);
            }
          }

          // 3. Smooth UI fade animation
          form.style.opacity = '0';
          form.style.pointerEvents = 'none';
          
          setTimeout(() => {
            form.style.display = 'none';
            successMessage.classList.add('active');
          }, 400);
        }
      });
    });
  </script>

</body>
</html>
