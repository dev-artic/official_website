<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #111111;
      font-family: 'KakaoSmall', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    table {
      border-collapse: collapse;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      width: 100%;
      background-color: #ffffff;
      padding: 40px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border: 1px solid #eaeaea;
    }
    .header {
      padding: 64px 32px;
      text-align: center;
      background-color: #ffffff;
      border-bottom: 1px solid #f5f5f5;
    }
    .header img {
      display: inline-block;
      border: none;
      outline: none;
    }
    .content-table {
      width: 100%;
      background-color: #ffffff;
    }
    .content-padding {
      padding: 48px 40px;
    }
    h1 {
      font-family: 'KakaoBig', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 32px 0;
      color: #111111;
      line-height: 1.4;
      text-align: center;
    }
    p {
      font-size: 13px;
      line-height: 1.8;
      margin: 0 0 20px 0;
      color: #333333;
      letter-spacing: 0.01em;
    }
    /* Data table styles (Borderless, elegant rows with subtle divider lines) */
    .data-table {
      width: 100%;
      margin: 36px 0;
      border-collapse: collapse;
    }
    .data-table td {
      padding: 12px 0;
      border-bottom: 1px solid #f3f3f3;
      font-size: 13px;
      line-height: 1.5;
      vertical-align: middle;
    }
    .data-table tr:last-child td {
      border-bottom: none;
    }
    .data-table td.label {
      width: 35%;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888888;
      text-align: left;
    }
    .data-table td.value {
      width: 65%;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #111111;
      text-align: right;
    }
    .bold {
      font-weight: 600;
      color: #111111;
    }
    /* Signature styles (Right-aligned, minimal) */
    .signature {
      margin-top: 48px;
      padding-top: 48px;
      border-top: 1px solid #f5f5f5;
      text-align: center;
      font-size: 11px;
      color: #999999;
    }
    /* Footer styles */
    .footer {
      background-color: #ffffff;
      border-top: 1px solid #f5f5f5;
      padding: 48px 40px;
      text-align: center;
    }
    .footer-text {
      font-size: 11px;
      line-height: 1.8;
      color: #888888;
      margin: 0;
    }
    @media screen and (max-width: 600px) {
      .container {
        border-left: none;
        border-right: none;
      }
      .content-padding {
        padding: 36px 24px;
      }
      .signature {
        padding-top: 36px;
      }
      .footer {
        padding: 36px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <table class="container" align="center" border="0" cellpadding="0" cellspacing="0">
      <tr>
        <td class="header">
          <img src="https://artic.live/images/logo-icon-black.png" alt="artic." width="72" style="border: none;">
        </td>
      </tr>
      <tr>
        <td class="content-table">
          <div class="content-padding">
            <h1>{{TITLE}}</h1>
            
            {{BODY_CONTENT}}
            
            {{DATA_TABLE}}
            
            <div class="signature">
              <a href="https://artic.live" target="_blank" style="display: inline-block; text-decoration: none; border: none; outline: none;">
                <img src="https://artic.live/images/logo-type-black.png" alt="artic." width="80" style="border: none; display: block; margin: 0 auto 4px auto;">
              </a>
              <span style="font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 9px; color: #999999; letter-spacing: 0.03em; display: block;">artists' attic.</span>
            </div>
          </div>
        </td>
      </tr>
      <tr>
        <td class="footer">
          <p class="footer-text">본 메일은 시스템에 의해 자동 생성된 관리자 내부 확인용 메일입니다.<br>보안을 위해 본 메일의 정보를 외부로 유출하지 마십시오.</p>
          <p class="footer-text" style="margin-top: 15px; color: #999999;">&copy; 2026 artic. All Rights Reserved.</p>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
