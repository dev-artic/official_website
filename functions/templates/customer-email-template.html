<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    table {
      border-collapse: collapse;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      width: 100%;
      background-color: #ffffff;
      padding: 40px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
    }
    .header {
      padding: 40px 20px;
      text-align: center;
      background-color: #ffffff;
    }
    .header img {
      display: block;
      margin: 0 auto;
      border: none;
      outline: none;
    }
    .content-table {
      width: 100%;
      background-color: #ffffff;
    }
    .content-padding {
      padding: 0 40px 40px 40px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 24px 0;
      color: #111111;
      line-height: 1.4;
      text-align: left;
    }
    p {
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 20px 0;
      color: #333333;
    }
    /* Data table styles */
    .data-table {
      width: 100%;
      margin: 30px 0;
      border-collapse: collapse;
    }
    .data-table td {
      padding: 12px 0;
      border: none;
      font-size: 14px;
      line-height: 1.5;
      vertical-align: top;
    }
    .data-table td.label {
      width: 30%;
      color: #888888;
      font-weight: 400;
      text-align: left;
    }
    .data-table td.value {
      width: 70%;
      color: #111111;
      font-weight: 600;
      text-align: right;
    }
    .bold {
      font-weight: 600;
      color: #111111;
    }
    /* Signature styles */
    .signature {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #f0f0f0;
      text-align: left;
    }
    .sender-name {
      font-size: 14px;
      font-weight: 600;
      color: #111111;
      margin-bottom: 12px;
    }
    .sig-logo-wrap {
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    .sig-link {
      font-size: 13px;
      color: #888888;
      text-decoration: none;
      vertical-align: middle;
    }
    .sig-link:hover {
      text-decoration: underline;
      color: #111111;
    }
    /* Footer styles */
    .footer {
      background-color: #fafafa;
      border-top: 1px solid #eaeaea;
      padding: 30px 40px;
      text-align: left;
    }
    .footer-text {
      font-size: 11px;
      line-height: 1.6;
      color: #888888;
      margin: 0;
    }
    .footer-links {
      margin-top: 12px;
    }
    .footer-link {
      font-size: 11px;
      color: #666666;
      text-decoration: none;
      margin-right: 15px;
    }
    .footer-link:hover {
      color: #111111;
      text-decoration: underline;
    }
    @media screen and (max-width: 600px) {
      .content-padding {
        padding: 0 20px 30px 20px;
      }
      .footer {
        padding: 20px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <table class="container" align="center">
      <tr>
        <td class="header">
          <img src="https://artic.live/images/logo-black.png" alt="artic." width="90">
        </td>
      </tr>
      <tr>
        <td class="content-table">
          <div class="content-padding">
            <h1>{{TITLE}}</h1>
            
            {{BODY_CONTENT}}
            
            {{DATA_TABLE}}
            
            <div class="signature">
              <div class="sender-name">artic.</div>
              <div>
                <span class="sig-logo-wrap">
                  <img src="https://artic.live/images/logo-icon-black.png" alt="" width="14" height="14" style="display: block; border: none;">
                </span>
                <a href="https://artic.live" class="sig-link" target="_blank">artic.live</a>
              </div>
            </div>
          </div>
        </td>
      </tr>
      <tr>
        <td class="footer">
          <p class="footer-text">본 메일은 artic. 서비스 이용 고객님을 대상으로 발송된 발신전용 메일입니다.<br>문의사항이 있으시면 고객지원 이메일로 연락주시기 바랍니다.</p>
          <div class="footer-links">
            <a href="mailto:admin@artic.live" class="footer-link">admin@artic.live</a>
            <a href="https://artic.live" class="footer-link">Website</a>
          </div>
          <p class="footer-text" style="margin-top: 15px;">&copy; 2026 artic. All Rights Reserved.</p>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
