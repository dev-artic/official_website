<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    /* Retain styles in head as fallback for clients that support it */
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      color: #111111;
      font-family: 'KakaoSmall', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    table {
      border-collapse: collapse;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      width: 100%;
      background-color: #ffffff;
      padding: 40px 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border: 1px solid #eaeaea;
    }
    .header {
      padding: 64px 32px;
      text-align: center;
      background-color: #ffffff;
      border-bottom: 1px solid #f5f5f5;
    }
    .header img {
      display: inline-block;
      border: none;
      outline: none;
    }
    .content-table {
      width: 100%;
      background-color: #ffffff;
    }
    .content-padding {
      padding: 48px 40px;
    }
    h1 {
      font-family: 'KakaoBig', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 32px 0;
      color: #111111;
      line-height: 1.4;
      text-align: center;
    }
    p {
      font-size: 13px;
      line-height: 1.8;
      margin: 0 0 20px 0;
      color: #333333;
      letter-spacing: 0.01em;
    }
    .data-table {
      width: 100%;
      margin: 36px 0;
      border-collapse: collapse;
    }
    .data-table td {
      padding: 12px 0;
      border-bottom: 1px solid #f3f3f3;
      font-size: 13px;
      line-height: 1.5;
      vertical-align: middle;
    }
    .data-table tr:last-child td {
      border-bottom: none;
    }
    .data-table td.label {
      width: 35%;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888888;
      text-align: left;
    }
    .data-table td.value {
      width: 65%;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #111111;
      text-align: right;
    }
    .bold {
      font-weight: 600;
      color: #111111;
    }
    .signature {
      margin-top: 48px;
      padding-top: 48px;
      border-top: 1px solid #f5f5f5;
      text-align: center;
      font-size: 11px;
      color: #999999;
    }
    .footer {
      background-color: #ffffff;
      border-top: 1px solid #f5f5f5;
      padding: 48px 40px;
      text-align: center;
    }
    .footer-nav {
      margin-bottom: 24px;
    }
    .footer-nav-link {
      font-family: 'KakaoBig', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #111111;
      text-decoration: none;
      margin: 0 12px;
      display: inline-block;
    }
    .footer-text {
      font-size: 11px;
      line-height: 1.8;
      color: #888888;
      margin: 0;
    }
    @media screen and (max-width: 600px) {
      .container {
        border-left: none !important;
        border-right: none !important;
      }
      .content-padding {
        padding: 36px 24px !important;
      }
      .signature {
        padding-top: 36px !important;
      }
      .footer {
        padding: 36px 24px !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; color: #111111; font-family: 'KakaoSmall', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased;">

      <tr>

                <img src="https://artic.live/images/logo-type-black.png" alt="artic." width="80" style="border: none; display: block; margin: 0 auto 4px auto;">

            </div>
          </div>
        </td>
      </tr>

          <div class="footer-nav" style="margin-bottom: 24px;">
            <a href="https://artic.live" class="footer-nav-link" target="_blank" style="font-family: 'KakaoBig', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #111111; text-decoration: none; margin: 0 12px; display: inline-block;">Home</a>
            
            <a href="mailto:admin@artic.live" class="footer-nav-link" style="font-family: 'KakaoBig', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #111111; text-decoration: none; margin: 0 12px; display: inline-block;">Contact</a>
            
            <a href="https://www.instagram.com/artic.live" class="footer-nav-link" target="_blank" style="font-family: 'KakaoBig', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #111111; text-decoration: none; margin: 0 12px; display: inline-block;">Instagram</a>
          </div>
          <p class="footer-text" style="font-size: 11px; line-height: 1.8; color: #888888; margin: 0;">
            본 메일은 artic. 서비스 이용 고객님을 대상으로 발송된 발신전용 메일입니다.<br>
            문의 사항이 있으신 경우 <a href="mailto:admin@artic.live" style="color: #666666; text-decoration: underline;">admin@artic.live</a>로 문의해 주시기 바랍니다.
          </p>
          <p class="footer-text" style="font-size: 11px; line-height: 1.8; color: #888888; margin: 0; margin-top: 15px; color: #999999;">&copy; 2026 artic. All Rights Reserved.</p>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
