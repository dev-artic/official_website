<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. — Art, Culture, and Archive">
  <meta name="author" content="artic.">
  <title>artic.</title>

  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/design-system.css">

  <!-- Prevent flash: apply theme before render -->
  <script>
    (function(){
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();
  </script>

  <style>
    /* ── Page ── */
    body {
      overflow-x: hidden;
    }

    /* ── Nav (initial: hidden, appears after logo animation) ── */
    @media (min-width: 768px) {
      .nav-bar {
        opacity: 0;
        transform: translateY(-12px);
        animation: navReveal 0.7s var(--ease-out-expo) 1.8s forwards;
      }

      @keyframes navReveal {
        to { opacity: 1; transform: translateY(0); }
      }
    }

    /* ── Hero Section ── */
    .hero {
      min-height: 100vh;
      min-height: 100dvh; /* Dynamic viewport height for perfect mobile vertical centering */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .logo-split {
      position: relative;
      width: 100px;
      aspect-ratio: 434 / 313;
    }

    .logo-split img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
    }

    .logo-icon-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(0 0 54% 0);
      overflow: hidden;
    }

    .logo-type-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(55.5% 0 -5px 0);
      overflow: hidden;
    }

    .logo-icon {
      transform: translateY(40px);
      animation: revealIcon 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    .logo-type {
      transform: translateY(-36px);
      animation: revealType 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    @keyframes revealIcon {
      from { transform: translateY(40px); }
      to   { transform: translateY(0); }
    }

    @keyframes revealType {
      from { transform: translateY(-36px); }
      to   { transform: translateY(0); }
    }

    /* ── Content Sections ── */
    .content-section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-xxl) var(--gutter);
      border-top: 1px solid var(--border-color);
      transition: border-color 0.5s ease;
    }

    .section-tag {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
      max-width: 600px;
    }

    .section-desc {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-secondary);
      max-width: 480px;
      margin-bottom: var(--space-lg);
    }

    .section-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      transition: color 0.3s ease;
      white-space: nowrap;
      position: relative;
      padding-bottom: 2px;
    }

    .section-link::after {
      content: '';
      position: absolute;
      width: calc(100% - 20px); /* Exclude arrow SVG */
      transform: scaleX(0);
      height: 1px;
      bottom: 0;
      left: 0;
      background-color: var(--text-primary);
      transform-origin: bottom right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section-link:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    .section-link:hover {
      color: var(--text-primary);
    }

    .section-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .section-link:hover svg {
      transform: translateX(4px);
    }

    /* ── Projects Preview Row ── */
    .projects-row {
      width: 100%;
      position: relative;
    }

    .projects-preview {
      display: flex;
      gap: var(--space-md);
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE 10+ */
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .projects-preview::-webkit-scrollbar {
      display: none; /* WebKit */
    }

    /* ── Desktop Floating Link (Overlap layer with fade-in on hover) ── */
    .floating-view-link {
      position: absolute;
      right: 0;
      top: 0;
      height: calc(100% - 8px); /* Account for padding-bottom of preview */
      display: flex;
      align-items: center;
      justify-content: flex-end;
      z-index: 10;
      background: linear-gradient(to left, var(--bg-primary) 20%, transparent 100%);
      padding: 0 var(--gutter) 0 220px; /* Highly stretched padding creates extremely soft gradient transition */
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease-out-expo);
    }

    .projects-row:hover .floating-view-link {
      opacity: 1;
      pointer-events: auto;
    }

    .floating-view-link::after {
      display: none !important; /* Disable wide container-bottom underline */
    }

    .floating-view-link span {
      position: relative;
      padding-bottom: 2px;
    }

    .floating-view-link span::after {
      content: '';
      position: absolute;
      width: 100%;
      transform: scaleX(0);
      height: 1px;
      bottom: 0;
      left: 0;
      background-color: var(--text-primary);
      transform-origin: bottom right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .projects-row:hover .floating-view-link span::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    /* ── Mobile Overswipe Pull Indicator ── */
    .pull-indicator {
      flex: 0 0 0px;
      width: 0px;
      opacity: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      transition: flex-basis 0.3s var(--ease-out-expo), width 0.3s var(--ease-out-expo), opacity 0.3s ease;
      height: auto;
      aspect-ratio: 4 / 5;
      position: relative;
    }

    .pull-indicator-content {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      color: var(--text-muted);
      white-space: nowrap;
      transition: transform 0.3s var(--ease-out-expo);
    }

    .pull-indicator.active .pull-indicator-content {
      transform: translateX(0);
    }

    .pull-arrow {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .pull-text {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }



    .preview-card {
      flex: 0 0 280px;
      text-decoration: none;
      color: inherit;
    }

    .preview-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      margin-bottom: var(--space-xs);
      transition: transform 0.6s var(--ease-out-expo);
    }

    .preview-card:hover .preview-card-img {
      transform: scale(1.02);
    }

    .preview-card-title {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .preview-card-meta {
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .preview-img-wrap {
      overflow: hidden;
      margin-bottom: var(--space-xs);
      position: relative;
    }

    /* Figma UI Kit / Tailwind UI-inspired Editorial Glassmorphic Explore Tag */
    .preview-img-wrap::after {
      content: 'EXPLORE';
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 0px; /* Sharp editorial corners matching artic. */
      font-family: var(--font-sans);
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .preview-card:hover .preview-img-wrap::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Footer ── */
    .site-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-lg) var(--gutter);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
    }

    .site-footer span {
      color: var(--text-muted);
    }

    /* ── Desktop/Mobile Displays ── */
    .desktop-only {
      display: inline-flex !important;
    }
    .mobile-only {
      display: none !important;
    }

    @media (max-width: 767px) {
      .desktop-only {
        display: none !important;
      }
      .mobile-only {
        display: flex !important;
      }
    }

    /* ── Swipe to Navigate Slider Component ── */
    .swipe-to-navigate {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      margin-top: 24px;
    }

    .swipe-track {
      position: relative;
      width: 200px;
      height: 44px;
      border: 1px solid var(--border-color);
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 0px; /* Sharp corners matching artic. */
      overflow: hidden;
      display: flex;
      align-items: center;
      transition: border-color 0.5s ease, background-color 0.5s ease;
    }

    .swipe-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding-left: 36px;
      padding-right: 12px;
      box-sizing: border-box;
    }

    .swipe-handle {
      width: 42px;
      height: 42px;
      background-color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      position: absolute;
      left: 0px;
      transition: background-color 0.5s ease;
      border-radius: 0px; /* Sharp handle */
      z-index: 2;
    }

    .swipe-handle svg {
      width: 14px;
      height: 14px;
      fill: var(--bg-primary);
      transition: fill 0.5s ease, transform 0.4s var(--ease-out-expo);
    }

    .swipe-handle:active {
      cursor: grabbing;
    }

    /* ── Theme Toggle (initial reveal) ── */
    .theme-toggle {
      opacity: 0;
      animation: toggleReveal 0.5s ease 2.2s forwards;
    }

    @keyframes toggleReveal {
      to { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .preview-card {
        flex: 0 0 220px;
      }
      .content-section {
        padding: var(--space-xl) var(--gutter);
      }
    }
  </style>
</head>
<body>

  <!-- ── Floating Navigation ── -->
  <nav class="nav-bar">
    <a href="/" class="nav-home" id="nav-home">artic.</a>
    <a href="/about/" class="nav-link">About</a>
    <a href="/projects/" class="nav-link">Projects</a>
    <a href="/contact/" class="nav-link">Contact</a>
  </nav>

  <!-- ── Hero: Logo Animation ── -->
  <section class="hero" id="hero-logo">
    <div class="logo-split">
      <div class="logo-icon-wrapper">
        <img src="images/logo-black.png" alt="" class="logo-icon">
      </div>
      <div class="logo-type-wrapper">
        <img src="images/logo-black.png" alt="artic." class="logo-type">
      </div>
    </div>
  </section>

  <!-- ── Projects Preview ── -->
  <section class="content-section">
    <div class="projects-row animate-on-load" style="animation-delay: 1.0s;">
      <div class="projects-preview" id="projects-preview-container">
        <a href="deus-ex-machina/" class="preview-card">
          <div class="preview-img-wrap">
            <img src="deus-ex-machina/album-art.png" alt="deus ex machina" class="preview-card-img">
          </div>
          <div class="preview-card-title">deus ex machina</div>
          <div class="preview-card-meta">Music · 2024</div>
        </a>

        <a href="tasting-note/" class="preview-card">
          <div class="preview-img-wrap">
            <img src="tasting-note/album-art.png" alt="TASTING NOTE" class="preview-card-img">
          </div>
          <div class="preview-card-title">TASTING NOTE</div>
          <div class="preview-card-meta">original series · 2026</div>
        </a>

        <a href="neutral-interview/" class="preview-card">
          <div class="preview-img-wrap">
            <img src="neutral-interview/album-art.png" alt="NEUTRAL INTERVIEW" class="preview-card-img">
          </div>
          <div class="preview-card-title">NEUTRAL INTERVIEW</div>
          <div class="preview-card-meta">original series · 2024</div>
        </a>

        <!-- Mobile Overswipe Pull Indicator -->
        <div class="pull-indicator" id="projects-pull-card">
          <div class="pull-indicator-content">
            <span class="pull-text">View All Projects</span>
            <svg class="pull-arrow" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
      </div>

      <!-- Desktop Floating Link (Overlap layer with fade-in on hover) -->
      <a href="/projects/" class="section-link desktop-only floating-view-link">
        <span>View All Projects</span>
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </a>
    </div>
  </section>

  <!-- ── Contact ── -->
  <section class="content-section" style="text-align: right;">
    <a href="/contact/" class="section-link animate-on-load" style="animation-delay: 1.2s;">
      <span>Contact Us</span>
      <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </a>
  </section>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <span>© 2026 artic. All Rights Reserved</span>
  </footer>

  <!-- ── Theme Toggle ── -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <!-- Moon (shown in light mode → click for dark) -->
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <!-- Sun (shown in dark mode → click for light) -->
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <!-- ── Scripts ── -->
  <script src="js/shared.js"></script>
  <script>
    sessionStorage.removeItem('artic-subpage');
    document.addEventListener('DOMContentLoaded', () => {
      initNavScroll(467);
      
      // Initialize premium Mobile Horizontal Over-Swipe Pull-to-Navigate
      (function() {
        const container = document.getElementById('projects-preview-container');
        const pullCard = document.getElementById('projects-pull-card');
        if (!container || !pullCard) return;

        const pullArrow = pullCard.querySelector('.pull-arrow');
        const pullText = pullCard.querySelector('.pull-text');

        let startX = 0;
        let isAtEnd = false;
        let pullDistance = 0;
        const threshold = 120; // Delta touch past the end of scroll to trigger navigation

        container.addEventListener('touchstart', (e) => {
          startX = e.touches[0].clientX;
          // Check if scrolled to the absolute right end
          isAtEnd = (container.scrollLeft + container.clientWidth >= container.scrollWidth - 10);
          pullDistance = 0;
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
          if (!isAtEnd) return;
          const currentX = e.touches[0].clientX;
          const deltaX = startX - currentX; // Dragging left = scroll right

          if (deltaX > 0) {
            pullDistance = deltaX;
            // Apply exponential damping for smooth physical feedback
            const visualPull = Math.min(pullDistance * 0.5, 140);
            
            pullCard.style.flexBasis = `${visualPull}px`;
            pullCard.style.width = `${visualPull}px`;
            pullCard.style.opacity = Math.min(visualPull / 60, 1);

            if (visualPull >= 95) {
              pullArrow.style.transform = 'translateX(4px)';
              pullCard.classList.add('active');
            } else {
              pullArrow.style.transform = 'translateX(0px)';
              pullCard.classList.remove('active');
            }
          }
        }, { passive: true });

        container.addEventListener('touchend', () => {
          if (isAtEnd && pullDistance >= threshold) {
            pullCard.style.transition = 'flex-basis 0.25s ease, width 0.25s ease, opacity 0.25s ease';
            pullCard.style.flexBasis = '160px';
            pullCard.style.width = '160px';
            pullCard.style.opacity = '1';

            // Add standard elegant exit transition
            document.body.classList.add('page-exit');
            setTimeout(() => {
              window.location.href = '/projects/';
            }, 250);
          } else {
            // Smoothly collapse back with modern bezier curves
            pullCard.style.transition = 'flex-basis 0.4s var(--ease-out-expo), width 0.4s var(--ease-out-expo), opacity 0.4s ease';
            pullCard.style.flexBasis = '0px';
            pullCard.style.width = '0px';
            pullCard.style.opacity = '0';
            pullCard.classList.remove('active');

            setTimeout(() => {
              pullCard.style.transition = '';
            }, 400);
          }
        });
      })();
    });
  </script>

</body>
</html>
