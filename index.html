<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. — Art, Culture, and Archive">
  <meta name="author" content="artic.">
  <title>artic.</title>

  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/design-system.css">

  <!-- Prevent flash: apply theme before render -->
  <script>
    (function(){
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();
  </script>

  <style>
    /* ── Page ── */
    body {
      overflow-x: hidden;
    }

    /* ── Nav (initial: hidden, appears after logo animation) ── */
    .nav-bar {
      opacity: 0;
      transform: translateY(-12px);
      animation: navReveal 0.7s var(--ease-out-expo) 1.8s forwards;
    }

    @keyframes navReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Hero Section ── */
    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .logo-split {
      position: relative;
      width: 100px;
      aspect-ratio: 434 / 313;
    }

    .logo-split img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
    }

    .logo-icon {
      clip-path: inset(50% 0 50% 0);
      transform: translateY(20px);
      animation: revealIcon 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    .logo-type {
      clip-path: inset(50% 0 50% 0);
      transform: translateY(-20px);
      animation: revealType 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    @keyframes revealIcon {
      from { clip-path: inset(50% 0 50% 0); transform: translateY(20px); }
      to   { clip-path: inset(0 0 43% 0);   transform: translateY(0); }
    }

    @keyframes revealType {
      from { clip-path: inset(50% 0 50% 0); transform: translateY(-20px); }
      to   { clip-path: inset(57% 0 0 0);   transform: translateY(0); }
    }

    /* ── Content Sections ── */
    .content-section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-xxl) var(--gutter);
      border-top: 1px solid var(--border-color);
      transition: border-color 0.5s ease;
    }

    .section-tag {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
      max-width: 600px;
    }

    .section-desc {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-secondary);
      max-width: 480px;
      margin-bottom: var(--space-lg);
    }

    .section-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      transition: color 0.3s ease;
      white-space: nowrap;
    }

    .section-link:hover {
      color: var(--text-primary);
    }

    .section-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .section-link:hover svg {
      transform: translateX(4px);
    }

    /* ── Projects Preview Row ── */
    .projects-row {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .projects-preview {
      display: flex;
      gap: var(--space-md);
      flex: 1;
      min-width: 0;
    }



    .preview-card {
      flex: 0 0 280px;
      text-decoration: none;
      color: inherit;
    }

    .preview-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      margin-bottom: var(--space-xs);
      transition: transform 0.6s var(--ease-out-expo);
    }

    .preview-card:hover .preview-card-img {
      transform: scale(1.02);
    }

    .preview-card-title {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .preview-card-meta {
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .preview-img-wrap {
      overflow: hidden;
      margin-bottom: var(--space-xs);
    }

    /* ── Footer ── */
    .site-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-lg) var(--gutter);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
    }

    .site-footer span {
      color: var(--text-muted);
    }

    /* ── Theme Toggle (initial reveal) ── */
    .theme-toggle {
      opacity: 0;
      animation: toggleReveal 0.5s ease 2.2s forwards;
    }

    @keyframes toggleReveal {
      to { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .preview-card { flex: 0 0 220px; }
      .content-section { padding: var(--space-xl) var(--gutter); }
    }
  </style>
</head>
<body>

  <!-- ── Floating Navigation ── -->
  <nav class="nav-bar">
    <a href="/" class="nav-home" id="nav-home">artic.</a>
    <a href="/about/" class="nav-link">About</a>
    <a href="/projects/" class="nav-link">Projects</a>
    <a href="/contact/" class="nav-link">Contact</a>
  </nav>

  <!-- ── Hero: Logo Animation ── -->
  <section class="hero" id="hero-logo">
    <div class="logo-split">
      <img src="images/logo-black.png" alt="" class="logo-icon">
      <img src="images/logo-black.png" alt="artic." class="logo-type">
    </div>
  </section>

  <!-- ── Projects Preview ── -->
  <section class="content-section">
    <div class="projects-row">
      <div class="projects-preview">
        <a href="deus-ex-machina/index.html" class="preview-card">
          <div class="preview-img-wrap">
            <img src="deus-ex-machina/album-art.png" alt="deus ex machina" class="preview-card-img">
          </div>
          <div class="preview-card-title">deus ex machina</div>
          <div class="preview-card-meta">Music · 2024</div>
        </a>
        <a href="#" class="preview-card">
          <div class="preview-img-wrap">
            <img src="projects/media-art.png" alt="Silence in Motion" class="preview-card-img">
          </div>
          <div class="preview-card-title">Silence in Motion</div>
          <div class="preview-card-meta">Media Art · 2026</div>
        </a>
        <a href="#" class="preview-card">
          <div class="preview-img-wrap">
            <img src="projects/space-art.png" alt="Restoration of Space" class="preview-card-img">
          </div>
          <div class="preview-card-title">Restoration of Space</div>
          <div class="preview-card-meta">Architecture · 2026</div>
        </a>
      </div>
      <a href="/projects/" class="section-link">
        <span>View All Projects</span>
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </a>
    </div>
  </section>

  <!-- ── Contact ── -->
  <section class="content-section" style="text-align: right;">
    <a href="/contact/" class="section-link">
      <span>Contact Us</span>
      <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </a>
  </section>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <span>© 2026 artic. All Rights Reserved</span>
  </footer>

  <!-- ── Theme Toggle ── -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <!-- Moon (shown in light mode → click for dark) -->
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <!-- Sun (shown in dark mode → click for light) -->
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <!-- ── Scripts ── -->
  <script src="js/shared.js"></script>
  <script>
    sessionStorage.removeItem('artic-subpage');
    document.addEventListener('DOMContentLoaded', () => {
      initNavScroll(467);
    });
  </script>

</body>
</html>
