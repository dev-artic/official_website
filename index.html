<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. — Art, Culture, and Archive">
  <meta name="author" content="artic.">
  <title>artic.</title>

  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/design-system.css">

  <!-- Prevent flash: apply theme before render -->
  <script>
    (function(){
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();
  </script>

  <style>
    /* ── Page ── */
    body {
      overflow-x: hidden;
    }

    /* ── Nav (initial: hidden, appears after logo animation) ── */
    @media (min-width: 768px) {
      .nav-bar {
        opacity: 0;
        transform: translateY(-12px);
        animation: navReveal 0.7s var(--ease-out-expo) 1.8s forwards;
      }

      @keyframes navReveal {
        to { opacity: 1; transform: translateY(0); }
      }
    }

    /* ── Hero Section ── */
    .hero {
      min-height: 100vh;
      min-height: 100dvh; /* Dynamic viewport height for perfect mobile vertical centering */
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .logo-split {
      position: relative;
      width: 100px;
      aspect-ratio: 434 / 313;
    }

    .logo-split img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
    }

    .logo-icon-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(0 0 54% 0);
      overflow: hidden;
    }

    .logo-type-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(55.5% 0 -5px 0);
      overflow: hidden;
    }

    .logo-icon {
      transform: translateY(40px);
      animation: revealIcon 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    .logo-type {
      transform: translateY(-36px);
      animation: revealType 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    @keyframes revealIcon {
      from { transform: translateY(40px); }
      to   { transform: translateY(0); }
    }

    @keyframes revealType {
      from { transform: translateY(-36px); }
      to   { transform: translateY(0); }
    }

    /* ── Content Sections ── */
    .content-section {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-xxl) var(--gutter);
      border-top: 1px solid var(--border-color);
      transition: border-color 0.5s ease;
    }

    .section-tag {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
      max-width: 600px;
    }

    .section-desc {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-secondary);
      max-width: 480px;
      margin-bottom: var(--space-lg);
    }

    .section-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      transition: color 0.3s ease;
      white-space: nowrap;
      position: relative;
      padding-bottom: 2px;
    }

    .section-link::after {
      content: '';
      position: absolute;
      width: calc(100% - 20px); /* Exclude arrow SVG */
      transform: scaleX(0);
      height: 1px;
      bottom: 0;
      left: 0;
      background-color: var(--text-primary);
      transform-origin: bottom right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section-link:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    .section-link:hover {
      color: var(--text-primary);
    }

    .section-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .section-link:hover svg {
      transform: translateX(4px);
    }

    /* ── Projects Preview Row ── */
    .projects-row {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    .projects-preview {
      display: flex;
      gap: var(--space-md);
      flex: 1;
      min-width: 0;
    }



    .preview-card {
      flex: 0 0 280px;
      text-decoration: none;
      color: inherit;
    }

    .preview-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      margin-bottom: var(--space-xs);
      transition: transform 0.6s var(--ease-out-expo);
    }

    .preview-card:hover .preview-card-img {
      transform: scale(1.02);
    }

    .preview-card-title {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .preview-card-meta {
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .preview-img-wrap {
      overflow: hidden;
      margin-bottom: var(--space-xs);
      position: relative;
    }

    /* Figma UI Kit / Tailwind UI-inspired Editorial Glassmorphic Explore Tag */
    .preview-img-wrap::after {
      content: 'EXPLORE';
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 0px; /* Sharp editorial corners matching artic. */
      font-family: var(--font-sans);
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .preview-card:hover .preview-img-wrap::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Footer ── */
    .site-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-lg) var(--gutter);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
    }

    .site-footer span {
      color: var(--text-muted);
    }

    /* ── Desktop/Mobile Displays ── */
    .desktop-only {
      display: inline-flex !important;
    }
    .mobile-only {
      display: none !important;
    }

    @media (max-width: 767px) {
      .desktop-only {
        display: none !important;
      }
      .mobile-only {
        display: flex !important;
      }
    }

    /* ── Swipe to Navigate Slider Component ── */
    .swipe-to-navigate {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      margin-top: 24px;
    }

    .swipe-track {
      position: relative;
      width: 200px;
      height: 44px;
      border: 1px solid var(--border-color);
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 0px; /* Sharp corners matching artic. */
      overflow: hidden;
      display: flex;
      align-items: center;
      transition: border-color 0.5s ease, background-color 0.5s ease;
    }

    .swipe-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding-left: 36px;
      padding-right: 12px;
      box-sizing: border-box;
    }

    .swipe-handle {
      width: 42px;
      height: 42px;
      background-color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      position: absolute;
      left: 0px;
      transition: background-color 0.5s ease;
      border-radius: 0px; /* Sharp handle */
      z-index: 2;
    }

    .swipe-handle svg {
      width: 14px;
      height: 14px;
      fill: var(--bg-primary);
      transition: fill 0.5s ease, transform 0.4s var(--ease-out-expo);
    }

    .swipe-handle:active {
      cursor: grabbing;
    }

    /* ── Theme Toggle (initial reveal) ── */
    .theme-toggle {
      opacity: 0;
      animation: toggleReveal 0.5s ease 2.2s forwards;
    }

    @keyframes toggleReveal {
      to { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .projects-row {
        flex-direction: column;
        align-items: flex-start;
        gap: var(--space-lg);
      }
      .projects-preview {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 8px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .projects-preview::-webkit-scrollbar {
        display: none;
      }
      .preview-card {
        flex: 0 0 220px;
      }
      .content-section {
        padding: var(--space-xl) var(--gutter);
      }
    }
  </style>
</head>
<body>

  <!-- ── Floating Navigation ── -->
  <nav class="nav-bar">
    <a href="/" class="nav-home" id="nav-home">artic.</a>
    <a href="/about/" class="nav-link">About</a>
    <a href="/projects/" class="nav-link">Projects</a>

  </nav>

  <!-- ── Hero: Logo Animation ── -->
  <section class="hero" id="hero-logo">
    <div class="logo-split">
      <div class="logo-icon-wrapper">
        <img src="images/logo-black.png" alt="" class="logo-icon">
      </div>
      <div class="logo-type-wrapper">
        <img src="images/logo-black.png" alt="artic." class="logo-type">
      </div>
    </div>
  </section>

  <!-- ── Projects Preview ── -->
  <section class="content-section">
    <div class="projects-row">
      <div class="projects-preview">
        <a href="deus-ex-machina/" class="preview-card">

      </div>
      <!-- Desktop Link -->
      <a href="/projects/" class="section-link desktop-only">

      <div class="swipe-to-navigate mobile-only" data-href="/projects/">
        <div class="swipe-track">

            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Contact ── -->
  <section class="content-section" style="text-align: right;">
    <!-- Desktop Link -->
    <a href="/contact/" class="section-link desktop-only">
      <span>Contact Us</span>
      <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
    </a>
    <!-- Mobile Swipe Link -->
    <div class="swipe-to-navigate mobile-only" data-href="/contact/">
      <div class="swipe-track">
        <span class="swipe-text">SWIPE TO CONTACT</span>
        <div class="swipe-handle">
          <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <span>© 2026 artic. All Rights Reserved</span>
  </footer>

  <!-- ── Theme Toggle ── -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <!-- Moon (shown in light mode → click for dark) -->
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <!-- Sun (shown in dark mode → click for light) -->
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <!-- ── Scripts ── -->
  <script src="js/shared.js"></script>
  <script>
    sessionStorage.removeItem('artic-subpage');
    document.addEventListener('DOMContentLoaded', () => {
      initNavScroll(467);
      
      // Initialize interactive Swipe-to-Navigate components on mobile
      document.querySelectorAll('.swipe-to-navigate').forEach(slider => {
        const handle = slider.querySelector('.swipe-handle');
        const text = slider.querySelector('.swipe-text');
        const href = slider.dataset.href;
        
        let isDragging = false;
        let startX = 0;
        let currentX = 0;
        
        function getDragLimit() {
          const track = slider.querySelector('.swipe-track');
          return track.clientWidth - handle.clientWidth - 2; // Subtract border thickness offset
        }
        
        function startDrag(e) {
          isDragging = true;
          startX = (e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
          handle.style.transition = 'none';
          handle.style.cursor = 'grabbing';
        }
        
        function drag(e) {
          if (!isDragging) return;
          
          const maxDrag = getDragLimit();
          const clientX = (e.type === 'touchmove') ? e.touches[0].clientX : e.clientX;
          let deltaX = clientX - startX;
          
          // Boundaries check
          if (deltaX < 0) deltaX = 0;
          if (deltaX > maxDrag) deltaX = maxDrag;
          
          currentX = deltaX;
          handle.style.transform = `translateX(${currentX}px)`;
          
          // Fade text as we drag
          const pct = currentX / maxDrag;
          text.style.opacity = 1 - (pct * 1.5);
        }
        
        function endDrag() {
          if (!isDragging) return;
          isDragging = false;
          handle.style.cursor = 'grab';
          
          const maxDrag = getDragLimit();
          
          // Trigger successful navigation if swiped over 85% of track
          if (currentX >= maxDrag * 0.85) {
            handle.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
            handle.style.transform = `translateX(${maxDrag}px)`;
            text.style.opacity = 0;
            
            // Trigger smooth custom page transition
            setTimeout(() => {
              window.location.href = href;
            }, 250);
          } else {
            // Spring back with elastic premium bezier curves
            handle.style.transition = 'transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
            handle.style.transform = 'translateX(0px)';
            text.style.opacity = 1;
            currentX = 0;
          }
        }
        
        // Desktop mouse handlers
        handle.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', endDrag);
        
        // Touchscreen handlers
        handle.addEventListener('touchstart', startDrag, { passive: true });
        window.addEventListener('touchmove', drag, { passive: false });
        window.addEventListener('touchend', endDrag);
      });
    });
  </script>

</body>
</html>
