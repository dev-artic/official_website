<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. - Under Restoration">
  <meta name="author" content="dev-artic">
  <title>artic.</title>
  
  <!-- CSS Linkage -->
  <link rel="stylesheet" href="css/main.css">
  
  <style>
    /* Splash Screen Specific Styling (Dark Gallery Default) */
    body {
      background-color: #0A0A0A;
      color: #F3F3F3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: var(--space-md);
      position: relative;
      overflow: hidden;
    }

    /* Ambient Background Glow */
    .ambient-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(184, 144, 71, 0.04) 0%, rgba(10, 10, 10, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    .splash-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 450px;
      width: 100%;
    }

    /* Central Digital Sculpture Animating */
    .sculpture-frame {
      width: 180px;
      height: 180px;
      margin-bottom: var(--space-lg);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sculpture-svg {
      width: 100%;
      height: 100%;
      animation: slowRotate 28s linear infinite;
    }

    @keyframes slowRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Branding Typography - Lowercase 'artic.' */
    .brand-logo {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      margin-bottom: var(--space-xs);
      color: #FAF9F6;
    }

    .brand-logo span {
      color: var(--accent);
      margin-left: -0.05em;
    }

    .exhibit-title {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--accent);
      margin-top: 0.25rem;
    }

    .divider {
      width: 30px;
      height: 1px;
      background-color: rgba(243, 243, 243, 0.1);
      margin: var(--space-lg) 0;
    }

    /* Elegant Glassmorphic Email Form */
    .subscribe-form-container {
      width: 100%;
      margin-top: var(--space-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .subscribe-form {
      display: flex;
      width: 100%;
      max-width: 380px;
      border: 1px solid rgba(243, 243, 243, 0.08);
      background-color: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 4px;
      transition: var(--transition-smooth);
    }

    .subscribe-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(184, 144, 71, 0.1);
    }

    .email-input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: #FAF9F6;
      background: transparent;
      outline: none;
      border: none;
    }

    .email-input::placeholder {
      color: rgba(243, 243, 243, 0.25);
    }

    .btn-submit {
      padding: 0 1.25rem;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      background-color: #FAF9F6;
      border: none;
      transition: var(--transition-fast);
    }

    .btn-submit:hover {
      background-color: var(--accent);
      color: #FAF9F6;
    }

    /* Elegant Success Notification */
    .success-box {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--accent);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      display: none;
    }

    .success-box.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>

  <div class="splash-container animate-fade">
    
    <!-- Rotating Symmetric Digital Sculpture -->
    <div class="sculpture-frame">
      <svg class="sculpture-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outermost guiding geometric circle -->
        <circle cx="100" cy="100" r="85" stroke="rgba(184, 144, 71, 0.12)" stroke-width="0.5" stroke-dasharray="2 4"/>
        
        <!-- Symmetric frames -->
        <rect x="40" y="40" width="120" height="120" stroke="var(--accent)" stroke-width="0.5" opacity="0.25"/>
        <rect x="40" y="40" width="120" height="120" stroke="rgba(243, 243, 243, 0.15)" stroke-width="0.5" transform="rotate(45 100 100)"/>
        
        <!-- Core sculpture element -->
        <circle cx="100" cy="100" r="24" stroke="var(--accent)" stroke-width="0.75" class="animate-float"/>
        <circle cx="100" cy="100" r="8" fill="var(--accent)" opacity="0.3" class="animate-float"/>
      </svg>
    </div>

    <!-- Branding Text (lowercase 'artic.') -->
    <div class="brand-logo">artic<span>.</span></div>
    
    <!-- Under Restoration Label -->
    <div class="exhibit-title">under restoration</div>
    
    <div class="divider"></div>
    
    <!-- Email Collection Form -->
    <div class="subscribe-form-container">
      <form id="subscribe-form" class="subscribe-form">
        <input type="email" id="email-field" class="email-input" placeholder="enter your email" required autocomplete="off">
        <button type="submit" class="btn-submit">notify me</button>
      </form>
      
      <!-- Success Message (appears on submit) -->
      <div id="success-message" class="success-box">
        Access requested. We will notify you.
      </div>
    </div>

  </div>

  <script>
    // Handle Glassmorphic Email Submission
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('subscribe-form');
      const successMessage = document.getElementById('success-message');
      const emailField = document.getElementById('email-field');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const email = emailField.value.trim();
        if (email) {
          // Retrieve existing subscribers or initialize new array
          let subscribers = [];
          try {
            subscribers = JSON.parse(localStorage.getItem('artic_subscribers')) || [];
          } catch(err) {
            subscribers = [];
          }
          
          // Add new email if it doesn't already exist
          if (!subscribers.includes(email)) {
            subscribers.push(email);
            localStorage.setItem('artic_subscribers', JSON.stringify(subscribers));
          }

          // Smoothly animate form hide and success message show
          form.style.opacity = '0';
          form.style.pointerEvents = 'none';
          
          setTimeout(() => {
            form.style.display = 'none';
            successMessage.classList.add('active');
          }, 400);
        }
      });
    });
  </script>

</body>
</html>
