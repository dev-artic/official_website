<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ARTIC - Modern, minimal art gallery and editorial webzine in preparation.">
  <meta name="author" content="dev-artic">
  <title>ARTIC / Silent Symmetry — Opening Soon</title>
  
  <!-- CSS Linkage -->
  <link rel="stylesheet" href="css/main.css">
  
  <style>
    /* Splash Screen Specific Styling (Dark Gallery Default) */
    body {
      background-color: #0A0A0A;
      color: #F3F3F3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: var(--space-md);
      position: relative;
      overflow: hidden;
    }

    /* Ambient Champagne Gold Background Glow */
    .ambient-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(184, 144, 71, 0.04) 0%, rgba(10, 10, 10, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    .splash-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
    }

    /* Central Digital Sculpture Animating */
    .sculpture-frame {
      width: 220px;
      height: 220px;
      margin-bottom: var(--space-lg);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sculpture-svg {
      width: 100%;
      height: 100%;
      animation: slowRotate 24s linear infinite;
    }

    @keyframes slowRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Branding Typography */
    .brand-logo {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: var(--space-xs);
      color: #FAF9F6;
    }

    .brand-logo span {
      color: var(--accent);
    }

    .exhibit-title {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: var(--accent);
      margin-bottom: var(--space-md);
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: rgba(243, 243, 243, 0.15);
      margin: var(--space-md) 0;
    }

    .status-msg {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.25rem;
      color: #A0A0A0;
      line-height: 1.6;
      margin-bottom: var(--space-sm);
    }

    .date-tag {
      font-family: var(--font-sans);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* Link to template preview for private tests */
    .preview-badge {
      margin-top: var(--space-lg);
      font-family: var(--font-sans);
      font-size: 0.75rem;
      color: rgba(243, 243, 243, 0.3);
      padding: 0.5rem 1rem;
      border: 1px solid rgba(243, 243, 243, 0.1);
      transition: var(--transition-fast);
      letter-spacing: 0.05em;
    }

    .preview-badge:hover {
      color: var(--accent);
      border-color: var(--accent);
      background-color: rgba(184, 144, 71, 0.02);
    }
  </style>
</head>
<body>

  <div class="ambient-glow"></div>

  <div class="splash-container animate-fade">
    
    <!-- Pulse-glowing Interactive Digital Sculpture -->
    <div class="sculpture-frame">
      <svg class="sculpture-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outermost guiding geometric circle -->
        <circle cx="100" cy="100" r="85" stroke="rgba(184, 144, 71, 0.15)" stroke-width="0.5" stroke-dasharray="2 4"/>
        
        <!-- Rotating symmetric frames -->
        <rect x="35" y="35" width="130" height="130" stroke="var(--accent)" stroke-width="0.5" opacity="0.3"/>
        <rect x="35" y="35" width="130" height="130" stroke="rgba(243, 243, 243, 0.2)" stroke-width="0.5" transform="rotate(45 100 100)"/>
        
        <!-- Inner glowing core -->
        <circle cx="100" cy="100" r="30" stroke="var(--accent)" stroke-width="0.75" class="animate-float"/>
        <circle cx="100" cy="100" r="10" fill="var(--accent)" opacity="0.4" class="animate-float"/>
      </svg>
    </div>

    <!-- Branding Text -->
    <div class="brand-logo">ARTIC<span>.</span></div>
    <div class="exhibit-title">Silent Symmetry</div>
    
    <div class="divider"></div>
    
    <!-- Opening Announcement -->
    <div class="status-msg">전시 및 디지털 아티스틱 저널을 준비 중입니다.</div>
    <div class="date-tag">June 2026 / Launching Soon</div>

    <!-- Private view token for the templates -->
    <a href="index-preview.html" class="preview-badge" id="btn-private-preview">Private Preview →</a>
  </div>

</body>
</html>
