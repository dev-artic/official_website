<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. - Under Restoration">
  <meta name="author" content="dev-artic">
  <title>artic.</title>
  
  <!-- CSS Linkage -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/design-system.css">
  
  <style>
    /* Splash Screen Specific Styling (Monochrome Bright Theme) */
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: var(--space-md);
      position: relative;
      overflow: hidden;
      font-family: var(--font-sans);
    }

    /* Ambient Background Glow - Disabled */
    .ambient-glow {
      display: none;
    }

    .splash-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 450px;
      width: 100%;
      margin: auto;
    }

    /* Central Digital Sculpture Animating - Pure Flat Vector Outline */
    .sculpture-frame {
      width: 160px;
      height: 160px;
      margin-bottom: var(--space-lg);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sculpture-svg {
      width: 100%;
      height: 100%;
      animation: slowRotate 36s linear infinite;
    }

    @keyframes slowRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Branding Typography - Kakao Sans */
    .brand-logo {
      font-family: var(--font-serif);
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: lowercase;
      margin-bottom: var(--space-xs);
      color: var(--text-primary);
    }

    .brand-logo span {
      color: var(--text-muted);
      margin-left: -0.05em;
    }

    .exhibit-title {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: var(--text-primary);
      margin-top: 0.25rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background-color: var(--border-color);
      margin: var(--space-lg) 0;
    }

    /* Flat Monochrome Email Form */
    .subscribe-form-container {
      width: 100%;
      margin-top: var(--space-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .subscribe-form {
      display: flex;
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border-color);
      background-color: transparent;
      padding: 4px;
      transition: var(--transition-smooth);
    }

    .subscribe-form:focus-within {
      border-color: var(--text-primary);
    }

    .email-input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      color: var(--text-primary);
      background: transparent;
      outline: none;
      border: none;
    }

    .email-input::placeholder {
      color: var(--text-muted);
    }

    .btn-submit {
      padding: 0 1.25rem;
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--bg-primary);
      background-color: var(--text-primary);
      border: none;
      transition: var(--transition-fast);
      cursor: pointer;
    }

    .btn-submit:hover {
      opacity: 0.8;
    }

    /* Success Notification */
    .success-box {
      font-family: var(--font-serif);
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(5px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      display: none;
    }

    .success-box.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    /* Brand Footer */
    footer {
      width: 100%;
      text-align: center;
      padding: var(--space-md) 0;
      border-top: 1px solid var(--border-color);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: auto;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="splash-container animate-fade">
    
    <!-- Rotating Symmetric digital wireframe sculpture -->
    <div class="sculpture-frame">
      <svg class="sculpture-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outermost guiding geometric circle -->
        <circle cx="100" cy="100" r="85" stroke="var(--border-color)" stroke-width="0.5" stroke-dasharray="2 4"/>
        
        <!-- Symmetric flat wireframes -->
        <rect x="40" y="40" width="120" height="120" stroke="var(--text-primary)" stroke-width="0.5" opacity="0.4"/>
        <rect x="40" y="40" width="120" height="120" stroke="var(--text-muted)" stroke-width="0.5" transform="rotate(45 100 100)" opacity="0.3"/>
        
        <!-- Core wireframe sculpture elements -->
        <circle cx="100" cy="100" r="24" stroke="var(--text-primary)" stroke-width="0.75"/>
        <circle cx="100" cy="100" r="8" fill="var(--text-primary)" opacity="0.2"/>
      </svg>
    </div>

    <!-- Branding Text (lowercase 'artic.') -->
    <div class="brand-logo">artic<span>.</span></div>
    
    <!-- Under Restoration Label -->
    <div class="exhibit-title">under restoration</div>
    
    <div class="divider"></div>
    
    <!-- Email Collection Form -->
    <div class="subscribe-form-container">
      <form id="subscribe-form" class="subscribe-form">
        <input type="email" id="email-field" class="email-input" placeholder="enter your email" required autocomplete="off">
        <button type="submit" class="btn-submit">notify me</button>
      </form>
      
      <!-- Success Message -->
      <div id="success-message" class="success-box">
        access requested.
      </div>
    </div>

  </div>

  <!-- Brand Footer -->
  <footer>
    artic. All Rights Reserved
  </footer>

  <!-- Firebase Web SDK Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // === Firebase Configuration ===
    const firebaseConfig = {
      apiKey: "AIzaSyAlW7fE3c8mTL4EHdU08wjnVA4U_nKl1Fo",
      authDomain: "artic-official-home.firebaseapp.com",
      projectId: "artic-official-home",
      storageBucket: "artic-official-home.firebasestorage.app",
      messagingSenderId: "259485663128",
      appId: "1:259485663128:web:9b01f04205edf4125e75ed",
      measurementId: "G-KJDZPGXQSX"
    };

    const isFirebaseConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";

    let db = null;
    if (isFirebaseConfigured) {
      try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        console.log("Firebase Firestore successfully initialized.");
      } catch (err) {
        console.error("Error initializing Firebase:", err);
      }
    }

    // Handle Form Submission
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('subscribe-form');
      const successMessage = document.getElementById('success-message');
      const emailField = document.getElementById('email-field');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailField.value.trim();
        if (email) {
          // 1. Local Storage Backup (Client-side Cache)
          let localSubscribers = [];
          try {
            localSubscribers = JSON.parse(localStorage.getItem('artic_subscribers')) || [];
          } catch(err) {
            localSubscribers = [];
          }
          if (!localSubscribers.includes(email)) {
            localSubscribers.push(email);
            localStorage.setItem('artic_subscribers', JSON.stringify(localSubscribers));
          }

          // 2. Save directly to Firebase Firestore
          if (db) {
            try {
              await addDoc(collection(db, "subscribers"), {
                email: email,
                timestamp: serverTimestamp()
              });
              console.log("Subscription successfully registered in Firebase Firestore!");
            } catch (err) {
              console.error("Failed to save to Firebase Firestore database:", err);
            }
          }

          // 3. Smooth UI fade animation
          form.style.opacity = '0';
          form.style.pointerEvents = 'none';
          
          setTimeout(() => {
            form.style.display = 'none';
            successMessage.classList.add('active');
          }, 400);
        }
      });
    });
  </script>

</body>
</html>
