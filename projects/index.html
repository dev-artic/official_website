<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. — Project Archive. Art, music, and culture curation.">
  <meta name="author" content="artic.">
  <title>Projects — artic.</title>

  <link rel="icon" type="image/png" href="../images/favicon.png">
  <link rel="stylesheet" href="../css/design-system.css">
  <link rel="stylesheet" href="style.css">

  <script>
    (function(){
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();
  </script>
</head>
<body>

  <!-- ── Floating Navigation (same as homepage) ── -->
  <nav class="nav-bar">
    <a href="/" class="nav-home animate-on-load" id="nav-home">artic.</a>
    <a href="/about/" class="nav-link">About</a>
    <a href="/projects/" class="nav-link active">Projects</a>
    <a href="/contact/" class="nav-link">Contact</a>
  </nav>

  <div class="container animate-fade-in">

    <!-- Horizontal Scroll Carousel -->
    <div class="projects-carousel" id="projects-carousel">

      <article class="project-card">
        <a href="../deus-ex-machina/" class="card-link">
          <div class="image-wrapper">
            <img src="../deus-ex-machina/album-art.png" alt="arkyteccc — deus ex machina" class="project-img">
          </div>
          <div class="project-info">
            <div class="meta-row">
              <span class="project-tag">Music</span>
              <span class="project-date">2024</span>
            </div>
            <h2 class="project-name">deus ex machina</h2>
          </div>
        </a>
      </article>

      <article class="project-card">
        <a href="../tasting-note/" class="card-link">
          <div class="image-wrapper">
            <img src="../tasting-note/album-art.png" alt="artic. — TASTING NOTE" class="project-img">
          </div>
          <div class="project-info">
            <div class="meta-row">
              <span class="project-tag">original series</span>
              <span class="project-date">2026</span>
            </div>
            <h2 class="project-name">TASTING NOTE</h2>
          </div>
        </a>
      </article>

      <article class="project-card">
        <a href="../neutral-interview/" class="card-link">
          <div class="image-wrapper">
            <img src="../neutral-interview/album-art.png" alt="artic. — NEUTRAL INTERVIEW" class="project-img">
          </div>
          <div class="project-info">
            <div class="meta-row">
              <span class="project-tag">original series</span>
              <span class="project-date">2024</span>
            </div>
            <h2 class="project-name">NEUTRAL INTERVIEW</h2>
          </div>
        </a>
      </article>
    </div>

    <footer class="gallery-footer">
      <p>© 2026 artic. All Rights Reserved</p>
    </footer>

  </div>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <script src="../js/shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Drag-to-scroll
      const c = document.getElementById('projects-carousel');
      if (!c) return;
      let down = false, sx, sl;
      c.addEventListener('mousedown', e => { down = true; sx = e.pageX - c.offsetLeft; sl = c.scrollLeft; });
      c.addEventListener('mouseleave', () => down = false);
      c.addEventListener('mouseup', () => down = false);
      c.addEventListener('mousemove', e => { if (!down) return; e.preventDefault(); c.scrollLeft = sl - (e.pageX - c.offsetLeft - sx) * 1.5; });
    });
  </script>

</body>
</html>
