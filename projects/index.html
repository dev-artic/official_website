  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const viewport = document.getElementById('dial-viewport');
      const nodes = document.querySelectorAll('.dial-year-node');
      let transitionActive = false;

      // Update 3D dial wheel scaling/opacity/rotation based on vertical center alignment
      function updateDial() {
        const viewHeight = viewport.clientHeight;
        const viewRect = viewport.getBoundingClientRect();
        
        nodes.forEach(node => {
          const title = node.querySelector('.year-title');
          const titleRect = title.getBoundingClientRect();
          
          // Calculate title center coordinate relative to viewport top
          const titleCenter = titleRect.top + titleRect.height / 2 - viewRect.top;
          const distanceFromCenter = titleCenter - viewHeight / 2;
          const maxDistance = viewHeight / 2;
          
          // Normalized distance [-1, 1]
          let ratio = distanceFromCenter / maxDistance;
          ratio = Math.max(-1, Math.min(1, ratio));
          
          // Premium 3D spherical transforms & opacity adjustments
          const scale = 1.0 + (1.2 * (1.0 - Math.abs(ratio))); // Scale from 1.0 to 2.2
          const opacity = 0.25 + (0.75 * (1.0 - Math.abs(ratio))); // Opacity from 0.25 to 1.0
          const rotateX = -45 * ratio; // Rotates year backwards on spherical curvature
          const translateY = -12 * ratio; // Sphere depth vertical offset
          
          title.style.transform = `translateY(${translateY}px) rotateX(${rotateX}deg) scale(${scale})`;
          title.style.opacity = opacity;
          
          // Highlight year title when close to center
          if (Math.abs(distanceFromCenter) < 45) {
            title.classList.add('active');
          } else {
            title.classList.remove('active');
          }
        });
      }

      viewport.addEventListener('scroll', updateDial);
      window.addEventListener('resize', updateDial);
      
      // Initial calculation after render settles
      setTimeout(updateDial, 100);

      // Animation loop to keep dial transforms active during expand/collapse height changes
      function transitionLoop() {
        if (transitionActive) {
          updateDial();
          requestAnimationFrame(transitionLoop);
        }
      }

      // Add click toggles on each year node
      nodes.forEach(node => {
        const title = node.querySelector('.year-title');
        const projectsContainer = node.querySelector('.year-projects');

        title.addEventListener('click', (e) => {
          e.stopPropagation();
          const isExpanded = node.classList.contains('expanded');

          // Close all other expanded year nodes
          nodes.forEach(otherNode => {
            if (otherNode !== node && otherNode.classList.contains('expanded')) {
              otherNode.classList.remove('expanded');
              const pc = otherNode.querySelector('.year-projects');
              pc.style.maxHeight = '0';
              pc.style.opacity = '0';
            }
          });

          transitionActive = true;
          requestAnimationFrame(transitionLoop);

          if (!isExpanded) {
            node.classList.add('expanded');
            projectsContainer.style.maxHeight = projectsContainer.scrollHeight + 'px';
            projectsContainer.style.opacity = '1';

            // Scroll the year header to the top portion of the viewport so cards are fully visible
            setTimeout(() => {
              viewport.scrollTo({
                top: node.offsetTop - 20,
                behavior: 'smooth'
              });
            }, 60);
          } else {
            node.classList.remove('expanded');
            projectsContainer.style.maxHeight = '0';
            projectsContainer.style.opacity = '0';

            // Scroll collapsed node back to the center of the viewport
            setTimeout(() => {
              const targetScroll = node.offsetTop + 40 - viewport.clientHeight / 2;
              viewport.scrollTo({
                top: targetScroll,
                behavior: 'smooth'
              });
            }, 60);
          }

          // Halt loop after transition finishes (650ms)
          setTimeout(() => {
            transitionActive = false;
            updateDial();
          }, 650);
        });
      });
    });
  </script>
