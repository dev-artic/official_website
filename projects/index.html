  <script src="../js/shared.js?v=quarterly-archive-1"></script>
  <script>

    
    // ?? Dynamic Projects Dial from /projects.json ??
    (function() {
      var track = document.querySelector('.dial-track');

      fetch('../projects.json', { cache: 'no-cache' })
        .then(function(r) { return r.json(); })
        .then(function(projects) {
          var loadingEl = document.getElementById('projects-loading');

          // Group by year descending
          var byYear = {};
          projects.forEach(function(p) {
            if (!byYear[p.year]) byYear[p.year] = [];
            byYear[p.year].push(p);
          });
          var years = Object.keys(byYear).sort(function(a, b) { return b - a; });
          var bottomSpacer = track.querySelector('.dial-spacer:last-child');

          years.forEach(function(year) {
            var node = document.createElement('div');
            node.className = 'dial-year-node';
            node.dataset.year = year;
            var cards = byYear[year].map(function(p) {
              return '<article class="project-card"><a href="' + p.slug + '" class="card-link"><div class="image-wrapper"><img src="' + p.cover_image + '" alt="' + p.client + ' \u2014 ' + p.title + '" class="project-img" loading="lazy"></div><div class="project-info"><div class="meta-row"><span class="project-tag">' + p.category + '</span></div><h3 class="project-name">' + p.title + '</h3></div></a></article>';
            }).join('');
            node.innerHTML = '<div class="year-header-wrapper"><h2 class="year-title"><span>' + year + '</span></h2></div><div class="year-projects">' + cards + '</div>';
            if (bottomSpacer) {
              track.insertBefore(node, bottomSpacer);
            } else {
              track.appendChild(node);
            }
          });

          if (loadingEl) loadingEl.remove();

          // Re-init the dial scroll since DOM changed
          var evt = new Event('projects-loaded');
          document.dispatchEvent(evt);
        })
        .catch(function(err) {
          var loadingEl = document.getElementById('projects-loading');
          if (loadingEl) loadingEl.textContent = 'Failed to load.';
        });
    })();

    var viewport = null;
    var nodes = [];
    var cards = [];
    var activeYear = '';
    var lastScrollLeft = 0;
    var wheelTimeout = null;
    var snapTimeout = null;

    function getDialPadding() {
      return window.innerWidth >= 768 ? 40 : 24;
    }

    function getFirstActiveCard() {
      if (!viewport || !cards.length) return null;

      var viewRect = viewport.getBoundingClientRect();
      var refPoint = viewRect.left + getDialPadding();

      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var cardRect = card.getBoundingClientRect();
        var cardCenter = cardRect.left + cardRect.width / 2;
        if (cardCenter >= refPoint) {
          return card;
        }
      }

      return cards[cards.length - 1] || null;
    }

    function updateActiveYear() {
      if (!viewport || !cards.length) return;

      var scrollLeft = viewport.scrollLeft;
      var direction = scrollLeft > lastScrollLeft ? 'right' : 'left';
      lastScrollLeft = scrollLeft;

      var activeCard = getFirstActiveCard();
      if (!activeCard) return;

      var parentNode = activeCard.closest('.dial-year-node');
      if (!parentNode) return;

      var year = parentNode.dataset.year;
      if (year === activeYear) return;

      activeYear = year;
      nodes.forEach(function(node) {
        var title = node.querySelector('.year-title');
        if (title) title.classList.remove('active-pop-right', 'active-pop-left');
      });

      var activeTitle = parentNode.querySelector('.year-title');
      if (activeTitle) {
        activeTitle.classList.add(direction === 'right' ? 'active-pop-right' : 'active-pop-left');
      }
    }

    function scrollToYearNode(node) {
      if (!viewport || !node) return;

      var firstCard = node.querySelector('.project-card');
      if (!firstCard) return;

      var viewRect = viewport.getBoundingClientRect();
      var cardRect = firstCard.getBoundingClientRect();
      var targetScrollLeft = viewport.scrollLeft + (cardRect.left - viewRect.left) - getDialPadding();

      if (wheelTimeout) clearTimeout(wheelTimeout);
      if (snapTimeout) clearTimeout(snapTimeout);

      viewport.style.scrollSnapType = 'none';
      viewport.style.scrollBehavior = 'auto';
      viewport.scrollTo({ left: targetScrollLeft, behavior: 'smooth' });

      snapTimeout = setTimeout(function() {
        viewport.style.scrollSnapType = 'x mandatory';
        updateActiveYear();
      }, 400);
    }

    function snapToClosestCard() {
      var targetCard = getFirstActiveCard();

      if (!viewport || !targetCard) {
        if (viewport) viewport.style.scrollSnapType = 'x mandatory';
        return;
      }

      var viewRect = viewport.getBoundingClientRect();
      var cardRect = targetCard.getBoundingClientRect();
      var targetScrollLeft = viewport.scrollLeft + (cardRect.left - viewRect.left) - getDialPadding();

      viewport.scrollTo({ left: targetScrollLeft, behavior: 'smooth' });

      snapTimeout = setTimeout(function() {
        viewport.style.scrollSnapType = 'x mandatory';
        updateActiveYear();
      }, 400);
    }

    function initDialScrollLogic() {
      viewport = document.getElementById('dial-viewport');
      if (!viewport) return;

      nodes = Array.from(document.querySelectorAll('.dial-year-node'));
      cards = Array.from(document.querySelectorAll('.project-card'));

      nodes.forEach(function(node) {
        var title = node.querySelector('.year-title');
        if (!title || title.dataset.dialClickBound === 'true') return;

        title.dataset.dialClickBound = 'true';
        title.style.cursor = 'pointer';
        title.addEventListener('click', function() {
          scrollToYearNode(node);
        });
      });

      setTimeout(updateActiveYear, 100);
    }

    document.addEventListener('projects-loaded', initDialScrollLogic);

    document.addEventListener('DOMContentLoaded', function() {
      viewport = document.getElementById('dial-viewport');
      if (!viewport) return;

      viewport.addEventListener('wheel', function(e) {
        if (window.innerWidth >= 768) {
          e.preventDefault();

          if (wheelTimeout) clearTimeout(wheelTimeout);
          if (snapTimeout) clearTimeout(snapTimeout);

          viewport.style.scrollSnapType = 'none';
          viewport.style.scrollBehavior = 'auto';
          viewport.scrollLeft += e.deltaY !== 0 ? e.deltaY : e.deltaX;

          wheelTimeout = setTimeout(snapToClosestCard, 150);
        }
      }, { passive: false });

      viewport.addEventListener('scroll', updateActiveYear);
      window.addEventListener('resize', updateActiveYear);
      initDialScrollLogic();
    });
  
</script>
