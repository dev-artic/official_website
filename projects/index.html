  <script src="../js/shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const viewport = document.getElementById('dial-viewport');
      const nodes = document.querySelectorAll('.dial-year-node');
      let transitionActive = false;

      // Update 3D dial wheel scaling/opacity/rotation based on vertical center alignment
      function updateDial() {
        if (window.innerWidth >= 768) {
          // Reset inline styles on desktop to avoid conflicts with sticky/flex layout
          nodes.forEach(node => {
            const title = node.querySelector('.year-title');
            title.style.transform = '';
            title.style.opacity = '';
            const pc = node.querySelector('.year-projects');
            if (pc) {
              pc.style.maxHeight = '';
              pc.style.opacity = '';
            }
          });
          return;
        }

        const viewHeight = viewport.clientHeight;
        const viewRect = viewport.getBoundingClientRect();
        
        let closestNode = null;
        let minDistance = Infinity;

        nodes.forEach(node => {
          const title = node.querySelector('.year-title');
          const titleRect = title.getBoundingClientRect();
          
          // Calculate title center coordinate relative to viewport top
          const titleCenter = titleRect.top + titleRect.height / 2 - viewRect.top;
          const distanceFromCenter = titleCenter - viewHeight / 2;
          const maxDistance = viewHeight / 2;
          
          // Normalized distance [-1, 1]
          let ratio = distanceFromCenter / maxDistance;
          ratio = Math.max(-1, Math.min(1, ratio));
          
          // Scaled down mobile size factor (1.0 to 1.5)
          const scale = 1.0 + (0.5 * (1.0 - Math.abs(ratio)));
          const opacity = 0.25 + (0.75 * (1.0 - Math.abs(ratio)));
          const rotateX = -40 * ratio;
          const translateY = -10 * ratio;
          
          title.style.transform = `translateY(${translateY}px) rotateX(${rotateX}deg) scale(${scale})`;
          title.style.opacity = opacity;
          
          // Highlight year title when close to center
          if (Math.abs(distanceFromCenter) < 45) {
            title.classList.add('active');
          } else {
            title.classList.remove('active');
          }

          if (Math.abs(distanceFromCenter) < minDistance) {
            minDistance = Math.abs(distanceFromCenter);
            closestNode = node;
          }
        });

        // Auto-expand active node and collapse others on scroll (mobile only)
        if (closestNode && !transitionActive && !closestNode.classList.contains('expanded')) {
          const prevNode = document.querySelector('.dial-year-node.expanded');
          if (prevNode !== closestNode) {
            transitionActive = true;
            requestAnimationFrame(transitionLoop);

            // Collapse previous active node
            if (prevNode) {
              prevNode.classList.remove('expanded');
              const pc = prevNode.querySelector('.year-projects');
              if (pc) {
                pc.style.maxHeight = '0';
                pc.style.opacity = '0';
              }
            }

            // Expand new active node
            closestNode.classList.add('expanded');
            const pc = closestNode.querySelector('.year-projects');
            if (pc) {
              pc.style.maxHeight = pc.scrollHeight + 'px';
              pc.style.opacity = '1';
            }

            // Keep transition active lock for 500ms
            setTimeout(() => {
              transitionActive = false;
              updateDial();
            }, 500);
          }
        }
      }

      viewport.addEventListener('scroll', updateDial);
      window.addEventListener('resize', updateDial);
      
      // Initial calculation after render settles
      setTimeout(updateDial, 100);

      // Animation loop to keep dial transforms active during height transition
      function transitionLoop() {
        if (transitionActive) {
          updateDial();
          requestAnimationFrame(transitionLoop);
        }
      }

      // Clicking a title will scroll it to the center (which auto-expands it)
      nodes.forEach(node => {
        const title = node.querySelector('.year-title');
        title.addEventListener('click', (e) => {
          e.stopPropagation();
          if (window.innerWidth >= 768) return; // Only custom click logic on mobile

          const targetScroll = node.offsetTop - viewport.clientHeight / 2 + title.clientHeight / 2;
          viewport.scrollTo({
            top: targetScroll,
            behavior: 'smooth'
          });
        });
      });

      // Desktop: Translate vertical mouse wheel scroll to horizontal container scroll
      viewport.addEventListener('wheel', (e) => {
        if (window.innerWidth >= 768 && e.deltaY !== 0) {
          e.preventDefault();
          viewport.scrollLeft += e.deltaY;
        }
      }, { passive: false });
    });
  </script>
</body>
</html>
