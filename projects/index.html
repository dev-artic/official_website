  <div class="delayed-reveal container">
    <div class="dial-viewport" id="dial-viewport">
      <div class="dial-track">
        
        <!-- Top Spacer to allow first year to center -->

        <!-- Projects rendered dynamically from /projects.json -->

  <script src="../js/shared.js"></script>
  <script>

    
    // ?? Dynamic Projects Dial from /projects.json ??
    (function() {
      var track = document.querySelector('.dial-track');

      fetch('../projects.json', { cache: 'no-cache' })
        .then(function(r) { return r.json(); })
        .then(function(projects) {
          var loadingEl = document.getElementById('projects-loading');

          // Group by year descending
          var byYear = {};
          projects.forEach(function(p) {
            if (!byYear[p.year]) byYear[p.year] = [];
            byYear[p.year].push(p);
          });
          var years = Object.keys(byYear).sort(function(a, b) { return b - a; });
          var bottomSpacer = track.querySelector('.dial-spacer:last-child');

          years.forEach(function(year) {
            var node = document.createElement('div');
            node.className = 'dial-year-node';
            node.dataset.year = year;
            var cards = byYear[year].map(function(p) {
              return '<article class="project-card"><a href="' + p.slug + '" class="card-link"><div class="image-wrapper"><img src="' + p.cover_image + '" alt="' + p.client + ' \u2014 ' + p.title + '" class="project-img" loading="lazy"></div><div class="project-info"><div class="meta-row"><span class="project-tag">' + p.category + '</span></div><h3 class="project-name">' + p.title + '</h3></div></a></article>';
            }).join('');
            node.innerHTML = '<div class="year-header-wrapper"><h2 class="year-title"><span>' + year + '</span></h2></div><div class="year-projects">' + cards + '</div>';
            if (bottomSpacer) {
              track.insertBefore(node, bottomSpacer);
            } else {
              track.appendChild(node);
            }
          });

          if (loadingEl) loadingEl.remove();

          // Re-init the dial scroll since DOM changed
          var evt = new Event('projects-loaded');
          document.dispatchEvent(evt);
        })
        .catch(function(err) {
          var loadingEl = document.getElementById('projects-loading');
          if (loadingEl) loadingEl.textContent = 'Failed to load.';
        });
    })();

    document.addEventListener('projects-loaded', function() {
      initDialScrollLogic();
    });

    document.addEventListener('DOMContentLoaded', () => {
      const viewport = document.getElementById('dial-viewport');
      // nodes/cards queried dynamically after projects-loaded
      let nodes = [];
      let cards = [];
      let activeYear = '';
      let lastScrollLeft = 0;

      // Desktop: Translate vertical/horizontal mouse wheel scroll to horizontal container scroll with smooth snapping
      let wheelTimeout = null;
      let snapTimeout = null;

      viewport.addEventListener('wheel', (e) => {
        if (window.innerWidth >= 768) {
          // Prevent browser's default scroll behavior
          e.preventDefault();

          // Clear any active snap timer
          if (wheelTimeout) clearTimeout(wheelTimeout);
          if (snapTimeout) clearTimeout(snapTimeout);

          // Temporarily disable native CSS snap to allow fluid wheel movement
          viewport.style.scrollSnapType = 'none';
          viewport.style.scrollBehavior = 'auto';

          // Accumulate scroll (translating Y or X delta to horizontal scroll)
          const delta = e.deltaY !== 0 ? e.deltaY : e.deltaX;
          viewport.scrollLeft += delta;

          // Set debounce timer to trigger snap when wheel interaction stops
          wheelTimeout = setTimeout(() => {
            snapToClosestCard();
          }, 150);
        }
      }, { passive: false });

      function snapToClosestCard() {
        const scrollLeft = viewport.scrollLeft;
        const pad = window.innerWidth >= 768 ? 40 : 24;
        const viewRect = viewport.getBoundingClientRect();
        const refPoint = viewRect.left + pad;

        let targetCard = null;

        // Find the first card whose center coordinate has not crossed to the left of refPoint (50% threshold)
        for (let i = 0; i < cards.length; i++) {
          const card = cards[i];
          const cardRect = card.getBoundingClientRect();
          const cardCenter = cardRect.left + cardRect.width / 2;
          if (cardCenter >= refPoint) {
            targetCard = card;
            break;
          }
        }

        // Fallback to the last card if scrolled completely to the end
        if (!targetCard && cards.length > 0) {
          targetCard = cards[cards.length - 1];
        }

        if (targetCard) {
          // Calculate the target scroll position for this card to align with scroll-padding-left
          const cardRect = targetCard.getBoundingClientRect();
          const targetScrollLeft = viewport.scrollLeft + (cardRect.left - viewRect.left) - pad;
          
          viewport.scrollTo({
            left: targetScrollLeft,
            behavior: 'smooth'
          });

          // Restore scroll-snap-type after the smooth scroll finishes
          snapTimeout = setTimeout(() => {
            viewport.style.scrollSnapType = 'x mandatory';
            // Trigger active year update manually once snapped
            updateActiveYear();
          }, 400);
        } else {
          // Fallback if no cards found
          viewport.style.scrollSnapType = 'x mandatory';
        }
      }

      // Track active year and trigger pop animation when it snaps/aligns to left edge
      function updateActiveYear() {
        const scrollLeft = viewport.scrollLeft;
        const direction = scrollLeft > lastScrollLeft ? 'right' : 'left';
        lastScrollLeft = scrollLeft;

        let activeCard = null;
        const viewRect = viewport.getBoundingClientRect();
        
        // Offset padding on mobile is 24px, on desktop is 40px
        const pad = window.innerWidth >= 768 ? 40 : 24;
        const refPoint = viewRect.left + pad;

        // Find the first card whose center coordinate has not crossed the reference point
        // Meaning the previous card has crossed by more than 50% of its width
        for (let i = 0; i < cards.length; i++) {
          const card = cards[i];
          const cardRect = card.getBoundingClientRect();
          const cardCenter = cardRect.left + cardRect.width / 2;
          if (cardCenter >= refPoint) {
            activeCard = card;
            break;
          }
        }

        // Fallback to the last card if scrolled completely to the end
        if (!activeCard && cards.length > 0) {
          activeCard = cards[cards.length - 1];
        }

        if (activeCard) {
          // Find the parent year node to extract the year
          const parentNode = activeCard.closest('.dial-year-node');
          if (parentNode) {
            const year = parentNode.dataset.year;
            if (year !== activeYear) {
              activeYear = year;
              
              // Reset active classes
              nodes.forEach(n => {
                const t = n.querySelector('.year-title');
                if (t) {
                  t.classList.remove('active-pop-right', 'active-pop-left');
                }
              });
              
              // Add directional chewy transition class to new active year title
              const activeTitle = parentNode.querySelector('.year-title');
              if (activeTitle) {
                const popClass = direction === 'right' ? 'active-pop-right' : 'active-pop-left';
                activeTitle.classList.add(popClass);
              }
            }
          }
        }
      }

      // Click on Year Title to scroll directly to that year's first project
      nodes.forEach(node => {
        const title = node.querySelector('.year-title');
        if (title) {
          title.style.cursor = 'pointer';
          title.addEventListener('click', () => {
            const firstCard = node.querySelector('.project-card');
            if (firstCard) {
              const pad = window.innerWidth >= 768 ? 40 : 24;
              const viewRect = viewport.getBoundingClientRect();
              const cardRect = firstCard.getBoundingClientRect();
              const targetScrollLeft = viewport.scrollLeft + (cardRect.left - viewRect.left) - pad;

              if (wheelTimeout) clearTimeout(wheelTimeout);
              if (snapTimeout) clearTimeout(snapTimeout);

              viewport.style.scrollSnapType = 'none';
              viewport.style.scrollBehavior = 'auto';

              viewport.scrollTo({
                left: targetScrollLeft,
                behavior: 'smooth'
              });

              snapTimeout = setTimeout(() => {
                viewport.style.scrollSnapType = 'x mandatory';
                updateActiveYear();
              }, 400);
            }
          });
        }
      });

      // Track scroll position for header snapping transitions
      viewport.addEventListener('scroll', updateActiveYear);
      window.addEventListener('resize', updateActiveYear);
      
      // Initialize state
      setTimeout(updateActiveYear, 100);
    });

    function initDialScrollLogic() {
      // Re-query after DOM is populated
      nodes = Array.from(document.querySelectorAll('.dial-year-node'));
      cards = Array.from(document.querySelectorAll('.project-card'));
      // Re-bind year title click handlers
      nodes.forEach(function(node) {
        var title = node.querySelector('.year-title');
        if (title) {
          title.style.cursor = 'pointer';
          title.addEventListener('click', function() {
            var firstCard = node.querySelector('.project-card');
            if (firstCard) {
              var pad = window.innerWidth >= 768 ? 40 : 24;
              var viewRect = viewport.getBoundingClientRect();
              var cardRect = firstCard.getBoundingClientRect();
              var targetScrollLeft = viewport.scrollLeft + (cardRect.left - viewRect.left) - pad;
              if (wheelTimeout) clearTimeout(wheelTimeout);
              if (snapTimeout) clearTimeout(snapTimeout);
              viewport.style.scrollSnapType = 'none';
              viewport.style.scrollBehavior = 'auto';
              viewport.scrollTo({ left: targetScrollLeft, behavior: 'smooth' });
              snapTimeout = setTimeout(function() {
                viewport.style.scrollSnapType = 'x mandatory';
                updateActiveYear();
              }, 400);
            }
          });
        }
      });
      setTimeout(updateActiveYear, 100);
    }
  
</script>
