<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="artic. — Quarterly. Notion database-driven webzine.">
  <meta name="author" content="artic.">
  <title>Quarterly — artic.</title>

  <link rel="icon" type="image/png" href="../images/favicon.png">
  <link rel="stylesheet" href="../css/design-system.css">

  <script>
    (function(){
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();
  </script>

  <style>
    body {
      overflow-x: hidden;
    }

    /* ── Layout ── */
    .about-content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--gutter);
      padding-top: 80px; /* space for floating nav */
    }

    /* ── Row: Two-column split ── */
    .about-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 8vw, 120px);
      padding: var(--space-xxl) 0;
      position: relative;
      align-items: start;
    }

    /* Premium staggered horizontal border line wipe */
    .about-row::before {
      content: '';
      position: absolute;
      top: 0;
      left: calc(-1 * var(--gutter));
      right: calc(-1 * var(--gutter));
      height: 1px;
      background-color: var(--border-color);
      transform: scaleX(0);
      transform-origin: left center;
      animation: borderWipe 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform;
      transition: background-color 0.5s ease;
    }

    .about-row:first-child::before {
      display: none;
    }

    .about-row:first-child {
      border-top: none;
      padding-top: var(--space-xl);
    }

    /* ── Headline ── */
    .about-headline {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    /* ── Description block ── */
    .about-desc-en {
      font-family: var(--font-sans);
      font-size: 0.82rem;
      line-height: 1.75;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }

    .about-desc-ko {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      line-height: 1.75;
      color: var(--text-muted);
      margin-bottom: var(--space-lg);
    }

    /* ── Action Links ── */
    .about-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .about-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 0px; /* Sharp corners matching artic. */
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .about-action:hover {
      background-color: var(--text-primary);
      border-color: var(--text-primary);
      color: var(--bg-primary);
      transform: translateY(-1px);
    }

    /* ── Waitlist Form Style ── */
    .waitlist-container {
      margin-top: 32px;
      position: relative;
      min-height: 48px;
    }

    #waitlist-toggle-btn {
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .waitlist-form {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      width: 100%;
      max-width: 320px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .waitlist-form.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      position: relative;
    }

    .waitlist-form input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      font-family: var(--font-sans);
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      color: var(--text-primary);
      outline: none;
    }

    .waitlist-form input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .waitlist-form button {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .waitlist-form button svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-primary);
      stroke-width: 2;
      fill: none;
      transition: stroke 0.3s ease, transform 0.3s ease;
    }

    .waitlist-form button:hover svg {
      transform: translateX(2px);
    }
    
    .waitlist-form button:disabled svg {
      stroke: var(--text-muted);
      cursor: not-allowed;
    }

    .waitlist-message {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      margin-top: 12px;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(4px);
      transition: all 0.4s ease;
    }

    .waitlist-message.active {
      opacity: 1;
      transform: translateY(0);
    }

    .waitlist-message.success {
      color: var(--text-primary);
    }

    .waitlist-message.error {
      color: #E06C75;
    }

    /* ── Footer ── */
    .about-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-lg) var(--gutter);
      border-top: 1px solid var(--border-color);
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
      text-align: right;
    }

    @keyframes borderWipe {
      to { transform: scaleX(1); }
    }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .about-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 100px;
        padding-bottom: 60px;
      }
      .about-row {
        padding: var(--space-lg) 0;
      }
      .about-row:first-child {
        padding-top: 0;
      }
      .about-footer {
        margin-top: auto;
      }
    }

    @media (max-width: 767px) {
      .about-content {
        padding-top: 80px !important;
      }

      .about-row {
        grid-template-columns: 1fr;
        gap: var(--space-lg);
        padding: var(--space-lg) 0;
      }

      .about-headline {
        font-size: clamp(1.4rem, 6vw, 1.7rem) !important;
        line-height: 1.35 !important;
        letter-spacing: -0.01em !important;
        font-weight: 600 !important;
        margin-bottom: 16px !important;
        text-align: left !important;
      }

      .about-desc-en {
        font-size: 0.75rem !important;
        line-height: 1.8 !important;
        color: var(--text-secondary) !important;
        text-align: left !important;
        margin-left: 0 !important;
        max-width: 100% !important;
        margin-bottom: 16px !important;
      }

      .about-desc-ko {
        font-size: 0.72rem !important;
        line-height: 1.8 !important;
        color: var(--text-muted) !important;
        text-align: left !important;
        margin-right: 0 !important;
        max-width: 100% !important;
        margin-bottom: 0 !important;
      }

      .waitlist-container {
        margin-top: 24px;
        margin-bottom: 24px;
      }

      .waitlist-form {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Navigation -->
  <nav class="nav-bar delayed-reveal">
    <a href="/" class="nav-home visible" id="nav-home">artic.</a>
    <a href="/about/" class="nav-link">About</a>
    <a href="/projects/" class="nav-link">Projects</a>
    <a href="javascript:void(0)" class="nav-link nav-artic-le">artic.le</a>
    <a href="/quarterly/" class="nav-link active">Quarterly</a>
    <a href="/contact/" class="nav-link">Contact</a>
  </nav>

  <div class="delayed-reveal about-content animate-fade-in">

    <!-- Row 1: Headline + Description & Waitlist -->
    <div class="about-row">
      <div>
        <h1 class="about-headline">QUARTERLY.<br>Curated art & music.</h1>
      </div>
      <div>
        <p class="about-desc-en">
          Curated albums, artworks, and diverse artistic insights,<br>delivered every quarter.
        </p>
        <p class="about-desc-ko">
          매 분기 발매된 앨범, 작품, 그리고 다양한 예술 소식을 전합니다.
        </p>
        
        <div class="waitlist-container">
          <button id="waitlist-toggle-btn" class="about-action">Join the Waitlist</button>
          <form id="waitlist-form" class="waitlist-form">
            <input type="email" id="waitlist-email" placeholder="ENTER YOUR EMAIL ADDRESS" required>
            <button type="submit" id="waitlist-submit-btn" aria-label="Submit email">
              <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </form>
          <div id="waitlist-message" class="waitlist-message"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="about-footer">
    © 2026 artic. All Rights Reserved
  </footer>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <script src="../js/shared.js"></script>
  <script>
    // Waitlist Form Interactivity
    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById('waitlist-toggle-btn');
      const form = document.getElementById('waitlist-form');
      const emailInput = document.getElementById('waitlist-email');
      const submitBtn = document.getElementById('waitlist-submit-btn');
      const messageDiv = document.getElementById('waitlist-message');

      if (toggleBtn && form) {
        toggleBtn.addEventListener('click', () => {
          // Hide button and reveal form
          toggleBtn.style.opacity = '0';
          toggleBtn.style.pointerEvents = 'none';
          setTimeout(() => {
            toggleBtn.style.display = 'none';
            form.classList.add('active');
            emailInput.focus();
          }, 300);
        });
      }

      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const email = emailInput.value.trim();
          if (!email) return;

          // Submitting state
          submitBtn.disabled = true;
          emailInput.disabled = true;
          messageDiv.className = 'waitlist-message';
          messageDiv.textContent = '';

          const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.port === '8000';
          const apiUrl = isLocal ? '/api/waitlist' : 'https://us-central1-artic-official-home.cloudfunctions.net/waitlist';

          fetch(apiUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email: email })
          })
          .then(res => {
            if (!res.ok) {
              return res.json().then(err => { throw new Error(err.error || 'Submission failed') });
            }
            return res.json();
          })
          .then(data => {
            // Success state
            messageDiv.className = 'waitlist-message success active';
            messageDiv.textContent = 'You have successfully joined the waitlist.';
            form.style.opacity = '0.3';
            form.style.pointerEvents = 'none';
          })
          .catch(err => {
            // Error state
            submitBtn.disabled = false;
            emailInput.disabled = false;
            messageDiv.className = 'waitlist-message error active';
            messageDiv.textContent = err.message || 'An error occurred. Please try again.';
          });
        });
      }
    });
  </script>

</body>
</html>
