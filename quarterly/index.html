    (function(){
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      window.scrollTo(0, 0);
      window.addEventListener('pageshow', function() { window.scrollTo(0, 0); });
      var s = localStorage.getItem('artic-theme');
      if (s === 'dark') document.documentElement.style.background = '#1A1A1A';
      else if (!s) { var h = new Date().getHours(); if (h >= 19 || h < 6) document.documentElement.style.background = '#1A1A1A'; }
    })();

<style>
/* ── Waitlist Form Style ── */
  .waitlist-container {
    position: relative;
    width: 100%;
    margin-top: 16px;
  }

  #waitlist-toggle-btn {
    opacity: 1;
    display: inline-flex;
    transition: opacity 0.4s ease, all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .grid-collapse-wrapper:not(.active) #waitlist-toggle-btn {
    opacity: 0;
    pointer-events: none;
  }

  .about-action svg {
    width: 10px;
    height: 10px;
    fill: var(--text-primary);
    transition: fill 0.4s ease, transform 0.4s ease;
  }
  .about-action:hover svg {
    fill: var(--bg-primary);
    transform: scale(1.1);
  }

  .waitlist-form {
    width: 100%;
    max-width: 320px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    padding-top: 12px;
  }

  .grid-collapse-wrapper.active .waitlist-form {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* Fields stacked layout */
  .waitlist-fields-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 14px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .waitlist-form.submitting .waitlist-fields-wrapper {
    opacity: 0.3;
    pointer-events: none;
    transform: translateY(-4px);
  }

  .waitlist-field-group {
    position: relative;
    width: 100%;
  }

  .waitlist-form input {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border-color);
    padding: 10px 0;
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--text-primary);
    outline: none;
    border-radius: 0;
    transition: border-color 0.4s ease;
  }

  .waitlist-form input:focus {
    border-bottom-color: var(--text-primary);
  }

  /* Soft red error styling */
  .waitlist-form input.waitlist-input-error {
    border-bottom-color: #E06C75 !important;
  }

  /* Submit button inside email group */
  .waitlist-field-group button {
    position: absolute;
    right: 0;
    bottom: 0;
    background: none;
    border: none;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0;
  }

  .waitlist-field-group button svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-primary);
    transition: stroke 0.3s ease, transform 0.3s ease;
  }

  .waitlist-field-group button:hover svg {
    transform: translateX(3px);
  }

  .waitlist-field-group button:disabled svg {
    stroke: var(--text-muted);
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Interactive tactile shake animation */
  @keyframes waitlistShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .waitlist-shake {
    animation: waitlistShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  /* Sliding progress line loader */
  .waitlist-loading-bar {
    display: none;
    width: 100%;
    max-width: 320px;
    height: 1px;
    background-color: var(--border-color);
    position: relative;
    overflow: hidden;
    margin-top: 12px;
  }

  .waitlist-container.submitting .waitlist-loading-bar {
    display: block;
  }

  .waitlist-loading-progress {
    width: 40%;
    height: 100%;
    background-color: var(--text-primary);
    position: absolute;
    left: -40%;
    animation: waitlistLoading 1s infinite linear;
  }

  @keyframes waitlistLoading {
    from { left: -40%; }
    to { left: 100%; }
  }

  /* Success & error messages styling */
  .waitlist-message {
    font-family: var(--font-sans);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: left;
    max-width: 320px;
    padding-top: 16px;
  }

  .grid-collapse-wrapper.active .waitlist-message {
    opacity: 1;
    transform: translateY(0);
  }

  .waitlist-message .success-title {
    font-family: var(--font-logo);
    font-size: 1.2rem;
    font-weight: normal;
    letter-spacing: 0.05em;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .waitlist-message .success-desc {
    font-size: 0.65rem;
    line-height: 1.6;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .waitlist-message.error {
    font-size: 0.65rem;
    line-height: 1.5;
    color: #E06C75;
    letter-spacing: 0.02em;
  }

body {
      overflow-x: hidden;
    }

    /* ── Layout ── */
    .about-content {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--gutter);
      padding-top: 80px; /* space for floating nav */
    }

    /* ── Row: Two-column split ── */
    .about-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 8vw, 120px);
      padding: var(--space-xxl) 0;
      position: relative;
      align-items: start;
    }

    /* Premium staggered horizontal border line wipe */
    .about-row::before {
      content: '';
      position: absolute;
      top: 0;
      left: calc(-1 * var(--gutter));
      right: calc(-1 * var(--gutter));
      height: 1px;
      background-color: var(--border-color);
      transform: scaleX(0);
      transform-origin: left center;
      animation: borderWipe 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform;
      transition: background-color 0.5s ease;
    }

    .about-row:first-child::before {
      display: none;
    }

    .about-row:first-child {
      border-top: none;
      padding-top: var(--space-xl);
    }

    /* ── Headline ── */
    .about-headline {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    /* ── Description block ── */
    .about-desc-en {
      font-family: var(--font-sans);
      font-size: 0.82rem;
      line-height: 1.75;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }

    .about-desc-ko {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      line-height: 1.75;
      color: var(--text-muted);
      margin-bottom: var(--space-lg);
    }

    /* ── Action Links ── */
    .about-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .about-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 0px; /* Sharp corners matching artic. */
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    .about-action:hover {
      background-color: var(--text-primary);
      border-color: var(--text-primary);
      color: var(--bg-primary);
      transform: translateY(-1px);
    }

    .about-action svg {
      width: 10px;
      height: 10px;
      fill: var(--text-primary);
      transition: fill 0.4s ease, transform 0.4s ease;
    }

    .about-action:hover svg {
      fill: var(--bg-primary);
      transform: scale(1.1);
    }



    /* ── Footer ── */
    .about-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-lg) var(--gutter);
      border-top: 1px solid var(--border-color);
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
      text-align: right;
    }

    @keyframes borderWipe {
      to { transform: scaleX(1); }
    }

    /* ── Responsive ── */
    @media (min-width: 768px) {
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .about-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 100px;
        padding-bottom: 60px;
      }
      .about-row {
        padding: var(--space-lg) 0;
      }
      .about-row:first-child {
        padding-top: 0;
      }
      .about-footer {
        margin-top: auto;
      }
    }

    @media (max-width: 767px) {
      .about-content {
        padding-top: 80px !important;
      }

      .about-row {
        grid-template-columns: 1fr;
        gap: var(--space-lg);
        padding: var(--space-lg) 0;
      }

      .about-headline {
        font-size: clamp(1.4rem, 6vw, 1.7rem) !important;
        line-height: 1.35 !important;
        letter-spacing: -0.01em !important;
        font-weight: 600 !important;
        margin-bottom: 16px !important;
        text-align: left !important;
      }

      .about-desc-en {
        font-size: 0.75rem !important;
        line-height: 1.8 !important;
        color: var(--text-secondary) !important;
        text-align: left !important;
        margin-left: 0 !important;
        max-width: 100% !important;
        margin-bottom: 16px !important;
      }

      .about-desc-ko {
        font-size: 0.72rem !important;
        line-height: 1.8 !important;
        color: var(--text-muted) !important;
        text-align: left !important;
        margin-right: 0 !important;
        max-width: 100% !important;
        margin-bottom: 0 !important;
      }


    }
</style>
