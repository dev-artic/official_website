---
layout: base
title: "Contact"
description: "artic. — Contact"
path_depth: "../"
---
<style>
body {
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .contact-wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--gutter);
      padding-top: 80px;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }

    .contact-header,
    .contact-grid {
      max-width: 780px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .contact-header {
      margin-bottom: 48px; /* Reduced header spacing */
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .contact-sub {
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: var(--text-muted);
      display: block;
      margin-bottom: 16px;
    }

    .contact-title {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      font-weight: 700;
      line-height: 1.25;
      color: var(--text-primary);
      max-width: 580px;
      letter-spacing: -0.01em;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      margin-bottom: 40px; /* Reduced margin-bottom to prevent forcing scrollbar */
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    @media (min-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr 1fr;
        gap: 64px;
      }
    }

    .contact-channel {
      border-top: 1px solid var(--border-color);
      padding-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      transition: border-color 0.5s ease;
    }

    .channel-label {
      font-family: var(--font-sans);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .channel-link {
      font-family: var(--font-sans);
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 400;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.3s ease;
      word-break: break-all;
      position: relative;
      display: inline-block;
    }

    .channel-link::after {
      content: '';
      position: absolute;
      width: 100%;
      transform: scaleX(0);
      height: 1px;
      bottom: -2px;
      left: 0;
      background-color: var(--text-primary);
      transform-origin: bottom right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .channel-link:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    .channel-action {
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .channel-action:hover {
      color: var(--text-primary);
    }



    .contact-footer {
      margin-top: auto;
      padding: var(--space-lg) 0;
      border-top: 1px solid var(--border-color);
      text-align: right;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
</style>

{{HEADER}}

  <div class="delayed-reveal contact-wrap">
    
    <div class="contact-header">
      <h1 class="contact-title">Reach out to us.</h1>
    </div>

    <div class="contact-grid">
      
      <div class="contact-channel">
        <span class="channel-label">EMAIL</span>
        <a href="mailto:admin@artic.live" class="channel-link">admin@artic.live</a>
        <span class="channel-action" onclick="copyText('admin@artic.live', this)">COPY ADDRESS</span>
      </div>

      <div class="contact-channel">
        <span class="channel-label">INSTAGRAM</span>
        <a href="https://instagram.com/artic.live" target="_blank" rel="noopener" class="channel-link">@artic.live</a>
        <a href="https://instagram.com/artic.live" target="_blank" rel="noopener" class="channel-action">SEND DIRECT MESSAGE</a>
      </div>

    </div>

  </div>

  

  

  <script src="../js/shared.js"></script>
  <script>
    function copyText(text, btnElement) {
      navigator.clipboard.writeText(text).then(() => {
        btnElement.innerText = 'COPIED!';
        setTimeout(() => {
          btnElement.innerText = 'COPY ADDRESS';
        }, 2000);
      });
    }
  </script>

<script>
function copyText(text, btnElement) {

        btnElement.innerText = 'COPIED!';
        setTimeout(() => {
          btnElement.innerText = 'COPY ADDRESS';

      });
    }
</script>
