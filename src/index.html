---
layout: base
title: "artic."
description: "artic. — Art, Culture, and Archive"
path_depth: ""
---
<style>
/* -- Nav (initial: hidden, appears after logo animation) -- */
    @media (min-width: 768px) {
      .nav-bar {
        opacity: 0;
        transform: translateY(-12px);
        animation: navReveal 0.7s var(--ease-out-expo) 1.8s forwards;
      }

      @keyframes navReveal {
        to { opacity: 1; transform: translateY(0); }
      }
    }

    /* -- Hero About Button (discover) -- */
    .hero-about-btn {
      position: absolute;
      top: calc(50svh + 100px); /* Logo center (50svh) + half height (36px) + gap (64px) */
      left: 50%;
      opacity: 0;
      transform: translate(-50%, 10px);
      animation: buttonReveal 0.8s var(--ease-out-expo) 1.8s forwards;
      z-index: 10;
    }

    @keyframes buttonReveal {
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    /* — Section Link — */

    /* ??Hero Section ??*/
    .hero {
      min-height: 100vh;
      min-height: var(--viewport-stable);
      position: relative;
    }

    .logo-split {
      position: absolute;
      top: 50svh;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      aspect-ratio: 434 / 313;
    }

    .logo-split img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: auto;
      display: block;
    }

    .logo-icon-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(0 0 54% 0);
      overflow: hidden;
    }

    .logo-type-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      clip-path: inset(55.5% 0 -5px 0);
      overflow: hidden;
    }

    .logo-icon {
      transform: translateY(40px);
      animation: revealIcon 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    .logo-type {
      transform: translateY(-36px);
      animation: revealType 1.2s var(--ease-out-expo) 0.3s forwards;
    }

    @keyframes revealIcon {
      from { transform: translateY(40px); }
      to   { transform: translateY(0); }
    }

    @keyframes revealType {
      from { transform: translateY(-36px); }
      to   { transform: translateY(0); }
    }

    /* ??Content Sections ??*/
    .content-section {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-xxl) var(--gutter);
      border-top: 1px solid var(--border-color);
      transition: border-color 0.5s ease;
    }

    .section-tag {
      display: block;
      font-family: var(--font-sans);
      font-size: 0.6rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: var(--space-md);
      max-width: 600px;
    }

    .section-desc {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-secondary);
      max-width: 480px;
      margin-bottom: var(--space-lg);
    }

    /* ??Animate on load ??*/
    .animate-on-load {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUp 0.8s var(--ease-out-expo) forwards;
    }

    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      opacity: 0;
      animation: fadeIn 0.8s ease 0.5s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ??Projects Preview ??*/
    .projects-preview {
      display: flex;
      gap: var(--space-md);
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .projects-preview::-webkit-scrollbar {
      display: none;
    }
    .section-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      transition: color 0.3s ease;
      white-space: nowrap;
      position: relative;
      padding-bottom: 2px;
    }

    .section-link::after {
      content: '';
      position: absolute;
      width: calc(100% - 20px);
      transform: scaleX(0);
      height: 1px;
      bottom: 0;
      left: 0;
      background-color: var(--text-primary);
      transform-origin: bottom right;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section-link:hover::after {
      transform: scaleX(1);
      transform-origin: bottom left;
    }

    .section-link:hover {
      color: var(--text-primary);
    }

    .section-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .section-link:hover svg {
      transform: translateX(4px);
    }

    /* — Projects Preview Row — */
    .projects-row {
      width: 100%;
      max-width: 100%;
      position: relative;
    }
        /* ??Desktop Floating Link (Wrapper that shows on row hover, contains a standard section-link) ??*/
    .floating-view-link {
      position: absolute;
      right: 0;
      top: 0;
      height: calc(100% - 8px);
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease-out-expo);
    }

    /* Gradient overlay behind the text */
    .floating-view-link::before {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      background: linear-gradient(to left, var(--bg-primary) 40%, transparent 100%);
      z-index: -1;
      pointer-events: none;
    }

    .projects-row:hover .floating-view-link {
      opacity: 1;
      pointer-events: auto;
    }

    

    

    

    

    /* ── Mobile Overswipe Pull Indicator ── */
    .pull-indicator {
      flex: 0 0 0px;
      width: 0px;
      opacity: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      transition: flex-basis 0.3s var(--ease-out-expo), width 0.3s var(--ease-out-expo), opacity 0.3s ease;
      height: auto;
      aspect-ratio: 4 / 5;
      position: relative;
    }

    .pull-indicator-content {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      color: var(--text-muted);
      white-space: nowrap;
      transition: transform 0.3s var(--ease-out-expo);
    }

    .pull-indicator.active .pull-indicator-content {
      transform: translateX(0);
    }

    .pull-arrow {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: transform 0.4s var(--ease-out-expo);
    }

    .pull-text {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }

    .preview-card {
      flex: 0 0 280px;
      text-decoration: none;
      color: inherit;
      scroll-snap-align: start; /* Standard scroll snap for mobile momentum */
    }

    /* ── View All Projects Inline Scroll Link ── */
    .view-all-link-wrapper {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: var(--space-md);
      padding-right: var(--gutter);
      scroll-snap-align: start;
    }

    .preview-card-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      margin-bottom: var(--space-xs);
      transition: transform 0.6s var(--ease-out-expo);
    }

    .preview-card:hover .preview-card-img {
      transform: scale(1.02);
    }

    .preview-card-title {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .preview-card-meta {
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .preview-img-wrap {
      overflow: hidden;
      margin-bottom: var(--space-xs);
      position: relative;
    }

    /* Figma UI Kit / Tailwind UI-inspired Editorial Glassmorphic Explore Tag */
    .preview-img-wrap::after {
      content: 'EXPLORE';
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      padding: 6px 12px;
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 0px; /* Sharp editorial corners matching artic. */
      font-family: var(--font-sans);
      font-size: 0.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .preview-card:hover .preview-img-wrap::after {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Footer ── */
    .site-footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: var(--space-lg) var(--gutter);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: border-color 0.5s ease;
    }

    .site-footer span {
      color: var(--text-muted);
    }

    /* ── Desktop/Mobile Displays ── */
    .desktop-only {
      display: inline-flex !important;
    }
    .mobile-only {
      display: none !important;
    }

    @media (max-width: 767px) {
      .desktop-only {
        display: none !important;
      }
      .mobile-only {
        display: flex !important;
      }
    }

    /* ── Swipe to Navigate Slider Component ── */
    .swipe-to-navigate {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      margin-top: 24px;
    }

    .swipe-track {
      position: relative;
      width: 200px;
      height: 44px;
      border: 1px solid var(--border-color);
      background-color: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 0px; /* Sharp corners matching artic. */
      overflow: hidden;
      display: flex;
      align-items: center;
      transition: border-color 0.5s ease, background-color 0.5s ease;
    }

    .swipe-text {
      position: absolute;
      width: 100%;
      text-align: center;
      font-family: var(--font-sans);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      text-transform: uppercase;
      user-select: none;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding-left: 36px;
      padding-right: 12px;
      box-sizing: border-box;
    }

    .swipe-handle {
      width: 42px;
      height: 42px;
      background-color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      position: absolute;
      left: 0px;
      transition: background-color 0.5s ease;
      border-radius: 0px; /* Sharp handle */
      z-index: 2;
    }

    .swipe-handle svg {
      width: 14px;
      height: 14px;
      fill: var(--bg-primary);
      transition: fill 0.5s ease, transform 0.4s var(--ease-out-expo);
    }

    .swipe-handle:active {
      cursor: grabbing;
    }

    /* ── Theme Toggle (initial reveal) ── */
    .theme-toggle {
      opacity: 0;
      animation: toggleReveal 0.5s ease 2.2s forwards;
    }

    @keyframes toggleReveal {
      to { opacity: 1; }
    }

    /* ── Responsive ── */
    @media (max-width: 767px) {
      .preview-card,
      .view-all-card {
        flex: 0 0 220px;
      }
      .content-section {
        padding: var(--space-xl) var(--gutter);
      }
      /* Hide project metadata on mobile homepage previews */
      .projects-preview .preview-card-title,
      .projects-preview .preview-card-meta {
        display: none !important;
      }
      /* Keep mobile cards tightly packed without gaps */
      .projects-preview {
        gap: 0 !important;
      }
    }
</style>

  <script src="js/reveal.js"></script>
  <script>
    sessionStorage.removeItem('artic-subpage');

    // ?? Dynamic Project Cards from projects.json ??
    fetch('./projects.json', { cache: 'no-cache' })
      .then(r => r.json())
      .then(projects => {
        const container = document.getElementById('projects-preview-container');
        if (!container) return;

        // Remove loading placeholder
        const loading = document.getElementById('home-projects-loading');
        if (loading) loading.remove();

        // Keep the mobile "View All" wrapper at end
        const viewAllWrapper = container.querySelector('.view-all-link-wrapper');

        // Build all cards
        const createdCards = [];
        projects.forEach((p, i) => {
          const imgSrc = p.cover_image.replace(/^\.\.\//, '');
          const card = document.createElement('a');
          card.href = p.slug;
          card.className = 'preview-card';
          
          // 첫 2개 카드(LCP 대상)는 프리로드 효과와 높은 페치 우선순위, 그 외는 지연 로딩
          const loadingAttr = i < 2 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"';
          
          card.innerHTML = `
            <div class="preview-img-wrap">
              <img src="${imgSrc}" alt="${p.title}" class="preview-card-img" ${loadingAttr}>
            </div>
            <div class="preview-card-title">${p.title}</div>
            <div class="preview-card-meta">${p.category} \u00b7 ${p.year}</div>`;

          // Initial hidden state for stagger reveal
          card.style.opacity = '0';
          card.style.transform = 'translateY(12px)'; /* Apple-like short distance */
          card.style.transition = 'none';

          if (viewAllWrapper) {
            container.insertBefore(card, viewAllWrapper);
          } else {
            container.appendChild(card);
          }
          createdCards.push(card);
        });

        // Initialize mobile scroll position to leftmost card
        container.scrollLeft = 0;

        // Stagger-reveal cards when the projects section enters the viewport
        const projectsSection = container.closest('.content-section') || container;
        const easing = 'cubic-bezier(0.25, 1, 0.5, 1)'; /* Apple-like slow and soft easing */

        const revealCards = () => {
          createdCards.forEach((card, idx) => {
            setTimeout(() => {
              card.style.transition = `opacity 1.4s ${easing}, transform 1.4s ${easing}`; /* Apple-like duration (1.4s) */
              card.style.opacity = '1';
              card.style.transform = 'translateY(0)';
            }, idx * 90);
          });
        };

        // Trigger stagger when projects section scrolls into view (~15% visible).
        // IntersectionObserver handles both cases:
        //   - section not yet in view  ??fires when user scrolls to it
        //   - section already in view on load (e.g. deep-linked) ??fires immediately
        // threshold 0.15: visually, the top card row is just peeking in ??perfect timing.
        const sectionObserver = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              revealCards();
              sectionObserver.disconnect();
            }
          });
        }, { threshold: 0.45 });
        sectionObserver.observe(projectsSection);
      })
      .catch(() => {
        const loading = document.getElementById('home-projects-loading');
        if (loading) loading.textContent = '';
      });

    document.addEventListener('DOMContentLoaded', () => {
      initNavScroll(467);

      // Drag-to-scroll with snap suspension for homepage projects preview (Mouse & Touch)
      const preview = document.getElementById('projects-preview-container');
      if (preview) {
        let isDown = false;
        let startX;
        let scrollLeft;

        // Mouse Drag (Desktop)
        preview.addEventListener('mousedown', (e) => {
          isDown = true;
          preview.classList.add('active');
          preview.style.scrollSnapType = 'none';
          preview.style.scrollBehavior = 'auto';
          startX = e.pageX - preview.offsetLeft;
          scrollLeft = preview.scrollLeft;
        });

        preview.addEventListener('mouseleave', () => {
          if (!isDown) return;
          isDown = false;
          preview.classList.remove('active');
          preview.style.scrollSnapType = 'x mandatory';
          preview.style.scrollBehavior = 'smooth';
        });

        preview.addEventListener('mouseup', () => {
          if (!isDown) return;
          isDown = false;
          preview.classList.remove('active');
          preview.style.scrollSnapType = 'x mandatory';
          preview.style.scrollBehavior = 'smooth';
        });

        preview.addEventListener('mousemove', (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - preview.offsetLeft;
          const walk = (x - startX) * 1.5; // Drag speed multiplier
          preview.scrollLeft = scrollLeft - walk;
        });

        
        

        

        
      }
    });
  </script>
