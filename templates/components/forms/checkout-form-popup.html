<!--
  DATABASE SCHEMA MAPPING
  Firebase Firestore collection: orders
  Fields: product_id, name, email, phone, address, quantity, depositor, notes, status, tracking_number, inventory_deducted, created_at
  API: /api/checkout locally, checkout Cloud Function in production
-->
<div class="checkout-scroll-container">
  <div class="checkout-form-group">
    <label class="checkout-label">이름 *</label>
    <input type="text" id="chk-name" class="checkout-input" required placeholder="성함을 입력하세요">
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">이메일 *</label>
    <input type="email" id="chk-email" class="checkout-input" required placeholder="example@email.com">
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">연락처 *</label>
    <input type="tel" id="chk-phone" class="checkout-input" required placeholder="010-0000-0000">
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">배송지 주소 *</label>
    <div class="checkout-address-row">
      <input type="text" id="chk-address" class="checkout-input" required readonly placeholder="도로명 주소를 검색하세요">
      <button type="button" id="chk-address-search-btn" class="checkout-address-btn">검색</button>
    </div>
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">상세 주소 *</label>
    <input type="text" id="chk-address-detail" class="checkout-input" required placeholder="동/호수, 공동현관 등 상세 주소를 입력하세요">
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">수량 *</label>
    <select id="chk-quantity" class="checkout-select">
      <option value="1">1개</option>
      <option value="2">2개</option>
      <option value="3">3개</option>
      <option value="4">4개</option>
      <option value="5">5개</option>
    </select>
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">입금자명 <span style="font-size:0.6rem; color:var(--text-muted); font-weight:normal;">(입금자가 주문자명과 다를 경우에만 작성)</span></label>
    <input type="text" id="chk-depositor" class="checkout-input" placeholder="입금자명을 입력하세요">
  </div>
  <div class="checkout-form-group">
    <label class="checkout-label">요청사항</label>
    <textarea id="chk-notes" class="checkout-textarea" placeholder="기타 배송 시 요청사항을 작성하세요"></textarea>
  </div>
</div>

<style>
  /* ── Checkout Form Styling ── */
  .checkout-scroll-container {
    max-height: 380px;
    overflow-y: auto;
    padding-right: 8px;
    padding-bottom: 24px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: left;
  }

  .checkout-scroll-container::-webkit-scrollbar {
    width: 2px;
  }

  .checkout-scroll-container::-webkit-scrollbar-thumb {
    background-color: var(--border-color);
  }

  .checkout-form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .checkout-label {
    font-family: var(--font-sans);
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-primary);
    letter-spacing: 0.05em;
  }

  .checkout-input, .checkout-select, .checkout-textarea {
    width: 100%;
    background-color: var(--bg-primary);
    border: 1px solid var(--border-color);
    padding: 12px 14px;
    border-radius: 4px;
    font-family: var(--font-sans);
    font-size: 0.78rem;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.3s ease, background-color 0.3s ease;
  }

  .checkout-input:focus, .checkout-select:focus, .checkout-textarea:focus {
    border-color: var(--text-primary);
    background-color: var(--bg-card);
  }

  .checkout-input.checkout-input-error,
  .checkout-select.checkout-input-error,
  .checkout-textarea.checkout-input-error {
    border-color: #E06C75 !important;
  }

  @keyframes checkoutShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .checkout-shake {
    animation: checkoutShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  .checkout-address-row {
    display: flex;
    gap: 8px;
  }

  .checkout-address-row .checkout-input {
    flex: 1 1 auto;
    min-width: 0;
  }

  .checkout-address-btn {
    flex: 0 0 auto;
    border: 1px solid var(--border-color);
    background-color: var(--text-primary);
    color: var(--bg-primary);
    padding: 0 12px;
    font-family: var(--font-sans);
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s ease, border-color 0.2s ease;
  }

  .checkout-address-btn:hover {
    opacity: 0.8;
  }

  .checkout-textarea {
    resize: vertical;
    min-height: 70px;
    height: 70px;
  }
</style>
