<div class="waitlist-container">
  <!-- Button Wrapper -->
  <div id="waitlist-btn-wrapper" class="grid-collapse-wrapper active">
    <div class="grid-collapse-content">
      <button id="waitlist-toggle-btn" class="about-action">Join the Waitlist</button>
    </div>
  </div>
  
  <!-- Form Wrapper -->
  <div id="waitlist-form-wrapper" class="grid-collapse-wrapper">
    <div class="grid-collapse-content" style="padding-bottom: 2px;">
      <form id="waitlist-form" class="waitlist-form" novalidate>
        <div class="waitlist-fields-wrapper">
          <div class="waitlist-field-group">
            <input type="text" id="waitlist-name" placeholder="YOUR NAME" required autocomplete="name">
          </div>
          <div class="waitlist-field-group">
            <input type="email" id="waitlist-email" placeholder="ENTER YOUR EMAIL ADDRESS" required autocomplete="email">
            <button type="submit" id="waitlist-submit-btn" aria-label="Submit email">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="waitlist-loading-bar">
    <div class="waitlist-loading-progress"></div>
  </div>

  <!-- Message Wrapper -->
  <div id="waitlist-message-wrapper" class="grid-collapse-wrapper">
    <div class="grid-collapse-content">
      <div id="waitlist-message" class="waitlist-message"></div>
    </div>
  </div>
</div>

<style>
  /* ── Waitlist Form Style ── */
  .waitlist-container {
    position: relative;
    width: 100%;
    margin-top: 16px;
  }

  #waitlist-toggle-btn {
    opacity: 1;
    display: inline-flex;
    transition: opacity 0.4s ease, all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .grid-collapse-wrapper:not(.active) #waitlist-toggle-btn {
    opacity: 0;
    pointer-events: none;
  }

  .about-action svg {
    width: 10px;
    height: 10px;
    fill: var(--text-primary);
    transition: fill 0.4s ease, transform 0.4s ease;
  }
  .about-action:hover svg {
    fill: var(--bg-primary);
    transform: scale(1.1);
  }

  .waitlist-form {
    width: 100%;
    max-width: 320px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    padding-top: 12px;
  }

  .grid-collapse-wrapper.active .waitlist-form {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* Fields stacked layout */
  .waitlist-fields-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 14px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .waitlist-form.submitting .waitlist-fields-wrapper {
    opacity: 0.3;
    pointer-events: none;
    transform: translateY(-4px);
  }

  .waitlist-field-group {
    position: relative;
    width: 100%;
  }

  .waitlist-form input {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border-color);
    padding: 10px 0;
    font-family: var(--font-sans);
    font-size: 0.72rem;
    color: var(--text-primary);
    outline: none;
    border-radius: 0;
    transition: border-color 0.4s ease;
  }

  .waitlist-form input:focus {
    border-bottom-color: var(--text-primary);
  }

  /* Soft red error styling */
  .waitlist-form input.waitlist-input-error {
    border-bottom-color: #E06C75 !important;
  }

  /* Submit button inside email group */
  .waitlist-field-group button {
    position: absolute;
    right: 0;
    bottom: 0;
    background: none;
    border: none;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0;
  }

  .waitlist-field-group button svg {
    width: 14px;
    height: 14px;
    stroke: var(--text-primary);
    transition: stroke 0.3s ease, transform 0.3s ease;
  }

  .waitlist-field-group button:hover svg {
    transform: translateX(3px);
  }

  .waitlist-field-group button:disabled svg {
    stroke: var(--text-muted);
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Interactive tactile shake animation */
  @keyframes waitlistShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .waitlist-shake {
    animation: waitlistShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }

  /* Sliding progress line loader */
  .waitlist-loading-bar {
    display: none;
    width: 100%;
    max-width: 320px;
    height: 1px;
    background-color: var(--border-color);
    position: relative;
    overflow: hidden;
    margin-top: 12px;
  }

  .waitlist-container.submitting .waitlist-loading-bar {
    display: block;
  }

  .waitlist-loading-progress {
    width: 40%;
    height: 100%;
    background-color: var(--text-primary);
    position: absolute;
    left: -40%;
    animation: waitlistLoading 1s infinite linear;
  }

  @keyframes waitlistLoading {
    from { left: -40%; }
    to { left: 100%; }
  }

  /* Success & error messages styling */
  .waitlist-message {
    font-family: var(--font-sans);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: left;
    max-width: 320px;
    padding-top: 16px;
  }

  .grid-collapse-wrapper.active .waitlist-message {
    opacity: 1;
    transform: translateY(0);
  }

  .waitlist-message .success-title {
    font-family: var(--font-logo);
    font-size: 1.2rem;
    font-weight: normal;
    letter-spacing: 0.05em;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .waitlist-message .success-desc {
    font-size: 0.65rem;
    line-height: 1.6;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .waitlist-message.error {
    font-size: 0.65rem;
    line-height: 1.5;
    color: #E06C75;
    letter-spacing: 0.02em;
  }
</style>
