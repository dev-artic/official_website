<style>
  body {
    overflow-x: hidden;
    transition:
      background-color 0.72s var(--ease-out-expo),
      color 0.72s var(--ease-out-expo);
  }

  body.acha-essay-focus-mode {
    --bg-primary: rgb(var(--acha-focus-bg-rgb, 17, 17, 17));
    --bg-secondary: rgb(var(--acha-focus-panel-rgb, 23, 23, 23));
    --text-primary: rgb(var(--acha-focus-ink-rgb, 243, 241, 237));
    --text-secondary: rgba(var(--acha-focus-ink-rgb, 243, 241, 237), 0.72);
    --text-muted: rgba(var(--acha-focus-ink-rgb, 243, 241, 237), 0.48);
    --border-color: rgba(var(--acha-focus-ink-rgb, 243, 241, 237), 0.16);
    --glass-bg: rgba(var(--acha-focus-bg-rgb, 17, 17, 17), 0.68);
    background-color: rgb(var(--acha-focus-bg-rgb, 17, 17, 17)) !important;
  }

  body.acha-essay-focus-mode .mobile-header-bar {
    background: rgba(var(--acha-focus-bg-rgb, 17, 17, 17), 0.72);
    border-bottom-color: transparent;
  }

  body.acha-essay-focus-mode .nav-link,
  body.acha-essay-focus-mode .nav-home {
    color: rgba(var(--acha-focus-ink-rgb, 243, 241, 237), 0.58);
  }

  body.acha-essay-focus-mode .nav-link:hover,
  body.acha-essay-focus-mode .nav-link.active,
  body.acha-essay-focus-mode .nav-home:hover {
    color: rgba(var(--acha-focus-ink-rgb, 243, 241, 237), 0.92);
  }

  body.acha-essay-focus-mode .burger-line {
    background-color: rgba(var(--acha-focus-ink-rgb, 243, 241, 237), 0.86);
  }

  .acha-page {
    width: 100%;
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 120px var(--gutter) var(--space-xxl);
    box-sizing: border-box;
    transition:
      color 0.72s var(--ease-out-expo),
      background-color 0.72s var(--ease-out-expo);
  }

  .acha-page * {
    min-width: 0;
  }

  .acha-hero {
    display: grid;
    grid-template-columns: 1fr;
    gap: clamp(28px, 5vw, 72px);
    align-items: end;
    min-height: 64vh;
    padding-bottom: clamp(44px, 7vw, 92px);
  }

  .acha-hero-main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(260px, 36ch);
    gap: clamp(28px, 5vw, 72px);
    align-items: end;
  }

  .acha-hero-title {
    min-width: 0;
  }

  .acha-hero-aside {
    display: grid;
    justify-items: end;
    align-self: end;
    min-width: 0;
    text-align: right;
  }

  .acha-kicker,
  .acha-date,
  .acha-back,
  .acha-stat span,
  .acha-tier small,
  .acha-tier-summary,
  .acha-album-meta,
  .acha-field span,
  .acha-source,
  .acha-essay-list span,
  .acha-status {
    font-family: var(--font-sans);
    font-size: 0.58rem;
    line-height: 1.45;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .acha-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    width: fit-content;
    margin-top: var(--space-md);
    padding: 10px 0 8px;
    position: relative;
    white-space: nowrap;
    transition: color 0.3s ease;
  }

  .acha-back::after {
    content: '';
    position: absolute;
    left: 18px;
    right: 0;
    bottom: 0;
    height: 1px;
    background: var(--text-primary);
    transform: scaleX(0);
    transform-origin: right center;
    transition: transform 0.46s var(--ease-out-expo);
  }

  .acha-back:hover {
    color: var(--text-primary);
  }

  .acha-back:focus-visible,
  .acha-inline-essay summary:focus-visible,
  .acha-instagram-button:focus-visible,
  .acha-instagram-close:focus-visible {
    outline: 1px solid currentColor;
    outline-offset: 4px;
  }

  .acha-back:hover::after {
    transform: scaleX(1);
    transform-origin: left center;
  }

  .acha-back svg {
    width: 12px;
    height: 12px;
    fill: currentColor;
    transform: rotate(180deg);
    transition: transform 0.4s var(--ease-out-expo);
  }

  .acha-back:hover svg {
    transform: rotate(180deg) translateX(4px);
  }

  .acha-hero h1 {
    position: relative;
    display: inline-block;
    margin-top: 10px;
    max-width: min(7.2ch, 100%);
    font-family: var(--font-serif);
    font-size: clamp(2.5rem, 7vw, 6.7rem);
    line-height: 0.94;
    font-weight: 700;
    color: var(--text-primary);
    word-break: keep-all;
    overflow-wrap: normal;
  }

  .acha-page.is-loading .acha-hero h1 {
    color: transparent;
    background: linear-gradient(90deg, var(--text-muted) 0%, var(--text-primary) 42%, var(--text-muted) 72%);
    background-size: 240% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    animation: acha-title-load 2.4s var(--ease-out-expo) infinite;
  }

  .acha-page.is-loading .acha-hero h1::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, var(--bg-primary) 72%, transparent) 46%, transparent 78%);
    transform: translateX(-120%);
    animation: acha-title-wipe 2.4s var(--ease-out-expo) infinite;
    pointer-events: none;
  }

  @keyframes acha-title-load {
    0%,
    100% {
      opacity: 0.38;
      background-position: 130% 50%;
    }
    46% {
      opacity: 1;
    }
    70% {
      background-position: 0% 50%;
    }
  }

  @keyframes acha-title-wipe {
    0% {
      opacity: 0;
      transform: translateX(-120%);
    }
    22% {
      opacity: 1;
    }
    70% {
      opacity: 0.72;
      transform: translateX(120%);
    }
    100% {
      opacity: 0;
      transform: translateX(120%);
    }
  }

  .acha-loading-note {
    max-width: 68ch;
    margin-top: var(--space-md);
    font-family: var(--font-sans);
    font-size: 0.7rem;
    line-height: 1.6;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
  }

  .acha-page.is-loading .acha-loading-note {
    opacity: 1;
    transform: translateY(0);
  }

  .acha-page:not(.is-loading) .acha-loading-note {
    display: none;
  }

  .acha-page.is-loading #acha-summary,
  .acha-page.is-loading #acha-stats {
    visibility: hidden;
  }

  .acha-summary,
  .acha-stats,
  .acha-cover-strip,
  .acha-body,
  .acha-essays,
  .acha-status {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.9s var(--ease-out-expo), transform 0.9s var(--ease-out-expo);
  }

  .acha-page.is-loaded .acha-summary,
  .acha-page.is-loaded .acha-stats,
  .acha-page.is-loaded .acha-cover-strip,
  .acha-page.is-loaded .acha-body,
  .acha-page.is-loaded .acha-essays,
  .acha-page.is-loaded .acha-status,
  .acha-page:not(.is-loading) .acha-summary,
  .acha-page:not(.is-loading) .acha-stats,
  .acha-page:not(.is-loading) .acha-cover-strip,
  .acha-page:not(.is-loading) .acha-body,
  .acha-page:not(.is-loading) .acha-essays,
  .acha-page:not(.is-loading) .acha-status {
    opacity: 1;
    transform: translateY(0);
  }

  .acha-page.is-loaded .acha-stats,
  .acha-page:not(.is-loading) .acha-stats {
    transition-delay: 0.08s;
  }

  .acha-page.is-loaded .acha-cover-strip,
  .acha-page:not(.is-loading) .acha-cover-strip {
    transition-delay: 0.16s;
  }

  .acha-page.is-loaded .acha-body,
  .acha-page:not(.is-loading) .acha-body {
    transition-delay: 0.24s;
  }

  .acha-tier {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo);
  }

  .acha-tier.is-visible {
    opacity: 1;
    transform: translateY(0);
    transition-delay: var(--acha-tier-delay, 0ms);
  }

  @keyframes acha-tier-view-reveal {
    from {
      opacity: 0;
      transform: translateY(18px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @supports (animation-timeline: view()) {
    .acha-tier {
      opacity: 1;
      transform: none;
      animation: acha-tier-view-reveal 0.9s var(--ease-out-expo) both;
      animation-timeline: view();
      animation-range: entry 0% cover 18%;
    }

    .acha-album {
      opacity: 1;
      transform: none;
      animation: acha-tier-view-reveal 0.82s var(--ease-out-expo) both;
      animation-timeline: view();
      animation-range: entry 0% cover 14%;
    }
  }

  .acha-summary {
    max-width: 68ch;
    margin: 0;
    font-family: var(--font-sans);
    font-size: 0.86rem;
    line-height: 1.9;
    color: var(--text-secondary);
    white-space: pre-line;
  }

  body.acha-instagram-modal-open {
    overflow: hidden;
  }

  .acha-stats {
    --acha-stat-gap: clamp(10px, 1.3vw, 18px);
    display: flex;
    flex-wrap: nowrap;
    gap: var(--acha-stat-gap);
    grid-column: 1 / -1;
    margin-top: clamp(28px, 5vw, 64px);
    padding-bottom: 2px;
    overflow-x: auto;
    border-top: 1px solid var(--border-color);
    scrollbar-width: none;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
  }

  .acha-stat {
    display: grid;
    flex: 1 0 max(104px, calc((100% - (var(--acha-stat-gap) * 6)) / 7));
    gap: 8px;
    min-width: 0;
    padding-top: 14px;
    scroll-snap-align: start;
  }

  .acha-stats::-webkit-scrollbar {
    display: none;
  }

  .acha-stat span {
    white-space: nowrap;
  }

  .acha-stat strong {
    font-family: var(--font-serif);
    font-size: clamp(1.4rem, 3vw, 2.5rem);
    line-height: 1;
    color: var(--text-primary);
  }

  .acha-cover-strip {
    margin: 0 calc(50% - 50vw) clamp(40px, 6vw, 84px);
    overflow: hidden;
    border-top: 1px solid var(--border-color);
    border-bottom: 1px solid var(--border-color);
  }

  .acha-cover-strip img,
  .acha-cover-fallback {
    width: clamp(108px, 12vw, 176px);
    flex: 0 0 clamp(108px, 12vw, 176px);
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--bg-secondary);
  }

  .acha-cover-track {
    display: flex;
    width: max-content;
    gap: clamp(8px, 1.2vw, 14px);
    padding: clamp(8px, 1.2vw, 14px) 0;
    transform: translate3d(var(--acha-cover-offset, 0px), 0, 0);
    will-change: transform;
  }

  .acha-cover-set {
    display: flex;
    gap: clamp(8px, 1.2vw, 14px);
  }

  .acha-cover-fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    text-align: center;
    font-family: var(--font-sans);
    font-size: 0.62rem;
    line-height: 1.45;
    color: var(--text-muted);
  }

  .acha-body {
    border-top: 1px solid var(--border-color);
  }

  .acha-essay-reader {
    display: grid;
    grid-template-columns: minmax(150px, 0.2fr) minmax(0, 0.8fr);
    gap: clamp(28px, 5vw, 80px);
    padding: clamp(42px, 6vw, 82px) 0;
    border-top: 1px solid var(--border-color);
  }

  .acha-essay-reader:empty {
    display: none;
  }

  .acha-essay-reader h2 {
    font-family: var(--font-serif);
    font-size: clamp(2rem, 5vw, 4.8rem);
    line-height: 0.96;
    color: var(--text-primary);
  }

  .acha-essay-content {
    display: grid;
    gap: 18px;
    max-width: 78ch;
  }

  .acha-essay-content p,
  .acha-essay-content li {
    font-family: var(--font-sans);
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--text-secondary);
  }

  .acha-essay-content h3 {
    margin-top: var(--space-sm);
    font-family: var(--font-serif);
    font-size: clamp(1rem, 1.5vw, 1.28rem);
    line-height: 1.24;
    color: var(--text-primary);
  }

  .acha-essay-content h4,
  .acha-essay-content h5 {
    margin-top: var(--space-sm);
    font-family: var(--font-sans);
    font-size: 0.78rem;
    line-height: 1.65;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .acha-essay-content h5 {
    color: var(--text-secondary);
  }

  .acha-essay-content img {
    width: 100%;
    max-width: 720px;
    height: auto;
  }

  .acha-tier {
    display: grid;
    grid-template-columns: minmax(150px, 0.2fr) minmax(0, 0.8fr);
    gap: clamp(28px, 5vw, 80px);
    padding: clamp(42px, 6vw, 82px) 0;
    border-bottom: 1px solid var(--border-color);
  }

  .acha-tier-heading {
    display: grid;
    gap: 12px;
    align-content: start;
  }

  .acha-tier h2 {
    font-family: var(--font-serif);
    font-size: clamp(1.8rem, 4vw, 3.7rem);
    line-height: 0.96;
    color: var(--text-primary);
    word-break: keep-all;
    overflow-wrap: normal;
  }

  .acha-tier-summary {
    max-width: 28ch;
    letter-spacing: 0;
    text-transform: none;
    font-size: 0.74rem;
    line-height: 1.75;
    color: var(--text-secondary);
  }

  .acha-tier-criteria {
    display: grid;
    gap: 6px;
    margin: 0;
    padding: 0;
    list-style: none;
    font-family: var(--font-sans);
    font-size: 0.68rem;
    line-height: 1.65;
    color: var(--text-muted);
  }

  .acha-album-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    column-gap: clamp(24px, 4vw, 64px);
    row-gap: clamp(26px, 4vw, 48px);
  }

  .acha-tier.is-featured .acha-album-list {
    grid-template-columns: 1fr;
  }

  .acha-album {
    display: grid;
    grid-template-columns: minmax(96px, 0.24fr) minmax(0, 0.76fr);
    gap: clamp(16px, 3vw, 28px);
    align-items: start;
    padding-top: 18px;
    border-top: 1px solid var(--border-color);
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.78s var(--ease-out-expo), transform 0.78s var(--ease-out-expo), border-color 0.3s ease;
  }

  .acha-album.is-visible {
    opacity: 1;
    transform: translateY(0);
    transition-delay: var(--acha-album-delay, 0ms);
  }

  .acha-tier.is-featured .acha-album {
    grid-template-columns: minmax(150px, 0.26fr) minmax(0, 0.74fr);
  }

  .acha-album img,
  .acha-album .acha-cover-fallback {
    width: 100%;
    min-height: 96px;
  }

  .acha-cover-strip img,
  .acha-album img {
    transition: transform 220ms ease, box-shadow 220ms ease;
    transform-origin: center;
  }

  .acha-cover-strip img:hover,
  .acha-album img:hover,
  .acha-cover-strip img:focus-visible,
  .acha-album img:focus-visible {
    position: relative;
    z-index: 2;
    transform: scale(1.045);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
  }

  @supports (animation-timeline: view()) {
    .acha-album {
      opacity: 1;
      transform: none;
      animation: acha-tier-view-reveal 0.82s var(--ease-out-expo) both;
      animation-timeline: view();
      animation-range: entry 0% cover 14%;
    }
  }

  .acha-album h3,
  .acha-essay-list a {
    font-family: var(--font-serif);
    font-size: clamp(1.15rem, 2.1vw, 1.9rem);
    line-height: 1.08;
    font-weight: 700;
    color: var(--text-primary);
    word-break: keep-all;
    overflow-wrap: normal;
  }

  .acha-album-meta {
    display: block;
    margin-top: 8px;
    letter-spacing: 0;
    text-transform: none;
    font-size: 0.7rem;
    color: var(--text-secondary);
  }

  .acha-critic-line {
    margin-top: 14px;
    font-family: var(--font-sans);
    font-size: 0.84rem;
    line-height: 1.78;
    color: var(--text-primary);
  }

  .acha-field {
    display: grid;
    grid-template-columns: 112px minmax(0, 1fr);
    gap: 16px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border-color);
    font-family: var(--font-sans);
    font-size: 0.72rem;
    line-height: 1.7;
    color: var(--text-secondary);
    overflow-wrap: anywhere;
  }

  .acha-field span {
    letter-spacing: 0.12em;
  }

  .acha-highlighted-track {
    align-items: start;
  }

  .acha-highlighted-track > span {
    padding-top: 0;
    line-height: 1.35;
  }

  .acha-track-module {
    display: grid;
    gap: 9px;
    min-width: 0;
  }

  .acha-track-list {
    display: grid;
    gap: 7px;
  }

  .acha-track-trigger {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--text-primary);
    padding: 0;
    text-align: left;
    cursor: pointer;
    font-family: var(--font-sans);
  }

  .acha-track-trigger:hover .acha-track-title,
  .acha-track-trigger.is-active .acha-track-title {
    opacity: 0.62;
  }

  .acha-track-num {
    flex: 0 0 30px;
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1.35;
  }

  .acha-track-title {
    display: block;
    min-width: 0;
    font-size: 0.82rem;
    line-height: 1.35;
    letter-spacing: 0;
    color: var(--text-primary);
    transition: opacity 0.28s ease;
  }

  .acha-track-player {
    display: grid;
    gap: 13px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    margin-top: 0;
    padding-top: 0;
    border-top: 0 solid transparent;
    transition:
      max-height 0.46s var(--ease-out-expo),
      opacity 0.34s ease,
      margin-top 0.34s ease,
      padding-top 0.34s ease,
      border-color 0.34s ease;
  }

  .acha-track-player.is-open {
    max-height: 132px;
    opacity: 1;
    margin-top: 4px;
    padding-top: 12px;
    border-top-width: 1px;
    border-top-color: var(--border-color);
  }

  .acha-play-widget {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .acha-play-status-row {
    display: flex;
    justify-content: flex-end;
  }

  .acha-play-track-info {
    display: flex;
    align-items: baseline;
    gap: 14px;
    user-select: none;
  }

  .acha-play-track-num {
    min-width: 24px;
    flex-shrink: 0;
    font-family: var(--font-sans);
    font-size: 0.55rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .acha-play-track-text {
    flex: 1;
    min-width: 0;
  }

  .acha-play-track-title {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.96rem;
    font-weight: 500;
    line-height: 1.32;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.3s ease;
  }

  .acha-play-track-status {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .acha-play-progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .acha-play-time {
    min-width: 30px;
    flex-shrink: 0;
    font-family: var(--font-sans);
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .acha-play-time.dur {
    text-align: right;
  }

  .acha-play-bar-track {
    flex: 1;
    height: 1px;
    background-color: var(--border-color);
    position: relative;
  }

  .acha-play-bar-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 0%;
    background-color: var(--text-primary);
    transition: width 0.35s linear;
  }

  .acha-play-bar-fill.is-seeking {
    transition: width 0.44s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .acha-play-bar-fill.is-resetting {
    transition: width 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .acha-play-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .acha-play-ctrl-btn,
  .acha-play-main-btn {
    border: 0;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  .acha-play-ctrl-btn {

    align-items: center;
    gap: 8px;
  }

  .acha-play-ctrl-btn[disabled] {
    opacity: 0.24;
    cursor: default;
  }

  .acha-play-ctrl-btn:not([disabled]):hover,
  .acha-play-main-btn:hover {
    color: var(--text-primary);
  }

  .acha-play-main-btn {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary);

  .acha-play-track-info.track-anim-in-up {
    animation: achaTrackFadeInUp 0.26s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .acha-play-track-info.track-anim-out-down {
    animation: achaTrackFadeOutDown 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .acha-play-track-info.track-anim-in-down {
    animation: achaTrackFadeInDown 0.26s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes achaTrackFadeOutUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-8px); }
  }

  @keyframes achaTrackFadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes achaTrackFadeOutDown {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(8px); }
  }

  @keyframes achaTrackFadeInDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .acha-source {
    display: inline-block;
    margin-top: 12px;
  }

  .acha-album.has-inline-essay {
    position: relative;
    border-top-color: color-mix(in srgb, var(--text-primary) 34%, var(--border-color));
  }

  .acha-inline-essay {
    --acha-essay-bg-rgb: 17, 17, 17;
    --acha-essay-panel-rgb: 18, 18, 18;
    --acha-essay-ink-rgb: 245, 245, 245;
    --acha-essay-difference-rgb: 255, 255, 255;
    grid-column: 1 / -1;
    display: grid;
    gap: clamp(14px, 2.4vw, 26px);
    position: relative;
    margin-top: clamp(8px, 1.6vw, 20px);
    padding: 0;
    border-top: 0;
    scroll-margin-top: 96px;
    transition: margin-top 0.56s var(--ease-out-expo), gap 0.56s var(--ease-out-expo), background-color 0.72s var(--ease-out-expo);
  }

  .acha-inline-essay.is-toggle-open,
  .acha-inline-essay.is-expanding {
    gap: 0;
    background-color: rgb(var(--acha-essay-bg-rgb));
  }

  .acha-inline-essay:not(.is-toggle-open) {
    gap: 0;
    margin-top: clamp(8px, 1.4vw, 18px);
  }

  .acha-inline-essay::before {
    display: none;
  }

  .acha-inline-essay summary {
    display: grid;
    grid-template-columns: 1fr;
    align-items: end;
    position: relative;
    min-height: clamp(240px, 30vw, 440px);
    cursor: pointer;
    list-style: none;
    overflow: hidden;
    touch-action: manipulation;
  }

  .acha-inline-essay summary::-webkit-details-marker {
    display: none;
  }

  .acha-essay-visual {
    grid-area: 1 / 1;
    display: grid;
    width: 100%;
    justify-self: stretch;
    margin: 0;
    position: relative;
    overflow: hidden;
    background: var(--bg-secondary);
    isolation: isolate;
    contain: paint;
    pointer-events: none;
  }

  .acha-essay-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(0, 0, 0, 0.64) 0%, rgba(0, 0, 0, 0.32) 44%, rgba(0, 0, 0, 0.06) 100%),
      linear-gradient(0deg, rgba(0, 0, 0, 0.28), transparent 42%);
    pointer-events: none;
    margin: 0;
    transition: background 0.7s var(--ease-out-expo), opacity 0.7s var(--ease-out-expo);
  }

  .acha-inline-essay.is-toggle-open .acha-essay-visual::after,
  .acha-inline-essay.is-expanding .acha-essay-visual::after {
    background:
      linear-gradient(90deg, rgba(0, 0, 0, 0.68) 0%, rgba(0, 0, 0, 0.34) 44%, rgba(0, 0, 0, 0.08) 100%),
      linear-gradient(
        0deg,
        rgb(var(--acha-essay-bg-rgb)) 0%,
        rgba(var(--acha-essay-bg-rgb), 0.86) 12%,
        rgba(var(--acha-essay-bg-rgb), 0.22) 48%,
        transparent 76%
      );
  }

  .acha-essay-visual img,
  .acha-essay-visual .acha-cover-fallback {
    width: 100%;
    aspect-ratio: 21 / 8;
    min-height: clamp(260px, 32vw, 440px);
    object-fit: cover;
    object-position: center;
    background: var(--bg-secondary);
    transform: translateZ(0) scale(1.02);
    backface-visibility: hidden;
    will-change: transform;
    transition: transform 0.9s var(--ease-out-expo);
  }

  .acha-inline-essay summary:hover .acha-essay-visual img,
  .acha-inline-essay summary:focus-within .acha-essay-visual img {
    transform: translateZ(0) scale(1.05);
  }

  .acha-essay-visual figcaption,
  .acha-essay-toggle,
  .acha-essay-collapse {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    width: fit-content;
    font-family: var(--font-sans);
    font-size: 0.6rem;
    line-height: 1.45;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .acha-essay-visual figcaption {
    position: absolute;
    left: clamp(16px, 2vw, 26px);
    bottom: clamp(14px, 2vw, 22px);
    z-index: 2;
    color: rgba(255, 255, 255, 0.76);
  }

  .acha-essay-toggle {
    position: relative;
    justify-content: center;
    min-height: 44px;
    padding: 0;
    border: 0;
    background: transparent;
    appearance: none;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    touch-action: manipulation;
    transition: color 0.36s ease, opacity 0.36s ease;
  }

  .acha-essay-toggle-icon {
    --acha-toggle-size: 11px;
    position: relative;
    display: inline-block;
    flex: 0 0 var(--acha-toggle-size);
    width: var(--acha-toggle-size);
    height: var(--acha-toggle-size);
    transform: rotate(0deg);
    transform-origin: 50% 50%;
    transition: transform 0.5s var(--ease-out-expo);
  }

  .acha-essay-toggle-icon::before,
  .acha-essay-toggle-icon::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--acha-toggle-size);
    height: 1px;
    background: currentColor;
    transform-origin: 50% 50%;
  }

  .acha-essay-toggle-icon::before {
    transform: translate(-50%, -50%);
  }

  .acha-essay-toggle-icon::after {
    transform: translate(-50%, -50%) rotate(90deg);
  }

  .acha-inline-essay.is-toggle-open .acha-essay-toggle-icon,
  .acha-inline-essay.is-expanding .acha-essay-toggle-icon {
    transform: rotate(45deg);
  }

  .acha-essay-heading {
    grid-area: 1 / 1;
    z-index: 2;
    display: grid;
    gap: clamp(14px, 2vw, 24px);
    align-self: center;
    max-width: min(760px, 82%);
    padding: clamp(22px, 5vw, 70px) 0 clamp(42px, 7vw, 90px) clamp(18px, 5vw, 76px);
  }

  .acha-essay-actions {
    display: flex;
    flex-wrap: wrap;
    column-gap: clamp(18px, 2.2vw, 30px);
    row-gap: 10px;
    align-items: center;
    margin-top: clamp(6px, 1vw, 14px);
  }

  .acha-instagram-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0 15px;
    border: 1px solid rgba(var(--acha-essay-ink-rgb), 0.54);
    border-radius: 0;
    background: rgba(var(--acha-essay-ink-rgb), 0.08);
    color: rgb(var(--acha-essay-ink-rgb));
    font-family: var(--font-sans);
    font-size: 0.58rem;
    line-height: 1;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.42s var(--ease-out-expo);
  }

  .acha-instagram-button:hover {
    background: rgba(var(--acha-essay-ink-rgb), 0.16);
    border-color: rgba(var(--acha-essay-ink-rgb), 0.82);
    transform: translateY(-1px);
  }

  .acha-inline-essay summary .acha-kicker,
  .acha-inline-essay summary .acha-essay-toggle {
    color: rgba(255, 255, 255, 0.74);
  }

  .acha-instagram-modal[hidden] {
    display: none;
  }

  .acha-instagram-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: grid;
    place-items: center;
    padding: var(--gutter);
  }

  .acha-instagram-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    opacity: 0;
    transition: opacity 0.42s var(--ease-out-expo);
  }

  .acha-instagram-dialog {
    position: relative;
    z-index: 1;
    width: min(560px, calc(100vw - var(--gutter) * 2));
    max-height: min(760px, calc(100vh - var(--gutter) * 2));
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    background: var(--bg-primary);
    border: 1px solid var(--border-color);
    box-shadow: 0 26px 80px rgba(0, 0, 0, 0.34);
    opacity: 0;
    transform: translateY(16px) scale(0.985);
    transition: opacity 0.48s var(--ease-out-expo), transform 0.48s var(--ease-out-expo);
  }

  .acha-instagram-modal.is-open .acha-instagram-backdrop {
    opacity: 1;
  }

  .acha-instagram-modal.is-open .acha-instagram-dialog {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .acha-instagram-header {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-color);
  }

  .acha-instagram-title {
    font-family: var(--font-sans);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .acha-instagram-close {
    width: 44px;
    height: 44px;
    border: 1px solid var(--border-color);
    border-radius: 0;
    background: transparent;
    color: var(--text-primary);
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 1rem;
    line-height: 1;
    transition: background 0.3s ease, transform 0.36s var(--ease-out-expo);
  }

  .acha-instagram-close:hover {
    background: var(--bg-secondary);
    transform: rotate(90deg);
  }

  .acha-instagram-frame {
    width: 100%;
    height: min(650px, calc(100vh - 152px));
    border: 0;
    background: var(--bg-secondary);
  }

  .acha-inline-essay h4 {
    font-family: var(--font-serif);
    font-size: clamp(1.7rem, 4.2vw, 4.2rem);
    line-height: 0.98;
    color: rgb(var(--acha-essay-ink-rgb));
    word-break: keep-all;
    text-shadow: 0 12px 34px rgba(0, 0, 0, 0.34);
  }

  .acha-essay-title-artist,
  .acha-essay-title-album {
    display: block;
  }

  .acha-inline-essay .acha-essay-content {
    max-width: none;
    position: relative;
    isolation: isolate;
    overflow: hidden;
    padding: clamp(28px, 4.6vw, 62px) clamp(18px, 4vw, 58px);
    display: grid;
    gap: clamp(28px, 4vw, 54px);
    background-color: transparent;
    color: var(--text-secondary);
    transition: background-color 0.7s var(--ease-out-expo), color 0.7s var(--ease-out-expo);
  }

  .acha-essay-content-body {
    column-count: 2;
    column-gap: clamp(30px, 5vw, 76px);
  }

  .acha-inline-essay .acha-essay-content::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -2;
    background-image:
      linear-gradient(90deg, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.38)),
      var(--acha-essay-bg-image, none);
    background-size: cover;
    background-position: center;
    filter: grayscale(1) saturate(0.82) contrast(1.05) brightness(0.66);
    opacity: 0;
    transform: scale(1.035);
    transition: opacity 0.82s var(--ease-out-expo), transform 1.2s var(--ease-out-expo);
  }

  .acha-inline-essay .acha-essay-content::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: -1;
    background: color-mix(in srgb, var(--bg-primary) 8%, transparent);
    opacity: 0;
    transition: opacity 0.82s var(--ease-out-expo);
  }

  .acha-inline-essay.is-toggle-open .acha-essay-content::before,
  .acha-inline-essay.is-expanding .acha-essay-content::before {
    opacity: 1;
    transform: scale(1);
  }

  .acha-inline-essay.is-toggle-open .acha-essay-content::after,
  .acha-inline-essay.is-expanding .acha-essay-content::after {
    opacity: 1;
  }

  .acha-inline-essay.is-toggle-open .acha-essay-content,
  .acha-inline-essay.is-expanding .acha-essay-content {
    background-color: rgb(var(--acha-essay-bg-rgb));
    background-image:
      linear-gradient(180deg, rgb(var(--acha-essay-bg-rgb)) 0%, rgba(var(--acha-essay-bg-rgb), 0.74) 16%, rgba(var(--acha-essay-bg-rgb), 0.5) 100%),
      linear-gradient(90deg, rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.34)),
      var(--acha-essay-bg-image, none);
    background-size: cover;
    background-position: center;
    color: rgb(var(--acha-essay-ink-rgb));
    margin-top: -1px;
  }

  .acha-essay-collapse {
    justify-self: start;
    color: rgb(var(--acha-essay-ink-rgb));
  }

  .acha-inline-essay.is-toggle-open .acha-essay-content p,
  .acha-inline-essay.is-toggle-open .acha-essay-content li,
  .acha-inline-essay.is-toggle-open .acha-essay-content h3,
  .acha-inline-essay.is-toggle-open .acha-essay-content h4,
  .acha-inline-essay.is-toggle-open .acha-essay-content h5,
  .acha-inline-essay.is-expanding .acha-essay-content p,
  .acha-inline-essay.is-expanding .acha-essay-content li,
  .acha-inline-essay.is-expanding .acha-essay-content h3,
  .acha-inline-essay.is-expanding .acha-essay-content h4,
  .acha-inline-essay.is-expanding .acha-essay-content h5 {
    color: rgb(var(--acha-essay-ink-rgb));
    text-shadow: 0 1px 18px rgba(0, 0, 0, 0.34);
  }

  @supports (mix-blend-mode: difference) {
    .acha-inline-essay.is-toggle-open .acha-essay-content p,
    .acha-inline-essay.is-toggle-open .acha-essay-content li,
    .acha-inline-essay.is-toggle-open .acha-essay-content h3,
    .acha-inline-essay.is-toggle-open .acha-essay-content h4,
    .acha-inline-essay.is-toggle-open .acha-essay-content h5,
    .acha-inline-essay.is-expanding .acha-essay-content p,
    .acha-inline-essay.is-expanding .acha-essay-content li,
    .acha-inline-essay.is-expanding .acha-essay-content h3,
    .acha-inline-essay.is-expanding .acha-essay-content h4,
    .acha-inline-essay.is-expanding .acha-essay-content h5 {
      color: rgb(var(--acha-essay-difference-rgb));
      mix-blend-mode: difference;
    }
  }

  .acha-inline-essay[data-enhanced="true"] .acha-essay-content {
    overflow: hidden;
    transition:
      height 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      opacity 0.4s ease,
      transform 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      padding 0.5s cubic-bezier(0.16, 1, 0.3, 1),
      background-color 0.7s var(--ease-out-expo),
      color 0.7s var(--ease-out-expo);
  }

  .acha-inline-essay.is-collapsing .acha-essay-content {
    opacity: 0;
    transform: translateY(-10px);
    padding-top: 0;
    padding-bottom: 0;
  }

  .acha-inline-essay[data-enhanced="true"]:not(.is-toggle-open) .acha-essay-content {
    height: 0;
    opacity: 0;
    transform: translateY(-10px);
    padding-top: 0;
    padding-bottom: 0;
    pointer-events: none;
  }

  .acha-inline-essay.is-expanding .acha-essay-content,
  .acha-inline-essay.is-toggle-open .acha-essay-content {
    opacity: 1;
    transform: translateY(0);
  }

  .acha-inline-essay .acha-essay-content h3 {
    break-after: avoid;
    break-inside: avoid;
  }

  .acha-inline-essay:not([open]) .acha-essay-content {
    display: none;
  }

  .acha-essays {
    display: grid;
    grid-template-columns: minmax(150px, 0.2fr) minmax(0, 0.8fr);
    gap: clamp(28px, 5vw, 80px);
    padding: var(--space-xl) 0 0;
  }

  .acha-essay-list {
    display: grid;
    gap: 12px;
  }

  .acha-essay-list a {
    display: grid;
    grid-template-columns: 88px minmax(0, 1fr);
    gap: 18px;
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
  }

  @media (prefers-reduced-motion: reduce) {
    .acha-page.is-loading .acha-hero h1 {
      color: var(--text-primary);
      background: none;
      animation: none;
    }

    .acha-page.is-loading .acha-hero h1::after {
      display: none;
    }

    .acha-tier,
    .acha-album,
    .acha-inline-essay[data-enhanced="true"] .acha-essay-content,
    .acha-instagram-backdrop,
    .acha-instagram-dialog,
    .acha-essay-visual img,
    .acha-essay-toggle-icon {
      animation: none;
      opacity: 1;
      transform: none;
      transition: none;
    }

  @media (max-width: 1100px) {

    .acha-cover-fallback {
      width: clamp(96px, 16vw, 140px);
      flex-basis: clamp(96px, 16vw, 140px);

      grid-template-columns: 1fr;
    }
  }

      gap: clamp(20px, 6vw, 34px);

    if (!/^https?:\/\//i.test(displayUrl)) return displayUrl;

    return {
      background: rgbToCss(background),
      panel: rgbToCss(panel),
      ink: rgbToCss(ink),

  async function sampleImagePalette(url) {
    const image = await loadSampleableImage(url);
    const sourceWidth = image.naturalWidth || image.width;
    const sourceHeight = image.naturalHeight || image.height;

    const sampleHeight = 42;
    const targetAspect = 21 / 8;
    const sourceAspect = sourceWidth / sourceHeight;

    let sy = 0;
    let sw = sourceWidth;
    let sh = sourceHeight;

      sx = (sourceWidth - sw) / 2;
    } else {

    const { data } = context.getImageData(0, 0, sampleWidth, sampleHeight);

    let blue = 0;

  function coverBezierAt(t, p1, p2) {

  function setupScrollReveal(selector, visibleClass, delayProperty) {

      items.forEach((item) => {
        if (item.classList.contains(visibleClass)) return;

    if (!summary || !bodyEl.contains(summary)) return;
    event.preventDefault();
    toggleInlineEssayFromSummary(summary);
  }

  function handleInstagramModalClick(event) {
    if (event.target.closest('[data-acha-instagram-close]')) closeInstagramModal();
  }

  function handleInstagramModalKeydown(event) {
    if (event.key === 'Escape') closeInstagramModal();
  }

  function createInlineEssayScrollAnchor(details, control, shouldOpen) {
    if (shouldOpen || !control?.classList?.contains('acha-essay-collapse')) return null;
    const album = details.closest('.acha-album');
    const anchor = album?.nextElementSibling || 
                   album?.closest('.acha-tier')?.nextElementSibling || 
                   document.getElementById('acha-essays') || 
                   document.getElementById('acha-status') || 
                   details;
    if (!anchor) return null;
    const initialTop = anchor.getBoundingClientRect().top;
    let frameId = 0;
    let stopped = false;

    const sync = () => {
      const delta = anchor.getBoundingClientRect().top - initialTop;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
    };

    const tick = () => {
      if (stopped) return;
      sync();
      frameId = window.requestAnimationFrame(tick);
    };

    return {
      start() {
        frameId = window.requestAnimationFrame(tick);
      },
      stop() {
        stopped = true;
        window.cancelAnimationFrame(frameId);
        sync();
      }
    };
  }

  function animateInlineEssay(details, shouldOpen, options = {}) {
    const content = details.querySelector('.acha-essay-content');
    if (!content) return;
    if (shouldOpen) closeOtherInlineEssays(details);
    const scrollAnchor = createInlineEssayScrollAnchor(details, options.control, shouldOpen);

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      details.open = shouldOpen;
      details.classList.toggle('is-toggle-open', shouldOpen);
      syncInlineEssayControls(details, shouldOpen);
      syncEssayFocusMode();
      window.requestAnimationFrame(() => scrollAnchor?.stop());
      return;
    }

    details.dataset.animating = 'true';
    content.style.overflow = 'hidden';

    if (shouldOpen) {
      details.open = true;
      details.classList.add('is-toggle-open');
      syncInlineEssayControls(details, true);
      details.classList.remove('is-collapsing');
      details.classList.add('is-expanding');
      syncEssayFocusMode();
      content.style.height = '0px';
      content.style.opacity = '0';
      content.style.transform = 'translateY(-8px)';
      content.style.paddingTop = '';
      content.getBoundingClientRect();
      requestAnimationFrame(() => {
        content.style.height = `${content.scrollHeight}px`;
        content.style.opacity = '1';
        content.style.transform = 'translateY(0)';
      });
    } else {
      details.classList.remove('is-toggle-open');
      syncInlineEssayControls(details, false);
      details.classList.remove('is-expanding');
      details.classList.add('is-collapsing');
      syncEssayFocusMode();
      content.style.height = `${content.scrollHeight}px`;
      content.style.opacity = '1';
      content.style.transform = 'translateY(0)';
      content.getBoundingClientRect();
      requestAnimationFrame(() => {
        scrollAnchor?.start();
        content.style.height = '0px';
        content.style.opacity = '0';
        content.style.transform = 'translateY(-8px)';
      });
    }

    const finish = (event) => {
      if (event && (event.target !== content || event.propertyName !== 'height')) return;
      content.removeEventListener('transitionend', finish);
      window.clearTimeout(details._essayAnimationFallback);
      details.open = shouldOpen;
      content.style.height = shouldOpen ? 'auto' : '';
      content.style.opacity = '';
      content.style.transform = '';
      content.style.paddingTop = '';
      content.style.paddingBottom = '';
      content.style.overflow = '';
      details.classList.remove('is-expanding', 'is-collapsing');
      delete details.dataset.animating;
      scrollAnchor?.stop();
      syncEssayFocusMode();
    };

    content.addEventListener('transitionend', finish);
    details._essayAnimationFallback = window.setTimeout(() => finish(), 720);
  }

  function setupInlineEssayInteractions() {
    document.querySelectorAll('.acha-inline-essay').forEach((details) => {
      const summary = details.querySelector('summary');
      const content = details.querySelector('.acha-essay-content');
      if (!summary || !content) return;
      const visualUrl = details.dataset.essayVisualUrl;
      setupEssayPalette(details, visualUrl);
      const shouldStartOpen = false;
      details.dataset.enhanced = 'true';
      details.open = shouldStartOpen;
      details.classList.toggle('is-toggle-open', shouldStartOpen);
      syncInlineEssayControls(details, shouldStartOpen);
      summary.setAttribute('role', 'button');
      summary.setAttribute('tabindex', '0');
      content.style.height = shouldStartOpen ? 'auto' : '';
    });
    syncEssayFocusMode();
  }

  function stopAchaTrackAudio() {
    if (activeAchaProgressTimer) {
      window.clearInterval(activeAchaProgressTimer);
      activeAchaProgressTimer = 0;
    }
    if (activeAchaAudio) {
      activeAchaAudio.pause();
      activeAchaAudio.src = '';
      activeAchaAudio = null;
    }
    if (activeAchaYoutubePlayer && typeof activeAchaYoutubePlayer.pauseVideo === 'function') {
      try { activeAchaYoutubePlayer.pauseVideo(); } catch (err) {}
    }
    activeAchaYoutubeModule = null;
  }

  function getAchaTrackData(field) {
    try {
      return JSON.parse(field.dataset.achaTracks || '[]');
    } catch (err) {
      return [];
    }
  }

  function formatTrackTime(seconds) {
    if (!Number.isFinite(seconds) || seconds < 0) return '0:00';
    const minutes = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
  }

  function setAchaPlayIcon(module, isPlaying) {
    const icon = module.querySelector('[data-acha-play-toggle] svg');
    if (!icon) return;
    icon.innerHTML = isPlaying
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
      : '<polygon points="5 3 19 12 5 21 5 3"/>';
  }

  function setAchaPlayerStatus(module, status) {
    const statusEl = module.querySelector('[data-acha-play-status]');
    if (statusEl) statusEl.textContent = status;
  }

  function resetAchaPlayerProgress(module) {
    const current = module.querySelector('[data-acha-play-current]');
    const fill = module.querySelector('[data-acha-play-fill]');
    if (current) current.textContent = '0:00';
    if (fill) {
      fill.classList.add('is-resetting');
      fill.style.width = '0%';
      setTimeout(() => fill.classList.remove('is-resetting'), 450);
    }
  }

  function startAchaMediaProgress(module, getCurrent, getDuration) {
    if (activeAchaProgressTimer) {
      window.clearInterval(activeAchaProgressTimer);
      activeAchaProgressTimer = 0;
    }
    activeAchaProgressTimer = window.setInterval(() => {
      const currentSeconds = getCurrent();
      const durationSeconds = getDuration();
      const current = module.querySelector('[data-acha-play-current]');
      const duration = module.querySelector('[data-acha-play-duration]');
      const fill = module.querySelector('[data-acha-play-fill]');
      if (current) current.textContent = formatTrackTime(currentSeconds);
      if (durationSeconds && duration) duration.textContent = formatTrackTime(durationSeconds);
      if (fill && durationSeconds) fill.style.width = `${Math.min(100, (currentSeconds / durationSeconds) * 100)}%`;
    }, 160);
  }

  function ensureAchaYoutubePlayer() {
    if (activeAchaYoutubePlayer) return Promise.resolve(activeAchaYoutubePlayer);
    if (achaYoutubeReadyPromise) return achaYoutubeReadyPromise;

    achaYoutubeReadyPromise = new Promise((resolve, reject) => {
      achaYoutubeResolve = resolve;
      achaYoutubeReject = reject;
      const bootPlayer = () => {
        if (!window.YT?.Player) {
          reject(new Error('YouTube IFrame API unavailable.'));
          return;
        }
        let holder = document.getElementById('acha-youtube-hidden-player');
        if (!holder) {
          holder = document.createElement('div');
          holder.id = 'acha-youtube-hidden-player';
          holder.style.cssText = 'position:fixed;bottom:-200px;right:-200px;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-9999;';
          document.body.appendChild(holder);
        }
        activeAchaYoutubePlayer = new window.YT.Player(holder.id, {
          height: '1',
          width: '1',
          playerVars: { autoplay: 0, controls: 0, rel: 0, modestbranding: 1, playsinline: 1 },
          events: {
            onReady: () => resolve(activeAchaYoutubePlayer),
            onStateChange: (event) => {
              const module = activeAchaYoutubeModule;
              if (!module || !window.YT?.PlayerState) return;
              if (event.data === window.YT.PlayerState.PLAYING) {
                setAchaPlayIcon(module, true);
                setAchaPlayerStatus(module, 'Now Playing');
                startAchaMediaProgress(
                  module,
                  () => activeAchaYoutubePlayer?.getCurrentTime?.() || 0,
                  () => activeAchaYoutubePlayer?.getDuration?.() || 0
                );
              } else if (event.data === window.YT.PlayerState.PAUSED) {
                setAchaPlayIcon(module, false);
                setAchaPlayerStatus(module, 'Paused');
              } else if (event.data === window.YT.PlayerState.ENDED) {
                setAchaPlayIcon(module, false);
                setAchaPlayerStatus(module, 'Ready');
                resetAchaPlayerProgress(module);
                activeAchaYoutubeModule = null;
              }
            }
          }
        });
      };

      if (window.YT?.Player) {
        bootPlayer();
        return;
      }

      const previousReady = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = () => {
        if (typeof previousReady === 'function') previousReady();
        bootPlayer();
      };

      if (!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')) {
        const script = document.createElement('script');
        script.src = 'https://www.youtube.com/iframe_api';
        script.onerror = () => reject(new Error('Unable to load YouTube IFrame API.'));
        document.head.appendChild(script);
      }
    }).catch((err) => {
      achaYoutubeReadyPromise = null;
      if (achaYoutubeReject) achaYoutubeReject(err);
      throw err;
    });

    return achaYoutubeReadyPromise;
  }

  function updateAchaTrackUI(module, index, direction = 'next') {
    const field = module.closest('.acha-highlighted-track');
    const tracks = getAchaTrackData(field);
    const track = tracks[index];
    if (!track) return;

    const info = module.querySelector('.acha-play-track-info');
    const apply = () => {
      module.dataset.activeTrackIndex = String(index);
      module.querySelectorAll('.acha-track-trigger').forEach((button) => {
        const isActive = Number(button.dataset.achaTrackIndex) === index;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-expanded', isActive ? 'true' : 'false');
      });
      const num = module.querySelector('[data-acha-play-num]');
      const title = module.querySelector('[data-acha-play-title]');
      const duration = module.querySelector('[data-acha-play-duration]');
      if (num) num.textContent = track.number || padTrackNumber(index + 1);
      if (title) title.textContent = track.title || '';
      if (duration) duration.textContent = track.duration || '0:00';
      resetAchaPlayerProgress(module);
    };

    if (!info) {
      apply();
      return;
    }

    info.classList.remove('track-anim-out-up', 'track-anim-out-down', 'track-anim-in-up', 'track-anim-in-down');
    const outClass = direction === 'prev' ? 'track-anim-out-down' : 'track-anim-out-up';
    const inClass = direction === 'prev' ? 'track-anim-in-down' : 'track-anim-in-up';
    info.classList.add(outClass);
    window.setTimeout(() => {
      apply();
      info.classList.remove(outClass);
      info.classList.add(inClass);
    }, 220);
  }

  function closeAchaTrackModule(module) {
    if (!module) return;
    const player = module.querySelector('.acha-track-player');
    module.querySelectorAll('.acha-track-trigger').forEach((button) => {
      button.classList.remove('is-active');
      button.setAttribute('aria-expanded', 'false');
    });
    if (player) {
      player.classList.remove('is-open');
      player.setAttribute('aria-hidden', 'true');
    }
    setAchaPlayIcon(module, false);
    setAchaPlayerStatus(module, 'Ready');
    resetAchaPlayerProgress(module);
    if (activeAchaTrackModule === module) activeAchaTrackModule = null;
  }

  function openAchaTrackModule(module, index, options = {}) {
    const player = module.querySelector('.acha-track-player');
    if (!player) return;
    if (activeAchaTrackModule && activeAchaTrackModule !== module) {
      stopAchaTrackAudio();
      closeAchaTrackModule(activeAchaTrackModule);
    }

    const currentIndex = Number(module.dataset.activeTrackIndex || 0);
    updateAchaTrackUI(module, index, index < currentIndex ? 'prev' : 'next');
    player.classList.add('is-open');
    player.setAttribute('aria-hidden', 'false');
    activeAchaTrackModule = module;
    if (options.play) playAchaTrack(module);
  }

  async function playAchaTrack(module) {
    const field = module.closest('.acha-highlighted-track');
    const tracks = getAchaTrackData(field);
    const index = Number(module.dataset.activeTrackIndex || 0);
    const track = tracks[index];

    stopAchaTrackAudio();
    resetAchaPlayerProgress(module);

    if (track?.youtubeId) {
      setAchaPlayerStatus(module, 'Loading');
      try {
        const player = await ensureAchaYoutubePlayer();
        activeAchaYoutubeModule = module;
        if (typeof player.loadVideoById === 'function') {
          player.loadVideoById(track.youtubeId);
        }
      } catch (err) {
        activeAchaYoutubeModule = null;
        setAchaPlayIcon(module, false);
        setAchaPlayerStatus(module, 'Playback unavailable');
      }
      return;
    }

    if (!track?.source) {
      setAchaPlayIcon(module, false);
      setAchaPlayerStatus(module, 'Preview unavailable');
      return;
    }

    activeAchaAudio = new Audio(track.source);
    activeAchaAudio.addEventListener('loadedmetadata', () => {
      const duration = module.querySelector('[data-acha-play-duration]');
      if (duration) duration.textContent = formatTrackTime(activeAchaAudio.duration);
    }, { once: true });
    activeAchaAudio.addEventListener('ended', () => {
      setAchaPlayIcon(module, false);
      setAchaPlayerStatus(module, 'Ready');
      resetAchaPlayerProgress(module);
      stopAchaTrackAudio();
    });
    activeAchaAudio.play()
      .then(() => {
        setAchaPlayIcon(module, true);
        setAchaPlayerStatus(module, 'Now Playing');
        startAchaMediaProgress(
          module,
          () => activeAchaAudio?.currentTime || 0,
          () => activeAchaAudio?.duration || 0
        );
      })
      .catch(() => {
        setAchaPlayIcon(module, false);
        setAchaPlayerStatus(module, 'Playback blocked');
      });
  }

  function toggleAchaTrackModule(module, index) {
    const player = module.querySelector('.acha-track-player');
    const isOpen = player?.classList.contains('is-open');
    const currentIndex = Number(module.dataset.activeTrackIndex || 0);

    if (isOpen && currentIndex === index) {
      stopAchaTrackAudio();
      closeAchaTrackModule(module);
      return;
    }

    stopAchaTrackAudio();
    openAchaTrackModule(module, index, { play: true });
  }

  function moveAchaTrack(module, direction) {
    const field = module.closest('.acha-highlighted-track');
    const tracks = getAchaTrackData(field);
    if (tracks.length <= 1) return;
    const currentIndex = Number(module.dataset.activeTrackIndex || 0);
    const nextIndex = direction === 'prev'
      ? (currentIndex - 1 + tracks.length) % tracks.length
      : (currentIndex + 1) % tracks.length;
    stopAchaTrackAudio();
    openAchaTrackModule(module, nextIndex, { play: true });
  }

  function handleHighlightedTrackClick(event) {
    const trackButton = event.target.closest?.('[data-acha-track-index]');
    if (trackButton && bodyEl.contains(trackButton)) {
      event.preventDefault();
      const module = trackButton.closest('.acha-track-module');
      toggleAchaTrackModule(module, Number(trackButton.dataset.achaTrackIndex || 0));
      return true;
    }

    const toggleButton = event.target.closest?.('[data-acha-play-toggle]');
    if (toggleButton && bodyEl.contains(toggleButton)) {
      event.preventDefault();
      const module = toggleButton.closest('.acha-track-module');
      if (!module) return true;
      const hasAudio = Boolean((activeAchaAudio && activeAchaTrackModule === module) || activeAchaYoutubeModule === module);
      if (hasAudio) {
        stopAchaTrackAudio();
        setAchaPlayIcon(module, false);
        setAchaPlayerStatus(module, 'Paused');
      } else {
        playAchaTrack(module);
      }
      return true;
    }

    const progressBar = event.target.closest?.('[data-acha-play-bar]');
    if (progressBar && bodyEl.contains(progressBar)) {
      event.preventDefault();
      const module = progressBar.closest('.acha-track-module');
      const rect = progressBar.getBoundingClientRect();
      const ratio = rect.width ? Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width)) : 0;
      const fill = module?.querySelector('[data-acha-play-fill]');
      if (fill) {
        fill.classList.add('is-seeking');
        fill.style.width = `${ratio * 100}%`;
        setTimeout(() => fill.classList.remove('is-seeking'), 500);
      }
      if (activeAchaAudio && activeAchaTrackModule === module && activeAchaAudio.duration) {
        activeAchaAudio.currentTime = activeAchaAudio.duration * ratio;
      } else if (activeAchaYoutubeModule === module && activeAchaYoutubePlayer?.getDuration && activeAchaYoutubePlayer?.seekTo) {
        const duration = activeAchaYoutubePlayer.getDuration() || 0;
        if (duration) activeAchaYoutubePlayer.seekTo(duration * ratio, true);
      }
      return true;
    }

    const prevButton = event.target.closest?.('[data-acha-play-prev]');
    if (prevButton && bodyEl.contains(prevButton) && !prevButton.disabled) {
      event.preventDefault();
      moveAchaTrack(prevButton.closest('.acha-track-module'), 'prev');
      return true;
    }

    const nextButton = event.target.closest?.('[data-acha-play-next]');
    if (nextButton && bodyEl.contains(nextButton) && !nextButton.disabled) {
      event.preventDefault();
      moveAchaTrack(nextButton.closest('.acha-track-module'), 'next');
      return true;
    }

    return false;
  }

  function getEssayHref(issue, essay) {
    return `?issue=${encodeURIComponent(issue.slug || issue.id)}&essay=${encodeURIComponent(essay.id || essay.title || '')}#essay-${encodeURIComponent(essay.id || essay.title || '')}`;
  }

  function flattenAlbums(issue) {
    return (issue.tiers || []).flatMap((tier) => (tier.items || []).map((item) => ({
      ...item,
      tierRank: tier.rank,
      tierLabel: tier.label
    }))).filter((item) => item.album);
  }

  function getTierCanon(tierCanon, tier) {
    return (tierCanon || []).find((item) => Number(item.rank) === Number(tier.rank)) || {};
  }

  function renderCover(item) {
    if (item.imageUrl) {
      return `<img src="${escapeHtml(getDisplayImageUrl(item.imageUrl))}" alt="${escapeHtml(`${item.album} album cover`)}" loading="lazy">`;
    }
    return `<div class="acha-cover-fallback">${escapeHtml(item.album || 'ACHA')}</div>`;
  }

  function renderEssayVisualImage(visual, fallbackItem) {
    if (visual.url) {
      return `<img src="${escapeHtml(getSampleableImageUrl(visual.url))}" alt="${escapeHtml(visual.alt || visual.caption || 'Featured article image')}" loading="lazy" decoding="async" crossorigin="anonymous">`;
    }
    if (fallbackItem?.imageUrl) {
      return `<img src="${escapeHtml(getSampleableImageUrl(fallbackItem.imageUrl))}" alt="${escapeHtml(`${fallbackItem.album || 'Featured article'} image`)}" loading="lazy" decoding="async" crossorigin="anonymous">`;
    }
    return renderCover(fallbackItem);
  }

  function renderEssayBlock(block) {
    if (block.type === 'image' && block.url) {
      return `<img src="${escapeHtml(block.url)}" alt="${escapeHtml(block.text || '')}" loading="lazy">`;
    }
    const text = block.text || '';
    if (!text) return '';
    if (/heading_1|heading_2/i.test(block.type)) return `<h4>${escapeHtml(text)}</h4>`;
    if (/heading/i.test(block.type)) return `<h5>${escapeHtml(text)}</h5>`;
    if (/bulleted|numbered/i.test(block.type)) return `<p>${escapeHtml(text)}</p>`;
    return `<p>${escapeHtml(text)}</p>`;
  }

  function normalizeEssayText(text) {
    return String(text || '')
      .replace(/\s*\n+\s*/g, ' ')
      .replace(/[ \t]{2,}/g, ' ')
      .trim();
  }

  function shouldMergeEssayParagraph(previous, next) {
    if (!previous || !next) return false;
    if (previous.type !== 'paragraph' || next.type !== 'paragraph') return false;
    const text = String(previous.text || '').trim();
    if (!text) return false;
    return !/[.!?。！？…)"'’”\]]$/.test(text);
  }

  function splitKnownEssayBlock(block) {
    const rawText = String(block.text || '').trim();
    const text = normalizeEssayText(rawText);
    if (!text) return [];
    if (/heading/i.test(block.type)) return [{ ...block, text }];
    if (/numbered|bulleted/i.test(block.type)) return [{ type: 'heading_3', text }];

    const multilineNumberedHeading = rawText.match(/^([1-9]\.\s*[^\n]+)\n+\s*([\s\S]+)$/);
    if (multilineNumberedHeading && multilineNumberedHeading[1].length <= 36) {
      return [
        { type: 'heading_3', text: normalizeEssayText(multilineNumberedHeading[1]) },
        { type: 'paragraph', text: normalizeEssayText(multilineNumberedHeading[2]) }
      ];
    }

    const knownInlineHeading = text.match(/^([1-9]\.\s*(?:아이디어|프로덕션|표현력))\s+(.+)$/);
    if (knownInlineHeading) {
      return [
        { type: 'heading_3', text: knownInlineHeading[1] },
        { type: 'paragraph', text: knownInlineHeading[2] }
      ];
    }

    const numberedHeading = text.match(/^([1-9]\.\s*[^\n]+)\s+(.+)$/);
    if (numberedHeading && numberedHeading[1].length <= 28) {
      return [
        { type: 'heading_3', text: numberedHeading[1] },
        { type: 'paragraph', text: numberedHeading[2] }
      ];
    }

    const conclusionHeading = text.match(/^(결론)\s*[-–—]\s*(.+)$/);
    if (conclusionHeading) {
      return [
        { type: 'heading_3', text: conclusionHeading[1] },
        { type: 'paragraph', text: conclusionHeading[2] }
      ];
    }

    return [{ type: 'paragraph', text }];
  }

  function mergeKnownEssayParagraphs(blocks) {
    return blocks.reduce((acc, block) => {
      const previous = acc[acc.length - 1];
      if (shouldMergeEssayParagraph(previous, block)) {
        previous.text = `${previous.text} ${block.text}`.replace(/[ \t]{2,}/g, ' ');
      } else {
        acc.push({ ...block });
      }
      return acc;
    }, []);
  }

  function getKnownEssayBlocks(essay) {
    const key = normalizeMatchText(`${essay.title || ''} ${essay.artist || ''} ${essay.album || ''}`);
    const isKnown = key.includes('atrain') || key.includes('에이트레인')
      || key.includes('히피쿤다') || key.includes('hippiekunda')
      || key.includes('ogipattern') || key.includes('반타01') || key.includes('cwar');
    if (!isKnown) return null;

    let rawBlocks = Array.isArray(essay.blocks) && essay.blocks.length
      ? essay.blocks
      : String(essay.content || '').split(/\n{2,}/).filter(Boolean).map((text) => ({ type: 'paragraph', text }));

    if (key.includes('히피쿤다')) {
      const sketchIndex = rawBlocks.findIndex((block) => block.type === 'toggle' && normalizeMatchText(block.text) === 'sketch');
      if (sketchIndex >= 0) rawBlocks = rawBlocks.slice(sketchIndex + 1);
    }

    return mergeKnownEssayParagraphs(rawBlocks.flatMap(splitKnownEssayBlock));
  }

  function renderEssayContent(essay) {
    const knownBlocks = getKnownEssayBlocks(essay);
    const blocks = knownBlocks || (Array.isArray(essay.blocks) && essay.blocks.length
      ? essay.blocks
      : String(essay.content || '').split(/\n{2,}/).filter(Boolean).map((text) => ({ type: 'paragraph', text })));
    return blocks.map(renderEssayBlock).join('');
  }

  function normalizeMatchText(value) {
    return String(value || '').replace(/[\s\-_()[\]]+/g, '').toLowerCase();
  }

  function findEssayAlbum(issue, essay) {
    const albums = flattenAlbums(issue);
    const essayAlbum = normalizeMatchText(essay.album);
    const essayArtist = normalizeMatchText(essay.artist);
    if (essayAlbum || essayArtist) {
      const directMatch = albums.find((item) => {
        const albumMatches = !essayAlbum || normalizeMatchText(item.album) === essayAlbum;
        const artistMatches = !essayArtist || normalizeMatchText(item.artist) === essayArtist;
        return albumMatches && artistMatches;
      });
      if (directMatch) return directMatch;
    }

    const title = normalizeMatchText(essay.title);
    return albums.find((item) => {
      const hasEssay = hasValue(item.companionEssay);
      const tierMatches = !essay.tierRank || Number(item.tierRank) === Number(essay.tierRank);
      const titleMatches = title.includes(normalizeMatchText(item.album)) || title.includes(normalizeMatchText(item.artist));
      return hasEssay && tierMatches && titleMatches;
    }) || albums.find((item) => hasValue(item.companionEssay) && (!essay.tierRank || Number(item.tierRank) === Number(essay.tierRank)));
  }

  function getEssayDisplayTitle(issue, essay) {
    const album = findEssayAlbum(issue, essay);
    if (album?.artist && album?.album) return `${album.artist} — ${album.album}`;
    const match = String(essay.title || '').match(/\(([^)]+)\)\s*\[([^\]]+)\]/);
    if (match) return `${match[1]} — ${match[2]}`;
    return essay.title || 'Featured article';
  }

  function getEssayDisplayTitleParts(issue, essay) {
    const album = findEssayAlbum(issue, essay);
    if (album?.artist && album?.album) {
      return { artist: album.artist, album: album.album, fallback: '' };
    }
    const match = String(essay.title || '').match(/\(([^)]+)\)\s*\[([^\]]+)\]/);
    if (match) return { artist: match[1], album: match[2], fallback: '' };
    return { artist: '', album: '', fallback: essay.title || 'Featured article' };
  }

  function getAchaSummary() {
    return [
      "ACHA: A's Choice & Home Archive",
      '4곡 이상 수록된 국내 EP 및 정규 앨범을\n기준에 따라 일곱 단계로 분류하고 그중 상위를 소개합니다.',
      '동일 tier 내 앨범 순서는 발매일 기준입니다.'
    ].join('\n');
  }

  function getEssayVisual(issue, essay) {
    const album = findEssayAlbum(issue, essay);
    return {
      url: essay.artistImageUrl || album?.artistImageUrl || album?.imageUrl || '',
      alt: album?.artist ? `${album.artist} artist image` : getEssayDisplayTitle(issue, essay),
      caption: album?.artist || 'Featured article'
    };
  }

  function getAlbumEssay(issue, item) {
    return (issue.essays || []).find((essay) => {
      const matchedAlbum = findEssayAlbum(issue, essay);
      return matchedAlbum
        && normalizeMatchText(matchedAlbum.album) === normalizeMatchText(item.album)
        && normalizeMatchText(matchedAlbum.artist) === normalizeMatchText(item.artist);
    });
  }

  function renderInlineEssay(issue, item) {
    const essay = getAlbumEssay(issue, item);
    if (!essay) return '';
    const visual = getEssayVisual(issue, essay);
    const instagramUrl = getEssayInstagramPost(issue, essay, item);
    const visualUrl = getDisplayImageUrl(visual.url || item.imageUrl || '');
    const titleParts = getEssayDisplayTitleParts(issue, essay);
    const titleHtml = titleParts.fallback
      ? escapeHtml(titleParts.fallback)
      : `<span class="acha-essay-title-artist">${escapeHtml(titleParts.artist)} &mdash;</span><span class="acha-essay-title-album">${escapeHtml(titleParts.album)}</span>`;
    return `
      <details class="acha-inline-essay" id="essay-${escapeHtml(essay.id || essay.title || '')}" data-essay-visual-url="${escapeHtml(visualUrl)}">
        <summary>
          <figure class="acha-essay-visual">
            ${renderEssayVisualImage(visual, item)}
            <figcaption>${escapeHtml(visual.caption)}</figcaption>
          </figure>
          <div class="acha-essay-heading">
            <p class="acha-kicker">Featured article</p>
            <h4>${titleHtml}</h4>
            <div class="acha-essay-actions">
              <button class="acha-essay-toggle" type="button" data-essay-toggle aria-expanded="false">
                <span data-essay-toggle-label>Full article</span>
                <i class="acha-essay-toggle-icon" aria-hidden="true"></i>
              </button>
              ${instagramUrl ? `<span class="acha-instagram-button" role="button" tabindex="0" data-instagram-post-url="${escapeHtml(instagramUrl)}">Instagram post</span>` : ''}
            </div>
          </div>
        </summary>
        <div class="acha-essay-content">
          <div class="acha-essay-content-body">
            ${renderEssayContent(essay)}
          </div>
          <button class="acha-essay-toggle acha-essay-collapse" type="button" data-essay-toggle aria-expanded="true">
            <span data-essay-toggle-label>Fold article</span>
            <i class="acha-essay-toggle-icon" aria-hidden="true"></i>
          </button>
        </div>
      </details>
    `;
  }

  function padTrackNumber(value) {
    const numeric = Number.parseInt(String(value || '').replace(/\D/g, ''), 10);
    if (!numeric) return String(value || '').trim() || '01';
    return numeric < 10 ? `0${numeric}` : String(numeric);
  }

  function extractYouTubeVideoId(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const bracket = raw.match(/\[youtube:([a-zA-Z0-9_-]{11})\]/i);
    if (bracket) return bracket[1];
    const short = raw.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/i);
    if (short) return short[1];
    const watch = raw.match(/[?&]v=([a-zA-Z0-9_-]{11})/i);
    if (watch) return watch[1];
    const embed = raw.match(/youtube\.com\/(?:embed|shorts)\/([a-zA-Z0-9_-]{11})/i);
    if (embed) return embed[1];
    return /^[a-zA-Z0-9_-]{11}$/.test(raw) ? raw : '';
  }

  function extractTrackMedia(rawValue) {
    const raw = String(rawValue || '');
    const urlMatch = raw.match(/https?:\/\/(?:www\.)?(?:youtube\.com|youtu\.be)\/[^\s)\]]+/i);
    const bracketMatch = raw.match(/\[youtube:[a-zA-Z0-9_-]{11}\]/i);
    const youtubeId = extractYouTubeVideoId(urlMatch?.[0] || bracketMatch?.[0] || '');
    const title = raw
      .replace(urlMatch?.[0] || '', '')
      .replace(bracketMatch?.[0] || '', '')
      .trim();
    return { title, youtubeId };
  }

  function parseTrackToken(token, index) {
    const media = extractTrackMedia(token);
    const raw = media.title.trim();
    const numbered = raw.match(/^#?\s*([0-9]+)\s+(.+)$/);
    if (numbered) {
      return {
        number: padTrackNumber(numbered[1]),
        title: numbered[2].trim(),
        source: '',
        youtubeId: media.youtubeId
      };
    }
    return {
      number: padTrackNumber(index + 1),
      title: raw,
      source: '',
      youtubeId: media.youtubeId
    };
  }

  function getTrackSource(track) {
    return track.audioUrl || track.audio || track.previewUrl || track.source || track.url || '';
  }

  function getTrackYoutubeId(track) {
    return track.youtubeId || track.youtubeVideoId || track.videoId || extractYouTubeVideoId(track.youtubeUrl || track.youtube || track.videoUrl || track.url || '');
  }

  function normalizeHighlightedTracks(value) {
    const sortTracks = (tracks) => tracks
      .map((track, order) => ({
        ...track,
        _order: order,
        _sortNumber: Number.parseInt(String(track.number || '').replace(/\D/g, ''), 10)
      }))
      .sort((a, b) => {
        const aNumber = Number.isFinite(a._sortNumber) ? a._sortNumber : Number.MAX_SAFE_INTEGER;
        const bNumber = Number.isFinite(b._sortNumber) ? b._sortNumber : Number.MAX_SAFE_INTEGER;
        return aNumber === bNumber ? a._order - b._order : aNumber - bNumber;
      })
      .map(({ _order, _sortNumber, ...track }) => track);

    if (Array.isArray(value)) {
      return sortTracks(value.map((track, index) => {
        if (typeof track === 'string') return parseTrackToken(track, index);
        return {
          number: padTrackNumber(track.number || track.trackNumber || index + 1),
          title: String(track.title || track.name || track.track || '').trim(),
          source: getTrackSource(track),
          youtubeId: getTrackYoutubeId(track),
          duration: track.duration || ''
        };
      }).filter((track) => track.title));
    }

    const raw = String(value || '').trim();
    if (!hasValue(raw)) return [];
    return sortTracks(raw
      .split(/\s+\/\s+|\n+/)
      .map((item, index) => parseTrackToken(item, index))
      .filter((track) => track.title));
  }

  function renderHighlightedTracks(item) {
    const tracks = normalizeHighlightedTracks(item.highlightedTracks || item.tracks).map((track) => ({
      ...track,
      artist: item.artist || '',
      album: item.album || ''
    }));
    if (!tracks.length) return '';
    const playerId = `acha-track-player-${Math.random().toString(36).slice(2)}`;
    const encodedTracks = escapeHtml(JSON.stringify(tracks));
    return `
      <div class="acha-field acha-highlighted-track" data-acha-tracks="${encodedTracks}">
        <span>Highlighted <br>track</span>
        <div class="acha-track-module">
          <div class="acha-track-list">
            ${tracks.map((track, index) => `
              <button class="acha-track-trigger" type="button" data-acha-track-index="${index}" aria-expanded="false" aria-controls="${playerId}">
                <span class="acha-track-num">${escapeHtml(track.number)}</span>
                <span class="acha-track-title">${escapeHtml(track.title)}</span>
              </button>
            `).join('')}
          </div>
          <div class="acha-track-player" id="${playerId}" aria-hidden="true">
            <div class="acha-play-widget">
              <div class="acha-play-status-row">
                <span class="acha-play-track-status" data-acha-play-status>Ready</span>
              </div>
              <div class="acha-play-progress-wrap">
                <span class="acha-play-time" data-acha-play-current>0:00</span>
                <div class="acha-play-bar-track" data-acha-play-bar><div class="acha-play-bar-fill" data-acha-play-fill></div></div>
                <span class="acha-play-time dur" data-acha-play-duration>${escapeHtml(tracks[0].duration || '0:00')}</span>
              </div>
              <div class="acha-play-controls">
                <button class="acha-play-ctrl-btn" type="button" data-acha-play-prev ${tracks.length <= 1 ? 'disabled' : ''}>
                  <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                  Prev
                </button>
                <button class="acha-play-main-btn" type="button" data-acha-play-toggle aria-label="Play highlighted track">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </button>
                <button class="acha-play-ctrl-btn" type="button" data-acha-play-next ${tracks.length <= 1 ? 'disabled' : ''}>
                  Next
                  <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderField(label, value) {
    if (!hasValue(value)) return '';
    return `
      <div class="acha-field">
        <span>${escapeHtml(label)}</span>
        <p>${escapeHtml(value)}</p>
      </div>
    `;
  }

  function renderAlbum(issue, item) {
    const inlineEssay = renderInlineEssay(issue, item);
    return `
      <article class="acha-album ${inlineEssay ? 'has-inline-essay' : ''}">
        ${renderCover(item)}
        <div>
          <h3>${escapeHtml(item.album)}</h3>
          <span class="acha-album-meta">${[item.artist, item.genre, item.releaseDate].filter(Boolean).map(escapeHtml).join(' · ')}</span>
          ${hasValue(item.comment) ? `<p class="acha-critic-line">${escapeHtml(item.comment)}</p>` : ''}
          ${renderHighlightedTracks(item)}
        </div>
        ${inlineEssay}
      </article>
    `;
  }

  function renderIssue(data, issue) {
    document.title = `${issue.issue || 'ACHA'} | artic.`;
    titleEl.textContent = issue.title || 'ACHA';
    dateEl.textContent = `${issue.issue || 'Quarterly'} · ${formatDate(issue.date)}`;
    summaryEl.textContent = getAchaSummary();

    const albums = flattenAlbums(issue);
    const tiers = issue.tiers || [];
    const essays = issue.essays || [];

    statsEl.innerHTML = tiers.filter((tier) => (tier.items || []).some((item) => item.album)).map((tier) => [
      `Tier ${tier.rank || ''}${tier.label ? ` · ${tier.label}` : ''}`,
      `${(tier.items || []).filter((item) => item.album).length}`
    ]).map(([label, value]) => `
      <div class="acha-stat">
        <span>${escapeHtml(label)}</span>
        <strong>${escapeHtml(value)}</strong>
      </div>
    `).join('');

    const coverItems = albums.length ? albums : [];
    const coverMarkup = coverItems.map(renderCover).join('');
    coversEl.innerHTML = coverMarkup
      ? `<div class="acha-cover-track"><div class="acha-cover-set">${coverMarkup}</div><div class="acha-cover-set" aria-hidden="true">${coverMarkup}</div></div>`
      : '';
    initCoverMarquee();

    essayReaderEl.innerHTML = '';

    bodyEl.innerHTML = tiers.filter((tier) => (tier.items || []).some((item) => item.album)).map((tier) => {
      const canon = getTierCanon(data.tierCanon, tier);
      return `
        <section class="acha-tier ${Number(tier.rank) <= 3 ? 'is-featured' : ''}">
          <div class="acha-tier-heading">
            <p class="acha-kicker">Tier ${escapeHtml(tier.rank || '')}</p>
            <h2>${escapeHtml(tier.label || canon.label || '')}</h2>
            ${canon.summary ? `<p class="acha-tier-summary">${escapeHtml(canon.summary)}</p>` : ''}
            ${(canon.criteria || []).length ? `
              <ul class="acha-tier-criteria">
                ${canon.criteria.map((criterion) => `<li>${escapeHtml(criterion)}</li>`).join('')}
              </ul>
            ` : ''}
            <small>${escapeHtml((tier.items || []).length)} albums</small>
          </div>
          <div class="acha-album-list">
            ${(tier.items || []).filter((item) => item.album).map((item) => renderAlbum(issue, {
              ...item,
              tierRank: tier.rank,
              tierLabel: tier.label
            })).join('')}
          </div>
        </section>
      `;
    }).join('');

    setupTierReveal();
    setupAlbumReveal();
    setupInlineEssayInteractions();

    essaysEl.innerHTML = '';
    pageEl?.classList.remove('is-loading');
    pageEl?.classList.add('is-loaded');

    if (essayKey) {
      const scrollToSelectedEssay = () => {
        const selectedEssay = essays.find((essay) => essay.id === essayKey || essay.title === essayKey);
        const target = selectedEssay ? document.getElementById(`essay-${selectedEssay.id || selectedEssay.title || ''}`) : null;
        if (target) {
          const top = target.getBoundingClientRect().top + window.scrollY - 72;
          if (window.articSmoothScrollTo) window.articSmoothScrollTo(top, { duration: 900 });
          else window.scrollTo(0, top);
        }
      };
      requestAnimationFrame(() => requestAnimationFrame(scrollToSelectedEssay));
      window.addEventListener('load', scrollToSelectedEssay, { once: true });
    }
  }

  function getQuarterlyContentsApiUrl() {
    if (window.getArticApiUrl) return window.getArticApiUrl('quarterlyContents');
    const isLocalHost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    return isLocalHost
      ? '/api/quarterly-contents'
      : 'https://quarterlycontents-4n2xy6gsxa-uc.a.run.app';
  }

  async function loadIssue() {
    try {
      const apiUrl = getQuarterlyContentsApiUrl();
      const response = await fetch(apiUrl, { cache: 'no-cache' });
      if (!response.ok) throw new Error(`Archive API returned ${response.status}`);
      const data = await response.json();
      const issues = Array.isArray(data.issues) ? data.issues : [];
      const issue = issues.find((item) => item.slug === issueKey || item.id === issueKey) || issues[0];
      if (!issue) {
        statusEl.textContent = 'The selected ACHA issue is not available.';
        pageEl?.classList.remove('is-loading');
        pageEl?.classList.add('is-loaded');
        return;
      }
      renderIssue(data, issue);
    } catch (err) {
      console.error('Failed to load ACHA issue.', err);
      statusEl.textContent = 'The selected ACHA issue is not available.';
      pageEl?.classList.remove('is-loading');
      pageEl?.classList.add('is-loaded');
    }
  }

  bodyEl?.addEventListener('click', handleInlineEssayClick, true);
  bodyEl?.addEventListener('keydown', handleInlineEssayKeydown, true);
  instagramModalEl?.addEventListener('click', handleInstagramModalClick);
  document.addEventListener('keydown', handleInstagramModalKeydown);
  loadIssue();
})();
</script>
