<!--
  Notion database: 분기별 결산
  Runtime target: /api/quarterly-contents via Firebase Functions or local live Notion fetch
-->
<section class="quarterly-archive is-loading" aria-labelledby="quarterly-archive-title" aria-busy="true">
  <header class="quarterly-archive-head">
    <p class="quarterly-kicker">Quarterly archive</p>
    <h2 id="quarterly-archive-title">Issues by quarter.</h2>
    <p class="quarterly-archive-note" id="quarterly-archive-note">Seasonal issues, articles, and live notes</p>
  </header>

  <div class="quarterly-current" id="quarterly-current" aria-label="Current quarterly issue">
    <div class="quarterly-loading-panel" aria-hidden="true">
      <p class="quarterly-kicker">Loading</p>
      <div>
        <h3>Quarterly archive.</h3>
        <p>Preparing seasonal issues, articles, and live notes.</p>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <div class="quarterly-feed" id="quarterly-feed" aria-label="Past quarterly issues"></div>
  <div class="quarterly-feed-sentinel" id="quarterly-feed-sentinel" aria-live="polite">Loading Quarterly archive.</div>
</section>

<div class="quarterly-now-modal" id="quarterly-now-modal" aria-hidden="true" role="dialog" aria-label="Now artic. detail">
  <div class="quarterly-now-modal-backdrop" data-now-modal-close></div>
  <div class="quarterly-now-modal-panel">
    <button class="quarterly-now-modal-close" type="button" data-now-modal-close aria-label="Close Now artic. detail">&times;</button>
    <div class="quarterly-now-modal-content" id="quarterly-now-modal-content"></div>
  </div>
</div>

<script>
(function initQuarterlyArchiveFeed() {
  const currentEl = document.getElementById('quarterly-current');
  const feedEl = document.getElementById('quarterly-feed');
  const sentinelEl = document.getElementById('quarterly-feed-sentinel');
  const noteEl = document.getElementById('quarterly-archive-note');
  const nowModalEl = document.getElementById('quarterly-now-modal');
  const nowModalContentEl = document.getElementById('quarterly-now-modal-content');
  if (!currentEl || !feedEl || !sentinelEl) return;
  const archiveEl = sentinelEl.closest('.quarterly-archive');

  let quarterGroups = [];
  let renderedGroupCount = 0;
  let nowModalItems = [];
  const batchSize = 3;

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatDate(value) {
    if (!value) return 'Unscheduled';
    const date = new Date(`${value}T00:00:00`);
    if (Number.isNaN(date.getTime())) return value;
    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });
  }

  function getQuarterPeriod(issue) {
    const parsed = parseQuarter(issue);
    if (!parsed.year || !parsed.quarter) return '';
    const ranges = {
      1: ['JAN 1', 'MAR 31'],
      2: ['APR 1', 'JUN 30'],
      3: ['JUL 1', 'SEP 30'],
      4: ['OCT 1', 'DEC 31']
    };
    const range = ranges[parsed.quarter];
    return range ? `Albums Released in ${range[0]} - ${range[1]}` : '';
  }

  function getAchaCopy() {
    return [
      "ACHA: A's Choice & Home Archive",
      '4곡 이상 수록된 국내 EP 및 정규 앨범을 기준에 따라 일곱 단계로 분류하고 그중 상위를 소개합니다.',
      '동일 tier 내 앨범 순서는 발매일 기준입니다.'
    ].join('\n');
  }

  function getDisplayImageUrl(url) {
    return String(url || '').replace(/\/album\/images\/\d+\//, '/album/images/1000/');
  }

  function getEssayHref(issue, essay) {
    return `./acha/?issue=${encodeURIComponent(issue.slug || issue.id)}&essay=${encodeURIComponent(essay.id || essay.title || '')}#essay-${encodeURIComponent(essay.id || essay.title || '')}`;
  }

  function excerptFromText(value, limit) {
    const text = String(value || '').replace(/\s+/g, ' ').trim();
    if (!text) return '';
    return text.length > limit ? `${text.slice(0, limit).trim()}...` : text;
  }

  function parseQuarter(issue) {
    const issueText = String(issue.issue || issue.title || '').trim();
    const fromIssue = issueText.match(/(20\d{2})\s*(?:Q([1-4])|([1-4])Q)/i);
    if (fromIssue) {
      return { year: Number(fromIssue[1]), quarter: Number(fromIssue[2] || fromIssue[3]) };
    }

    const date = new Date(`${issue.date || ''}T00:00:00`);
    if (!Number.isNaN(date.getTime())) {
      return {
        year: date.getFullYear(),
        quarter: Math.floor(date.getMonth() / 3) + 1
      };
    }

    return { year: 0, quarter: 0 };
  }

  function quarterKeyFromIssue(issue) {
    const parsed = parseQuarter(issue);
    return `${parsed.year} Q${parsed.quarter}`;
  }

  function quarterSortValue(group) {
    return (group.year * 10) + group.quarter;
  }

  function sortIssues(a, b) {
    const qa = parseQuarter(a);
    const qb = parseQuarter(b);
    const byQuarter = ((qb.year * 10) + qb.quarter) - ((qa.year * 10) + qa.quarter);
    if (byQuarter !== 0) return byQuarter;
    return new Date(b.date || 0).getTime() - new Date(a.date || 0).getTime();
  }

  function parseQuarterFromNowItem(item) {
    const explicitYear = Number(item.year || 0);
    const explicitQuarter = String(item.quarter || '').match(/[1-4]/);
    if (explicitYear && explicitQuarter) {
      return { year: explicitYear, quarter: Number(explicitQuarter[0]) };
    }

    const date = new Date(`${item.date || ''}T00:00:00`);
    if (!Number.isNaN(date.getTime())) {
      return {
        year: date.getFullYear(),
        quarter: Math.floor(date.getMonth() / 3) + 1
      };
    }

    const text = `${item.issue || ''} ${item.issueSlug || ''}`.trim();
    const match = text.match(/(20\d{2})\s*(?:Q([1-4])|([1-4])Q)/i);
    if (match) {
      return { year: Number(match[1]), quarter: Number(match[2] || match[3]) };
    }

    return { year: 0, quarter: 0 };
  }

  function nowBelongsToQuarter(item, group) {
    const date = new Date(`${item.date || ''}T00:00:00`);
    if (!Number.isNaN(date.getTime())) {
      return date.getFullYear() === group.year && Math.floor(date.getMonth() / 3) + 1 === group.quarter;
    }

    const text = `${item.issue || ''} ${item.quarter || ''} ${item.issueSlug || ''} ${item.date || ''}`.toLowerCase();
    if (!text.trim()) return false;
    return text.includes(`${group.year}`) && (text.includes(`q${group.quarter}`) || text.includes(`${group.quarter}q`));
  }

  function groupByQuarter(issues, nowItems) {
    const groups = new Map();

    function ensureGroup(parsed) {
      const label = `${parsed.year} Q${parsed.quarter}`;
      if (!groups.has(label)) {
        groups.set(label, {
          id: label.toLowerCase().replace(/\s+/g, '-'),
          label,
          year: parsed.year,
          quarter: parsed.quarter,
          acha: null,
          nowArtic: []
        });
      }
      return groups.get(label);
    }

    issues.slice().sort(sortIssues).forEach((issue) => {
      const parsed = parseQuarter(issue);
      const group = ensureGroup(parsed);
      if (!group.acha) group.acha = issue;
    });

    (nowItems || []).forEach((item) => {
      const parsed = parseQuarterFromNowItem(item);
      if (parsed.year && parsed.quarter) ensureGroup(parsed);
    });

    const output = Array.from(groups.values()).sort((a, b) => quarterSortValue(b) - quarterSortValue(a));
    (nowItems || []).forEach((item) => {
      const target = output.find((group) => nowBelongsToQuarter(item, group));
      if (target) target.nowArtic.push(item);
    });
    return output;
  }

  function flattenTopAlbums(issue) {
    return (issue?.tiers || [])
      .filter((tier) => Number(tier.rank) <= 3)
      .flatMap((tier) => (tier.items || []).map((item) => ({
        ...item,
        tierRank: tier.rank,
        tierLabel: tier.label
      })))
      .filter((item) => item.album)
      .slice(0, 6);
  }

  function getCoverAlbums(issue, count) {
    const topAlbums = flattenTopAlbums(issue);
    const withImages = topAlbums.filter((item) => item.imageUrl);
    return (withImages.length ? withImages : topAlbums).slice(0, count);
  }

  function renderCoverStack(issue, count) {
    const covers = getCoverAlbums(issue, count);
    if (!covers.length) {
      return `<div class="quarterly-cover-stack is-empty"><span>${escapeHtml(issue?.issue || 'ACHA')}</span></div>`;
    }

    return `
      <div class="quarterly-cover-stack">
        ${covers.map((item) => item.imageUrl ? `
          <img src="${escapeHtml(getDisplayImageUrl(item.imageUrl))}" alt="${escapeHtml(`${item.album} album cover`)}" loading="lazy">
        ` : `
          <div class="quarterly-cover-fallback"><span>${escapeHtml(item.album)}</span></div>
        `).join('')}
      </div>
    `;
  }

  function renderAlbumPreview(issue, limit) {
    const albums = flattenTopAlbums(issue).slice(0, limit);
    if (!albums.length) return '';

    return `
      <ol class="quarterly-album-preview">
        ${albums.map((item) => `
          <li>
            <span>${escapeHtml(item.tierLabel || '')}</span>
            <div>
              <strong>${escapeHtml(item.album)}</strong>
              <em>${[item.artist, item.genre, item.releaseDate].filter(Boolean).map(escapeHtml).join(' · ')}</em>
              ${item.comment ? `<p>${escapeHtml(item.comment)}</p>` : ''}
            </div>
          </li>
        `).join('')}
      </ol>
    `;
  }

  function flattenAlbums(issue) {
    return (issue?.tiers || []).flatMap((tier) => (tier.items || []).map((item) => ({
      ...item,
      tierRank: tier.rank,
      tierLabel: tier.label
    }))).filter((item) => item.album);
  }

  function normalizeMatchText(value) {
    return String(value || '').replace(/[\s\-_()[\]]+/g, '').toLowerCase();
  }

  function findEssayAlbum(issue, essay) {
    const albums = flattenAlbums(issue);
    const essayAlbum = normalizeMatchText(essay.album);
    const essayArtist = normalizeMatchText(essay.artist);
    if (essayAlbum || essayArtist) {
      const directMatch = albums.find((item) => {
        const albumMatches = !essayAlbum || normalizeMatchText(item.album) === essayAlbum;
        const artistMatches = !essayArtist || normalizeMatchText(item.artist) === essayArtist;
        return albumMatches && artistMatches;
      });
      if (directMatch) return directMatch;
    }

    const title = normalizeMatchText(essay.title);
    return albums.find((item) => {
      const hasEssay = hasValue(item.companionEssay);
      const tierMatches = !essay.tierRank || Number(item.tierRank) === Number(essay.tierRank);
      const titleMatches = title.includes(normalizeMatchText(item.album)) || title.includes(normalizeMatchText(item.artist));
      return hasEssay && tierMatches && titleMatches;
    }) || albums.find((item) => hasValue(item.companionEssay) && (!essay.tierRank || Number(item.tierRank) === Number(essay.tierRank)));
  }

  function getEssayDisplayTitle(issue, essay) {
    const album = findEssayAlbum(issue, essay);
    if (album?.artist && album?.album) return `${album.artist} — ${album.album}`;
    const match = String(essay.title || '').match(/\(([^)]+)\)\s*\[([^\]]+)\]/);
    if (match) return `${match[1]} — ${match[2]}`;
    return essay.title || 'Featured article';
  }

  function getEssayVisual(issue, essay) {
    const album = findEssayAlbum(issue, essay);
    return {
      url: essay.artistImageUrl || album?.artistImageUrl || album?.imageUrl || '',
      alt: album?.artist ? `${album.artist} artist image` : getEssayDisplayTitle(issue, essay),
      caption: album?.artist || 'Featured article'
    };
  }

  function renderFeaturedArticles(issue) {
    if (!issue || !(issue.essays || []).length) return '';
    return `
      <div class="quarterly-featured-articles">
        <p class="quarterly-module-label">Featured article</p>
        <div class="quarterly-featured-list">
          ${issue.essays.slice(0, 2).map((essay) => {
            const visual = getEssayVisual(issue, essay);
            return `
              <article>
                ${visual.url ? `
                  <figure class="quarterly-featured-visual">
                    <img src="${escapeHtml(getDisplayImageUrl(visual.url))}" alt="${escapeHtml(visual.alt)}" loading="lazy">
                    <figcaption>${escapeHtml(visual.caption)}</figcaption>
                  </figure>
                ` : ''}
                <div class="quarterly-featured-copy">
                  <span>${escapeHtml(essay.tierLabel || 'Essay')}</span>
                  <h5>${escapeHtml(getEssayDisplayTitle(issue, essay))}</h5>
                  ${excerptFromText(essay.excerpt || essay.content, 260) ? `<p>${escapeHtml(excerptFromText(essay.excerpt || essay.content, 260))}</p>` : ''}
                  <a class="quarterly-text-link" href="${escapeHtml(getEssayHref(issue, essay))}">
                    <span>Continue reading</span>
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
                  </a>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  function renderAchaModule(issue, variant) {
    if (!issue) return '';

    const href = `./acha/?issue=${encodeURIComponent(issue.slug || issue.id)}`;
    const coverCount = 4;
    const previewLimit = 5;

    return `
      <article class="quarterly-module quarterly-module-acha ${variant === 'current' ? 'is-current' : ''}">
        <div class="quarterly-module-visual" aria-hidden="true">
          ${renderCoverStack(issue, coverCount)}
        </div>
        <div class="quarterly-module-body">
          <p class="quarterly-module-label">ACHA</p>
          <h4><a href="${escapeHtml(href)}">${escapeHtml(issue.title)}</a></h4>
          <p class="quarterly-module-meta">${escapeHtml([issue.issue, getQuarterPeriod(issue)].filter(Boolean).join(' · '))}</p>
          <p class="quarterly-module-copy">${escapeHtml(getAchaCopy())}</p>
          ${renderAlbumPreview(issue, previewLimit)}
        </div>
      </article>
    `;
  }

  function getNowCaption(item) {
    const label = String(item.label || '').trim();
    const caption = String(item.caption || '').trim();
    if (!label) return caption;
    return caption.replace(new RegExp(`^${label}\\s*`), '').trim() || caption;
  }

  function getNowDisplayCaption(item) {
    return getNowCaption(item).split(/\bVenue\b/i)[0].trim();
  }

  function hasValue(value) {
    const normalized = String(value || '').trim();
    return normalized && !['없음', 'none', 'n/a', '-'].includes(normalized.toLowerCase());
  }

  function getNowCreditParts(item) {
    const caption = getNowCaption(item);
    const venueMatch = caption.match(/\bVenue\s+(.+?)(?=\s+Thanks|\s*$)/i);
    return [
      ['Date', item.date ? formatDate(item.date) : ''],
      ['Event', item.eventTitle || item.event || item.label],
      ['Venue', item.venue || (venueMatch ? venueMatch[1] : '')]
    ].filter(([, value]) => hasValue(value));
  }

  function renderNowMedia(item) {
    if (item.videoUrl) {
      return `<video src="${escapeHtml(item.videoUrl)}" poster="${escapeHtml(item.imageUrl || '')}" controls playsinline></video>`;
    }
    if (item.embedUrl) {
      return `<iframe src="${escapeHtml(item.embedUrl)}" title="${escapeHtml(getNowCaption(item) || 'Now artic. media')}" loading="lazy" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    }
    if (item.imageUrl) {
      return `<img src="${escapeHtml(item.imageUrl)}" alt="" loading="lazy"><span class="quarterly-now-play" aria-hidden="true"></span>`;
    }
    return '<i class="quarterly-now-thumb" aria-hidden="true"></i>';
  }

  function openNowModal(index) {
    if (!nowModalEl || !nowModalContentEl) return;
    const item = nowModalItems[index];
    if (!item) return;
    const caption = getNowDisplayCaption(item);
    const eventTitle = item.title || item.eventTitle || item.event || 'This quarter in motion.';
    nowModalContentEl.innerHTML = `
      <div class="quarterly-now-modal-media">
        ${renderNowMedia(item)}
      </div>
      <aside class="quarterly-now-modal-copy">
        <p class="quarterly-module-label">Now artic.</p>
        <h3>${escapeHtml(eventTitle)}</h3>
        ${caption ? `<p>${escapeHtml(caption)}</p>` : ''}
        <dl>
          ${getNowCreditParts(item).map(([label, value]) => `
            <div>
              <dt>${escapeHtml(label)}</dt>
              <dd>${escapeHtml(value)}</dd>
            </div>
          `).join('')}
        </dl>
      </aside>
    `;
    nowModalEl.classList.add('is-open');
    nowModalEl.setAttribute('aria-hidden', 'false');
    document.body.classList.add('quarterly-now-modal-open');
  }

  function closeNowModal() {
    if (!nowModalEl || !nowModalContentEl) return;
    nowModalEl.classList.remove('is-open');
    nowModalEl.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('quarterly-now-modal-open');
  }

  function renderNowModule(group, variant) {
    const items = group.nowArtic || [];
    if (!items.length) return '';
    return `
      <article class="quarterly-module quarterly-module-now ${variant === 'current' ? 'is-current' : ''}">
        <div class="quarterly-module-body">
          <p class="quarterly-module-label">Now artic.</p>
          <h4>This quarter in motion.</h4>
          <div class="quarterly-now-list">
            ${items.slice(0, 4).map((item) => {
              const modalIndex = nowModalItems.push(item) - 1;
              return `
              <button class="quarterly-now-trigger" type="button" data-now-index="${modalIndex}">
                ${item.imageUrl ? `<img src="${escapeHtml(item.imageUrl)}" alt="" loading="lazy">` : '<i class="quarterly-now-thumb" aria-hidden="true"></i>'}
                <span>
                  <strong>${escapeHtml(getNowDisplayCaption(item))}</strong>
                  <em>View note</em>
                </span>
              </button>
            `}).join('')}
          </div>
        </div>
      </article>
    `;
  }

  function renderQuarterGroup(group, variant) {
    const headline = variant === 'current' ? 'Current quarter' : 'Archive quarter';
    const hasAcha = Boolean(group.acha);
    const hasNow = (group.nowArtic || []).length > 0;
    const description = hasAcha
      ? getQuarterPeriod(group.acha)
      : 'New scenes and moments from this quarter.';
    return `
      <section class="quarterly-quarter ${variant === 'current' ? 'is-current' : ''} ${!hasAcha && hasNow ? 'is-now-only' : ''}" aria-labelledby="${escapeHtml(group.id)}-title">
        <header class="quarterly-quarter-head">
          <p class="quarterly-kicker">${headline}</p>
          <h3 id="${escapeHtml(group.id)}-title">${escapeHtml(group.label)}</h3>
          <p>${description}</p>
        </header>
        <div class="quarterly-quarter-modules">
          ${renderAchaModule(group.acha, variant)}
          ${renderNowModule(group, variant)}
        </div>
        ${renderFeaturedArticles(group.acha)}
      </section>
    `;
  }

  function renderArchiveCta() {
    return `
      <section class="quarterly-archive-cta" aria-label="Join the Quarterly waitlist">
        <div>
          <p class="quarterly-kicker">Quarterly dispatch</p>
        </div>
        <div class="quarterly-archive-cta-copy">
          <p class="quarterly-archive-cta-en">
            Curated albums, artworks, and diverse artistic insights,<br>delivered every quarter.
          </p>
          <p class="quarterly-archive-cta-ko">
            매 분기 발매된 앨범, 작품,<br>그리고 다양한 예술 소식을 전합니다.
          </p>
          <a class="about-action quarterly-archive-cta-action" href="#quarterly-waitlist">Join the Waitlist</a>
        </div>
      </section>
    `;
  }

  function completeArchiveFeed() {
    sentinelEl.innerHTML = renderArchiveCta();
    sentinelEl.classList.add('is-complete');
  }

  function renderNextBatch() {
    const archiveGroups = quarterGroups.slice(1);
    if (renderedGroupCount >= archiveGroups.length) {
      completeArchiveFeed();
      return;
    }

    const nextGroups = archiveGroups.slice(renderedGroupCount, renderedGroupCount + batchSize);
    feedEl.insertAdjacentHTML('beforeend', nextGroups.map((group) => renderQuarterGroup(group, 'archive')).join(''));
    renderedGroupCount += nextGroups.length;
    initQuarterlyScrollReveal(feedEl);

    if (renderedGroupCount >= archiveGroups.length) {
      completeArchiveFeed();
    }
  }

  function startInfiniteScroll() {
    nowModalItems = [];
    if (quarterGroups[0]) {
      currentEl.innerHTML = renderQuarterGroup(quarterGroups[0], 'current');
    }

    renderNextBatch();
    initQuarterlyScrollReveal(document);
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        if (entries.some((entry) => entry.isIntersecting)) {
          renderNextBatch();
        }
      }, { rootMargin: '640px 0px' });
      observer.observe(sentinelEl);
    } else {
      while (renderedGroupCount < quarterGroups.slice(1).length) renderNextBatch();
    }
  }

  function settleArchiveLoading() {
    if (!archiveEl) return;
    archiveEl.classList.remove('is-loading');
    archiveEl.removeAttribute('aria-busy');
  }

  function initQuarterlyScrollReveal(root) {
    const targets = Array.from((root || document).querySelectorAll('.quarterly-archive-head, .quarterly-quarter'));
    if (!targets.length) return;
    if (!('IntersectionObserver' in window)) {
      targets.forEach((target) => target.classList.add('is-visible'));
      return;
    }
    const observer = new IntersectionObserver((entries, self) => {
      entries.forEach((entry) => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('is-visible');
        self.unobserve(entry.target);
      });
    }, { rootMargin: '0px 0px -12% 0px', threshold: 0.12 });
    targets.forEach((target) => {
      if (target.classList.contains('is-visible')) return;
      observer.observe(target);
    });
  }

  document.addEventListener('click', (event) => {
    const trigger = event.target.closest('.quarterly-now-trigger');
    if (trigger) {
      openNowModal(Number(trigger.dataset.nowIndex));
      return;
    }
    if (event.target.closest('[data-now-modal-close]')) {
      closeNowModal();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') closeNowModal();
  });

  async function loadArchive() {
    try {
      const apiUrl = window.getArticApiUrl ? window.getArticApiUrl('quarterlyContents') : '/api/quarterly-contents';
      const response = await fetch(apiUrl, { cache: 'no-cache' });
      if (!response.ok) throw new Error(`Archive API returned ${response.status}`);
      const data = await response.json();
      const issues = Array.isArray(data.issues) ? data.issues : [];
      quarterGroups = groupByQuarter(issues, data.nowArtic || []);

      if (noteEl && data.updatedAt) {
        noteEl.textContent = 'Seasonal issues, articles, and live notes';
      }

      if (!quarterGroups.length) {
        sentinelEl.textContent = '';
        sentinelEl.classList.add('is-complete');
        settleArchiveLoading();
        return;
      }

      sentinelEl.textContent = '';
      startInfiniteScroll();
      settleArchiveLoading();
    } catch (err) {
      console.error('Failed to load Quarterly archive.', err);
      sentinelEl.innerHTML = '<span>Quarterly archive will return shortly.</span>';
      sentinelEl.classList.add('is-error');
      settleArchiveLoading();
    }
  }

  loadArchive();
})();
</script>

<style>
  .quarterly-archive {
    width: 100%;
